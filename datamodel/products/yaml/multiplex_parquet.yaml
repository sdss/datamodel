general:
  name: multiplex_parquet
  short: Table of all spectroscopic plates or FPS fields
  description: Table of all spectroscopic plates or FPS fields across each SDSS instrument.
  datatype: PARQUET
  filesize: 2 MB
  releases:
  - DR20
  environments:
  - ALLSPEC
  surveys:
  - SDSS
  naming_convention: $ALLSPEC/[VERS]/multiplex-[RELEASE]-[VERS].parquet where RELEASE
