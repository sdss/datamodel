general:
  name: mos_target_field_parquet
  short: 'MOS Target Table: field'
  description: The table includes the field information, where a field is a unique
    pointing of the telescope on the sky.
  datatype: PARQUET
  filesize: 1 MB
  releases:
  - DR20
  environments:
  - MOS_TARGET
  surveys:
  - SDSS
  naming_convention: $MOS_TARGET/[V_TARG]/[FTYPE]/mos_field.[FTYPE] with FTYPE='parquet'
    and V_TARG='2.0.0' for DR20.
  generated_by: sdss5db targeting database.
  data_level: 2.3.3
  design: false
  vac: false
  recommended_science_product: false
changelog:
  description: Describes changes to the datamodel product and/or file structure from
    one release to another
  releases: {}
releases:
  DR20:
    template: $MOS_TARGET/[V_TARG]/[FTYPE]/mos_field.[FTYPE]
    example: 2.0.0/parquet/mos_field.parquet
    location: '{v_targ}/{ftype}/mos_field.{ftype}'
    environment: MOS_TARGET
    access:
      in_sdss_access: true
      path_name: mos_target_field
      path_template: $MOS_TARGET/{v_targ}/{ftype}/mos_field.{ftype}
      path_kwargs:
      - v_targ
      - ftype
      access_string: mos_target_field = $MOS_TARGET/{v_targ}/{ftype}/mos_field.{ftype}
    survey: SDSS
    dataframe:
      columns:
        pk:
          name: pk
          dtype: Int32
          unit: ''
          description: The primary key. A sequential identifier.
        racen:
          name: racen
          dtype: Float64
          unit: ''
          description: The Right Ascension of the center of the field.
        deccen:
          name: deccen
          dtype: Float64
          unit: ''
          description: The Declination of the center of the field.
        version_pk:
          name: version_pk
          dtype: Int32
          unit: ''
          description: The primary key of the version in the dr20_version table.
        cadence_pk:
          name: cadence_pk
          dtype: Int32
          unit: ''
          description: The primary key of the cadence in the dr20_cadence table.
        observatory_pk:
          name: observatory_pk
          dtype: Int32
          unit: ''
          description: The primary key of the observatory in the dr20_observatory
            table.
        position_angle:
          name: position_angle
          dtype: Float32
          unit: ''
          description: The position angle of the field E of N in degrees.
        slots_exposures:
          name: slots_exposures
          dtype: String
          unit: ''
          description: Exposures assigned to each LST and sky brightness slot
        field_id:
          name: field_id
          dtype: Int32
          unit: ''
          description: The idenifier of a field within a version of the survey plan.
      metadata: {}
notes: |-
  None
regrets: |-
  I  have no regrets!
