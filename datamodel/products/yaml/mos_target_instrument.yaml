general:
  name: mos_target_instrument
  short: 'MOS Target Table: instrument'
  description: This table stores the instruments used by SDSS-V.
  datatype: FITS
  filesize: 8 KB
  releases:
  - DR20
  environments:
  - MOS_TARGET
  surveys:
  - SDSS
  naming_convention: $MOS_TARGET/[V_TARG]/[FTYPE]/mos_instrument.[FTYPE] with FTYPE='fits'
    and V_TARG='2.0.0' for DR20.
  generated_by: sdss5db targeting database.
  data_level: 2.3.3
  design: false
  vac: false
  recommended_science_product: false
changelog:
  description: Describes changes to the datamodel product and/or file structure from
    one release to another
  releases: {}
releases:
  DR20:
    template: $MOS_TARGET/[V_TARG]/[FTYPE]/mos_instrument.[FTYPE]
    example: 2.0.0/fits/mos_instrument.fits
    location: '{v_targ}/{ftype}/mos_instrument.{ftype}'
    environment: MOS_TARGET
    access:
      in_sdss_access: true
      path_name: mos_target_instrument
      path_template: $MOS_TARGET/{v_targ}/{ftype}/mos_instrument.{ftype}
      path_kwargs:
      - ftype
      - v_targ
      access_string: mos_target_instrument = $MOS_TARGET/{v_targ}/{ftype}/mos_instrument.{ftype}
    survey: SDSS
    hdus:
      hdu0:
        name: PRIMARY
        description: Primary header
        is_image: true
        size: 0 bytes
        header:
        - key: SIMPLE
          value: true
          comment: conforms to FITS standard
        - key: BITPIX
          value: 8
          comment: array data type
        - key: NAXIS
          value: 0
          comment: number of array dimensions
        - key: EXTEND
          value: true
          comment: ''
      hdu1:
        name: ''
        description: 'MOS Target Table: instrument'
        is_image: false
        size: 28 bytes
        header:
        - key: XTENSION
          value: BINTABLE
          comment: binary table extension
        - key: BITPIX
          value: 8
          comment: array data type
        - key: NAXIS
          value: 2
          comment: number of array dimensions
        - key: NAXIS1
          value: 14
          comment: length of dimension 1
        - key: NAXIS2
          value: 2
          comment: length of dimension 2
        - key: PCOUNT
          value: 0
          comment: number of group parameters
        - key: GCOUNT
          value: 1
          comment: number of groups
        - key: TFIELDS
          value: 3
          comment: number of table fields
        - key: TNULL1
          value: -2147483648
          comment: ''
        columns:
          pk:
            name: pk
            type: int32
            unit: ''
            description: The primary key. A sequential identifier.
          label:
            name: label
            type: char[6]
            unit: ''
            description: The name of the instrument.
          default_lambda_eff:
            name: default_lambda_eff
            type: float32
            unit: angstrom
            description: The default wavelength for which fibre positioning will be
              optimised
notes: None
regrets: I  have no regrets!
