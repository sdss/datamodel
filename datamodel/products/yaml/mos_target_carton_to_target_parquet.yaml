general:
  name: mos_target_carton_to_target_parquet
  short: 'MOS Target Table: carton_to_target'
  description: The table stores the targets assigned to a given carton along with
    information about the instrument that will observe that target, and offsetting
    data.
  datatype: PARQUET
  filesize: 913 MB
  releases:
  - DR20
  environments:
  - MOS_TARGET
  surveys:
  - SDSS
  naming_convention: $MOS_TARGET/[V_TARG]/[FTYPE]/mos_carton_to_target.[FTYPE] with
    FTYPE='parquet' and V_TARG='2.0.0' for DR20.
  generated_by: sdss5db targeting database.
  data_level: 2.3.3
  design: false
  vac: false
  recommended_science_product: false
changelog:
  description: Describes changes to the datamodel product and/or file structure from
    one release to another
  releases: {}
releases:
  DR20:
    template: $MOS_TARGET/[V_TARG]/[FTYPE]/mos_carton_to_target.[FTYPE]
    example: 2.0.0/parquet/mos_carton_to_target.parquet
    location: '{v_targ}/{ftype}/mos_carton_to_target.{ftype}'
    environment: MOS_TARGET
    access:
      in_sdss_access: true
      path_name: mos_target_carton_to_target
      path_template: $MOS_TARGET/{v_targ}/{ftype}/mos_carton_to_target@mos_target_num3|.{ftype}
      path_kwargs:
      - ftype
      - v_targ
      access_string: mos_target_carton_to_target = $MOS_TARGET/{v_targ}/{ftype}/mos_carton_to_target.{ftype}
    survey: SDSS
    dataframe:
      columns:
        carton_to_target_pk:
          name: carton_to_target_pk
          dtype: Int64
          unit: ''
          description: The primary key. A sequential identifier.
        lambda_eff:
          name: lambda_eff
          dtype: Float32
          unit: angstrom
          description: The effective wavelength at which the object will be observed
        carton_pk:
          name: carton_pk
          dtype: Int32
          unit: ''
          description: The primary key of the carton in the dr20_carton table.
        target_pk:
          name: target_pk
          dtype: Int64
          unit: ''
          description: The primary key of the target in the dr20_target table.
        cadence_pk:
          name: cadence_pk
          dtype: Int32
          unit: ''
          description: The primary key of the cadence in the dr20_cadence table.
        priority:
          name: priority
          dtype: Int32
          unit: ''
          description: The target priority. Used for scheduling.
        value:
          name: value
          dtype: Float32
          unit: ''
          description: An internal metric of the target value used for scheduling.
        instrument_pk:
          name: instrument_pk
          dtype: Int32
          unit: ''
          description: The primary key of the instrument in the dr20_instrument table.
        delta_ra:
          name: delta_ra
          dtype: Float64
          unit: ''
          description: The RA offset for fibre positioning, in arcsec.
        delta_dec:
          name: delta_dec
          dtype: Float64
          unit: ''
          description: The Dec offset for fibre positioning, in arcsec.
        inertial:
          name: inertial
          dtype: Boolean
          unit: ''
          description: Whether this is an inertial target (no proper motion will be
            applied).
      metadata: {}
notes: None
