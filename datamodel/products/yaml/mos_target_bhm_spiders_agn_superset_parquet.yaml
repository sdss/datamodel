general:
  name: mos_target_bhm_spiders_agn_superset_parquet
  short: 'MOS Target Table: bhm_spiders_agn_superset'
  description: 'One of several tables describing optical/IR counterparts to eROSITA

    X-ray sources identified via various methods.


    These tables contain a superset of potential targets from which the SDSS-V spectroscopic
    targets were drawn.  The dr20_bhm_spiders_agn_superset table includes is expected
    to be dominated by Active Galactic Nuclei (AGN) but should also include a significant
    minority of galaxies, stars and other Galactic sources. Each row corresponds to
    one possible match between an X-ray source and a potential optical/IR counterpart.  The
    X-ray columns (ero_*) record the eROSITA information known at the time of target
    selection and may differ from publicly available eROSITA catalogs. The dr20_bhm_spiders_*_superset
    tables are derived from eROSITA observations of the eROSITA Final Equatorial Depth
    performance verification field (''eFEDS'').'
  datatype: PARQUET
  filesize: 1 MB
  releases:
  - DR20
  environments:
  - MOS_TARGET
  surveys:
  - SDSS
  naming_convention: $MOS_TARGET/[V_TARG]/parquet/mos_bhm_spiders_agn_superset.parquet
    with V_TARG=2.0.0 for DR20.
  generated_by: sdss5db targeting database.
  data_level: 2.3.3
  design: false
  vac: false
  recommended_science_product: false
changelog:
  description: Describes changes to the datamodel product and/or file structure from
    one release to another
  releases: {}
releases:
  DR20:
    template: $MOS_TARGET/[V_TARG]/parquet/mos_bhm_spiders_agn_superset.parquet
    example: 2.0.0/parquet/mos_bhm_spiders_agn_superset.parquet
    location: '{v_targ}/parquet/mos_bhm_spiders_agn_superset.parquet'
    environment: MOS_TARGET
    access:
      in_sdss_access: true
      path_name: mos_target_bhm_spiders_agn_superset_parquet
      path_template: $MOS_TARGET/{v_targ}/parquet/mos_bhm_spiders_agn_superset.parquet
      path_kwargs:
      - v_targ
      access_string: mos_target_bhm_spiders_agn_superset_parquet = $MOS_TARGET/{v_targ}/parquet/mos_bhm_spiders_agn_superset.parquet
    survey: SDSS
    dataframe:
      columns:
        pk:
          name: pk
          dtype: Int64
          unit: ''
          description: primary key of table entry
        ero_version:
          name: ero_version
          dtype: String
          unit: ''
          description: Identifier giving the eROSITA dataset and processing version
            e.g. 'eFEDS_c940', 'em01_c946_201008_poscorr' etc
        ero_detuid:
          name: ero_detuid
          dtype: String
          unit: ''
          description: The standard official eROSITA unique detection identifier,
            e.g. 'em01_123456_020_ML12345_001_c946' etc
        ero_flux:
          name: ero_flux
          dtype: Float32
          unit: erg/cm2/s
          description: X-ray flux, usually in the main eROSITA detection band (0.2-2.3keV).
        ero_flux_err:
          name: ero_flux_err
          dtype: Float32
          unit: erg/cm2/s
          description: Uncertainty on X-ray flux
        ero_ext:
          name: ero_ext
          dtype: Float32
          unit: arcsec
          description: X-ray extent parameter
        ero_ext_err:
          name: ero_ext_err
          dtype: Float32
          unit: arcsec
          description: Uncertainty on X-ray extent parameter
        ero_ext_like:
          name: ero_ext_like
          dtype: Float32
          unit: ''
          description: Likelihood of X-ray source being extended
        ero_det_like:
          name: ero_det_like
          dtype: Float32
          unit: ''
          description: X-ray detection likelihood
        ero_ra:
          name: ero_ra
          dtype: Float64
          unit: deg
          description: Best determination of X-ray position, J2000
        ero_dec:
          name: ero_dec
          dtype: Float64
          unit: deg
          description: Best determination of X-ray position, J2000
        ero_radec_err:
          name: ero_radec_err
          dtype: Float32
          unit: arcsec
          description: Best estimate of X-ray position uncertainty
        xmatch_method:
          name: xmatch_method
          dtype: String
          unit: ''
          description: The X-ray-to-optical/IR cross-match method that was used in
            this case e.g. 'XPS-ML/NWAY', 'CLUSTERS_EFEDS_MULTIPLE' etc
        xmatch_version:
          name: xmatch_version
          dtype: String
          unit: ''
          description: The cross-match software version and OIR catalog used e.g.
            'LSdr8-JWMS_v2.1LSdr8-JWMS_v2.1', 'LSdr8-AG_v1,JC_16032020', 'eromapper_2020-10-12',
            'CW20ps1dr2-v011220' etc
        xmatch_dist:
          name: xmatch_dist
          dtype: Float32
          unit: arcsec
          description: Distance between X-ray position and optical counterpart
        xmatch_metric:
          name: xmatch_metric
          dtype: Float32
          unit: ''
          description: Metric giving quality of cross-match. Meaning is dependent
            on xmatch_method, e.g. p_any for NWAY
        xmatch_flags:
          name: xmatch_flags
          dtype: Int64
          unit: ''
          description: Flags indicating cross-match properties (e.g. status flags),
            xmatch_method dependent
        target_class:
          name: target_class
          dtype: String
          unit: ''
          description: Best guess of source classification at time of xmatch e.g.
            'GALAXY','STAR','QSO','UNKNOWN',....
        target_priority:
          name: target_priority
          dtype: Int32
          unit: ''
          description: Relative to other targets in this catalog, interpreted/adapted
            later to derive a final target priority
        target_has_spec:
          name: target_has_spec
          dtype: Int32
          unit: ''
          description: Flags used to indicate if target has good quality archival
            spectroscopy available
        best_opt:
          name: best_opt
          dtype: String
          unit: ''
          description: Describes which OIR survey provided the optical counterpart
            for this row of the table, i.e. which OIR cat gives the entries in fields
            opt_ra, opt_dec, opt_pmra, opt_pmdec, opt_epoch, and which OIR identifier
            is given in the *_id columns
        ls_id:
          name: ls_id
          dtype: Int64
          unit: ''
          description: 'Identifier of counterpart (if any) in dr20_legacy_survey_dr8
            (''ls_id'' field). Arithmetically derived from legacysurvey sweep file
            columns: release, brickid and objid:  ls_id = objid + (brickid * 2**16)
            + (release * 2**40)'
        ps1_dr2_objid:
          name: ps1_dr2_objid
          dtype: Int64
          unit: ''
          description: Identifier of counterpart (if any) in dr20_panstarrs1 (catid_objid
            field). Identical to MAST 'ippObjID' identifier
        gaia_dr2_source_id:
          name: gaia_dr2_source_id
          dtype: Int64
          unit: ''
          description: Identifier of counterpart (if any) in dr20_gaia_dr2_source
            ('source_id' field)
        unwise_dr1_objid:
          name: unwise_dr1_objid
          dtype: String
          unit: ''
          description: Identifier of counterpart (if any) in dr20_unwise (not used)
        des_dr1_coadd_object_id:
          name: des_dr1_coadd_object_id
          dtype: Int64
          unit: ''
          description: Identifier of counterpart (if any) in DES/dr1 coadd catalogg
            (not used)
        sdss_dr16_objid:
          name: sdss_dr16_objid
          dtype: Int64
          unit: ''
          description: Identifier of counterpart (if any) in SDSS dr16 photobj table
            (not used)
        opt_ra:
          name: opt_ra
          dtype: Float64
          unit: deg
          description: Sky coordinate of optical/IR counterpart, included for validity
            checks only
        opt_dec:
          name: opt_dec
          dtype: Float64
          unit: deg
          description: Sky coordinate of optical/IR counterpart, included for validity
            checks only
        opt_pmra:
          name: opt_pmra
          dtype: Float32
          unit: mas/yr
          description: Proper motion of optical/IR counterpart, included for validity
            checks only
        opt_pmdec:
          name: opt_pmdec
          dtype: Float32
          unit: mas/yr
          description: Proper motion of optical/IR counterpart, included for validity
            checks only
        opt_epoch:
          name: opt_epoch
          dtype: Float32
          unit: decimal year
          description: Epoch of opt_ra,opt_dec
        opt_modelflux_g:
          name: opt_modelflux_g
          dtype: Float32
          unit: nanomaggy
          description: optical magnitude of counterpart, included for validity checks
            only
        opt_modelflux_ivar_g:
          name: opt_modelflux_ivar_g
          dtype: Float32
          unit: 1/nanomaggy^2
          description: uncertainty on optical magnitude of counterpart, included for
            validity checks only
        opt_modelflux_r:
          name: opt_modelflux_r
          dtype: Float32
          unit: nanomaggy
          description: optical magnitude of counterpart, included for validity checks
            only
        opt_modelflux_ivar_r:
          name: opt_modelflux_ivar_r
          dtype: Float32
          unit: 1/nanomaggy^2
          description: uncertainty on optical magnitude of counterpart, included for
            validity checks only
        opt_modelflux_i:
          name: opt_modelflux_i
          dtype: Float32
          unit: nanomaggy
          description: optical magnitude of counterpart, included for validity checks
            only
        opt_modelflux_ivar_i:
          name: opt_modelflux_ivar_i
          dtype: Float32
          unit: 1/nanomaggy^2
          description: uncertainty on optical magnitude of counterpart, included for
            validity checks only
        opt_modelflux_z:
          name: opt_modelflux_z
          dtype: Float32
          unit: nanomaggy
          description: optical magnitude of counterpart, included for validity checks
            only
        opt_modelflux_ivar_z:
          name: opt_modelflux_ivar_z
          dtype: Float32
          unit: 1/nanomaggy^2
          description: uncertainty on optical magnitude of counterpart, included for
            validity checks only
      metadata: {}
notes: None
regrets: I  have no regrets!
