general:
  name: mos_target_bhm_csc_parquet
  short: 'MOS Target Table: bhm_csc'
  description: 'Chandra Source Catalogue version 2.0 (CSC2) sources.


    Chandra Source Catalogue version 2.0 (CSC2) sources that have been matched (separately)
    to the PanSTARRS-1 and 2MASS catalogs.  This version of the CSC2 catalog informed
    early (plate era) SDSS-V observations but was then replaced by updated versions.'
  datatype: PARQUET
  filesize: 3 MB
  releases:
  - DR20
  environments:
  - MOS_TARGET
  surveys:
  - SDSS
  naming_convention: $MOS_TARGET/[V_TARG]/[FTYPE]/mos_bhm_csc.[FTYPE] with FTYPE='parquet'
    and V_TARG='2.0.0' for DR20.
  generated_by: sdss5db targeting database.
  data_level: 2.3.3
  design: false
  vac: false
  recommended_science_product: false
