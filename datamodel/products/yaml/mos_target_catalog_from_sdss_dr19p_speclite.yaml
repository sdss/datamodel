  short: 'MOS Target Table: catalog_from_sdss_dr19p_speclite'
  description: Relational table linking dr20_catalog with dr20_sdss_dr19p_speclite.
    Although this table has the same columns and purpose of other "catalog_to_X" tables
    in this schema, it is explicitly named "catalog_from" as it was generated using
    a bespoke cross-match different from the usual process used for other cross-matched
    tables in DR20.
  datatype: FITS
  filesize: 55 MB
  releases:
  - DR20
  environments:
  - MOS_TARGET
  surveys:
  - SDSS
  naming_convention: $MOS_TARGET/[V_TARG]/fits/mos_catalog_from_sdss_dr19p_speclite-[NUM].fits
    with V_TARG=2.0.0 and NUM=1..4 for DR20.
  generated_by: sdss5db targeting database.
  data_level: 2.3.3
  design: false
  vac: false
  recommended_science_product: false
