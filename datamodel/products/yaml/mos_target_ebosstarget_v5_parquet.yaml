general:
  name: mos_target_ebosstarget_v5_parquet
  short: 'MOS Target Table: ebosstarget_v5'
  description: "A catalog of targets, selected from SDSS+WISE imaging that were considered\
    \ for observation in the SDSS-IV/eBOSS project, including spectrophotometric starts\
    \ and candidate QSOs.\n\n This catalogue is a data product of the ebosstarget\
    \ target selection software, version \"v5_0\"."
  datatype: PARQUET
  filesize: 485 MB
  releases:
  - DR20
  environments:
  - MOS_TARGET
  surveys:
  - SDSS
  naming_convention: $MOS_TARGET/[V_TARG]/[FTYPE]/mos_ebosstarget_v5.[FTYPE] with
    FTYPE='parquet' and V_TARG='2.0.0' for DR20.
  generated_by: sdss5db targeting database.
  data_level: 2.3.3
  design: false
  vac: false
  recommended_science_product: false
changelog:
  description: Describes changes to the datamodel product and/or file structure from
    one release to another
  releases: {}
