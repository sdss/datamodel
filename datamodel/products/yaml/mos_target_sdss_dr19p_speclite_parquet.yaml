general:
  name: mos_target_sdss_dr19p_speclite_parquet
  short: 'MOS Target Table: sdss_dr19p_speclite'
  description: Selection of columns from the SDSS DR19 specLite file.
  datatype: PARQUET
  filesize: 266 MB
  releases:
  - DR20
  environments:
  - MOS_TARGET
  surveys:
  - SDSS
  naming_convention: $MOS_TARGET/[V_TARG]/[FTYPE]/mos_sdss_dr19p_speclite.[FTYPE]
    with FTYPE='parquet' and V_TARG='2.0.0' for DR20.
  generated_by: sdss5db targeting database.
  data_level: 2.3.3
  design: false
