general:
  name: boss_occam_cluster
  short: The BOSS OCCAM cluster summary table provides mean cluster parameters for
    open clusters.
  description: 'The BOSS OCCAM cluster summary table provides a comprehensive, uniform
    dataset for open clusters. It contains mean 5-D astrometry from Gaia (Hunt & Reffert 2024), 
    age and distance information (Cavallo et al. 2024 and Hunt & Reffert 2024),
    mean orbital parameters calculated using Gala
    (Adrian M. Price-Whelan 2017), an orbital dynamics code, and mean radial velocities
    and chemical abundances from MWM/BOSS.

    '
  datatype: FITS
  filesize: 45 KB
  releases:
  - DR20
  environments:
  - BOSS_OCCAM
  surveys:
  - SDSS
  naming_convention: $BOSS_OCCAM/BOSS_occam_cluster-DR20-[V_VAC].fits where V_VAC=v1
    in DR20.
  generated_by: OCCAM
  data_level: 3.3.0
  design: false
  vac: true
  recommended_science_product: true
changelog:
  description: Describes changes to the datamodel product and/or file structure from
    one release to another
  releases: {}
releases:
  DR20:
    template: $BOSS_OCCAM/BOSS_occam_cluster-[V_VAC].fits
    example: BOSS_occam_cluster-DR20-v1.fits
    location: BOSS_occam_cluster-{v_vac}.fits
    environment: BOSS_OCCAM
    access:
      in_sdss_access: true
      path_name: boss_occam_cluster
      path_template: $BOSS_OCCAM/BOSS_occam_cluster-{v_vac}.fits
      path_kwargs:
      - v_vac
      access_string: boss_occam_cluster = $BOSS_OCCAM/BOSS_occam_cluster-{v_vac}.fits
    survey: SDSS
    hdus:
      hdu0:
        name: PRIMARY
        description: The primary HDU, in accordance with the FITS file standard. No
          useful information is stored here
        is_image: true
        size: 0 bytes
        header:
        - key: SIMPLE
          value: true
          comment: conforms to FITS standard
        - key: BITPIX
          value: 8
          comment: array data type
        - key: NAXIS
          value: 0
          comment: number of array dimensions
        - key: EXTEND
          value: true
          comment: ''
      hdu1:
        name: ''
        description: 'The parameters for each cluster are reported here:

          '
        is_image: false
        size: 32 KB
        header:
        - key: XTENSION
          value: BINTABLE
          comment: binary table extension
        - key: BITPIX
          value: 8
          comment: array data type
        - key: NAXIS
          value: 2
          comment: number of array dimensions
        - key: NAXIS1
          value: 300
          comment: length of dimension 1
        - key: NAXIS2
          value: 111
          comment: length of dimension 2
        - key: PCOUNT
          value: 0
          comment: number of group parameters
        - key: GCOUNT
          value: 1
          comment: number of groups
        - key: TFIELDS
          value: 36
          comment: number of table fields
        - key: TUNIT17
          value: kpc
          comment: ''
        - key: TUNIT19
          value: kpc
          comment: ''
        - key: TUNIT20
          value: deg
          comment: ''
        - key: TUNIT22
          value: Myr
          comment: ''
        - key: TUNIT23
          value: Myr
          comment: ''
        columns:
          Name:
            name: Name
            type: char
            unit: ''
            description: Open cluster name
          GLON:
            name: GLON
            type: float64
            unit: deg
            description: Galactic longitude
          GLAT:
            name: GLAT
            type: float64
            unit: deg
            description: Galactic latitude
          RAdeg:
            name: RAdeg
            type: float64
            unit: deg
            description: Right ascension in degrees
          DEdeg:
            name: DEdeg
            type: float64
            unit: deg
            description: Declination in degrees
          EH_Radius:
            name: EH_Radius
            type: float64
            unit: deg
            description: Total radius of the cluster including tidal tails from Hunt
              and Reffert 2024
          EH_PMRA:
            name: EH_PMRA
            type: float64
            unit: mas/yr
            description: Mean proper motion in RA multiplied by cos(DE) from Hunt
              & Reffert 2024
          EH_PMRA_ERR:
            name: EH_PMRA_ERR
            type: float64
            unit: mas/yr
            description: Standard error of EH_PMRA from Hunt & Reffert 2024
          EH_PMDE:
            name: EH_PMDE
            type: float64
            unit: mas/yr
            description: Mean proper motion in DE from Hunt & Reffert 2024
          EH_PMDE_ERR:
            name: EH_PMDE_ERR
            type: float64
            unit: mas/yr
            description: Standard error in EH_PMDE from Hunt & Reffert 2024
          V_RAD:
            name: V_RAD
            type: float64
            unit: km/s
            description: Mean radial velocity of cluster members
          V_RAD_ERR:
            name: V_RAD_ERR
            type: float64
            unit: km/s
            description: 1-sigma V_RAD dispersion
          R_GC_EH:
            name: R_GC_EH
            type: float64
            unit: kpc
            description: Distance from the Galactic center using distances from Hunt
              & Reffert 2024
          R_GC_Cav:
            name: R_GC_Cav
            type: float64
            unit: kpc
            description: Distance from the Galactic center from Cavallo et al.
              2024
          EH_logAge:
            name: EH_logAge
            type: float64
            unit: yr
            description: logAge of the cluster from Hunt & Reffert 2024
          Cav_logAge:
            name: Cav_logAge
            type: float64
            unit: yr
            description: logAge of the cluster from Cavallo et al. 2024
          R_Guide:
            name: R_Guide
            type: float64
            unit: kpc
            description: Guiding Center radius
          Z_Height:
            name: Z_Height
            type: float64
            unit: kpc
            description: Current Z position from orbit calculations
          Z_Max:
            name: Z_Max
            type: float64
            unit: kpc
            description: Maximum Z position from orbit calculations
          Azimuth_Angle:
            name: Azimuth_Angle
            type: float64
            unit: deg
            description: Azimuthal angle relative to Galactic center
          Eccentricity:
            name: Eccentricity
            type: float64
            unit: ''
            description: Average eccentricity of calculated cluster orbits
          Z_Period_Avg:
            name: Z_Period_Avg
            type: float64
            unit: Myr
            description: Average period in the Z coordinate
          Radial_Period_Avg:
            name: Radial_Period_Avg
            type: float64
            unit: Myr
            description: Average radial period of the cluster
          Fe_H:
            name: Fe_H
            type: float64
            unit: dex
            description: Mean [Fe/H]
          Fe_H_ERR:
            name: Fe_H_ERR
            type: float64
            unit: dex
            description: 1-sigma [Fe/H] dispersion
          alpha_M:
            name: alpha_M
            type: float64
            unit: dex
            description: Mean [alpha/M]
          alpha_M_ERR:
            name: alpha_M_ERR
            type: float64
            unit: dex
            description: 1-sigma [alpha/M] dispersion
          Num_Full_Members:
            name: Num_Full_Members
            type: int64
            unit: ''
            description: Number of full cluster members (PM, RV and [Fe/H])
          Num_PMRV_Members:
            name: Num_PMRV_Members
            type: int64
            unit: ''
            description: Number of cluster proper motion and radial velocity members
          OCCAM_Qual:
            name: OCCAM_Qual
            type: int64
            unit: ''
            description: 'Visual CMD quality Flag; 1: less than 5 stars 2: 5 or more stars'
          Cav_Qual:
            name: Cav_Qual
            type: int64
            unit: ''
            description: Quality flag from Cavallo et al. 2024
          EH_Dist:
            name: EH_Dist
            type: float64
            unit: pc
            description: Distance from solar neighborhood from Hunt & Reffert 2024
          Cav_Dist:
            name: Cav_Dist
            type: float64
            unit: pc
            description: Distance from solar neighborhood from Cavallo et al.
              2024
          X:
            name: X
            type: float64
            unit: pc
            description: Galactocentric X coordinate
          Y:
            name: Y
            type: float64
            unit: pc
            description: Galactocentric Y coordinate
          Z:
            name: Z
            type: float64
            unit: pc
            description: Galactocentric Z coordinate
notes: |-
  None
regrets: |-
  I  have no regrets!
