general:
  name: boss_clam_lite_fits
  short: Stellar Parameters from BOSS Spectra with The CLAM
  description: BOSS-CLAM is a data driven method that maps labels to NMF basis weights
    to forward model continuum normalized BOSS spectra. This model was training with
    labels from ASPCAP, BOSS-MINESweeper, wide binaries and a validation set of hot
    stars. This is the lite version of the VAC includes the inferened stellar parameters
    from all mwmStar BOSS spectra with snr > 10, a series of flags to clean the dataset,
    and a subset of meta-data from mwmAllStar.
  datatype: FITS
  filesize: 674 MB
  releases:
  - DR20
  environments:
  - MWM_STELLAR_PARAMS
  surveys:
  - SDSS
  naming_convention: $MWM_STELLAR_PARAMS/boss_clam/boss_clam_lite-[V_VAC].fits
  generated_by: https://github.com/andycasey/clam-boss
  data_level: 3.3.0
  design: false
  vac: true
  recommended_science_product: true
changelog:
  description: Describes changes to the datamodel product and/or file structure from
    one release to another
  releases: {}
