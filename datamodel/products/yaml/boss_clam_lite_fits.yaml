    example: boss_clam/boss_clam_lite-1.0.0.fits
    location: boss_clam/boss_clam_lite-{v_vac}.{ftype}
    environment: MWM_STELLAR_PARAMS
    access:
      in_sdss_access: true
      path_name: boss_clam_lite
      path_template: $MWM_STELLAR_PARAMS/boss_clam/boss_clam_lite-{v_vac}.{ftype}
      path_kwargs:
