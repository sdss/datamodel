              fe_h, alpha_m]
          rchi2:
            name: rchi2
            type: float64
            unit: ''
            description: Reduced chi^2 between BOSS spectrum and forward modeled CLAM
              spectrum
          clam_flags:
            name: clam_flags
            type: int64
            unit: ''
            description: "Bitmask indicating potentially unreliable or out-of-distribution\
              \ BOSS-CLAM results. Flags include:\n  - IN_WD (0): likely white dwarf\
              \ in mwm_wd not represented in the training set\n  - IN_YSO (1): likely\
              \ young stellar object in mwm_yso not represented in the training set\n\
              \  - IN_OB (2): likely hot star in mwm_ob with unreliable [Fe/H] or\
              \ [alpha/M] training coverage\n  - FE_H_ALPHA_SUSPECT (3): Teff > 6500\
              \ K, where [Fe/H] and [alpha/M] are poorly constrained\n  - BAD_SPEC_FIT\
              \ (4): reduced chi^2 > 1 indicating poor forward-model fit\n  - LOW_MASS_SUSPECT\
              \ (5): Teff < 4000 K and [Fe/H] < -1 in sparsely sampled low-mass regime\n\
              \  - FE_H_ALPHA_CORR (6): atypical correlation between [Fe/H], [alpha/M],\
              \ and Teff\n  - TEFF_LOGG_CORR (7): unphysical negative correlation\
              \ between Teff and logg\n  - LOW_MASS_TEFF_LOGG_CORR (8): weak Teff-logg\
              \ correlation in low-mass stars (Teff < 4200 K)\n  - EXTREME_CORR (9):\
              \ extreme correlations involving [alpha/M]\n  - ALTER_CORR (10): alternating\
              \ correlation structure relative to the bulk population\n"
          flag_warn:
            name: flag_warn
            type: bool
            unit: ''
            description: If IN_OB or FE_H_ALPHA_SUSPECT is set
          flag_bad:
            name: flag_bad
            type: bool
