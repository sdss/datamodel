general:
  name: lvm_drpall
  short: Summary table of observational, instrumental, and processing metadata for
    each LVM DR20 science exposure.
  description: The drpall-{drpver}.fits  file is a summary table produced by the LVM
    Data Reduction Pipeline (DRP) that compiles observational, instrumental, and processing
    metadata for each science exposure included in DR20; each row corresponds to an
    individual exposure (identified by tileid, mjd, and expnum) and contains detailed
    information on telescope pointing, observing conditions, and instrument configuration
    for the science field (SCI) and associated sky fields (SKYE and SKYW), including
    astrometry, airmass, altitude, focus metrics, and angular separations from the
    Moon, as well as lunar and solar conditions at the time of observation; in addition,
    it records pipeline-related information such as reduction stage, processing status,
    quality flags, DRP version, calibration references, and file locations, thereby
    providing a comprehensive master catalog to track data provenance, assess data
    quality, and enable the selection and filtering of LVM DR20 observations for scientific
    analysis.
  datatype: FITS
  filesize: 132 KB
  releases:
  - DR20
  environments:
  - LVM_SPECTRO_REDUX
  surveys:
  - LVM
  - SDSS
  naming_convention: $LVM_SPECTRO_REDUX/[DRPVER]/drpall-[DRPVER].fits
  generated_by: lvmdrp
  data_level: 2.3.3
  design: false
  vac: false
  recommended_science_product: true
changelog:
  description: Describes changes to the datamodel product and/or file structure from
    one release to another
  releases: {}
