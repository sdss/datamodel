general:
  name: lvm_lv_dap
  short: Multi-extension LVM DAP FITS file containing per-fiber stellar and emission-line analysis products for a single Local Volume galaxy exposure with Milky Way foreground subtraction.
  description: The file LV_dap-{rspid}-{snlevel}-{expnum}.{daptype}.fits is the standard multi-extension FITS product delivered by the LVM Data Analysis Pipeline for a single reduced frame or row-stacked-spectra exposure of a Local Volume galaxy field after applying the dedicated Milky Way foreground subtraction procedure described for the DR20 Local Volume products. The PRIMARY extension preserves the original input header for traceability, while the remaining table extensions store the position table of each science fiber on the sky, the luminosity-weighted and mass-weighted stellar properties derived from the stellar decomposition, the coefficients of the resolved-stellar-population decomposition, the emission-line measurements from the first and second parametric analyses, the non-parametric emission-line measurements for the blue, red, and infrared spectrograph arms, the instrumental-resolution-corrected velocity dispersions and reduced chi-square values for each analyzed emission line, the average instrumental-resolution correction and chi-square statistics for each line, and the configuration parameters adopted to run the LVM-DAP. For these Local Volume products, the standard DAP analysis is repeated after masking the extragalactic target, modeling the Milky Way emission-line contribution from the non-masked regions with an interpolation scheme, detecting and subtracting foreground stars through cross-matching with Gaia DR3, and fine-tuning the redshift range to match the extragalactic target. Emission-line fluxes are reported in units of 10^-16 erg/s/cm^2 measured in one fiber area, where each fiber area corresponds to 0.2718 arcmin^2; continuum flux densities are reported in units of 10^-16 erg/s/cm^2/Angstrom measured in one fiber area.
  datatype: FITS
  filesize: 56 MB
  releases:
  - DR20
  environments:
  - LVM_SPECTRO_ANALYSIS
  surveys:
  - SDSS
  naming_convention: $LVM_SPECTRO_ANALYSIS/[DRPVER]/[DAPVER]/[TILEGRP]/[TILEID]/[MJD]/[EXPNUM]/LV_dap-[RSPID]-[SNLEVEL]-[EXPNUM]\.[DAPTYPE]\.fits$
  generated_by: lvmdap
  data_level: 2.3.3
  design: false
  vac: false
  recommended_science_product: false
changelog:
  description: Describes changes to the datamodel product and/or file structure from one release to another
  releases: {}
