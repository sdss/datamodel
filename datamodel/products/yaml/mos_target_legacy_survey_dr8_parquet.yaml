general:
  name: mos_target_legacy_survey_dr8_parquet
  short: 'MOS Target Table: legacy_survey_dr8'
  description: 'Legacy Survey DR8 catalogue derived from ''sweep'' catalogues.


    For more information see <a href="<a href="https://www.legacysurvey.org/dr8/">https://www.legacysurvey.org/dr8/</a>">https://www.legacysurvey.org/dr8/">https://www.legacysurvey.org/dr8/</a></a>.'
  datatype: PARQUET
  filesize: 7 GB
  releases:
  - DR20
  environments:
  - MOS_TARGET
  surveys:
  - SDSS
  naming_convention: $MOS_TARGET/[V_TARG]/[FTYPE]/mos_legacy_survey_dr8.[FTYPE] with
    FTYPE='parquet' and V_TARG='2.0.0' for DR20.
  generated_by: sdss5db targeting database.
  data_level: 2.3.3
  design: false
  vac: false
  recommended_science_product: false
changelog:
  description: Describes changes to the datamodel product and/or file structure from
    one release to another
  releases: {}
releases:
  DR20:
    template: $MOS_TARGET/[V_TARG]/[FTYPE]/mos_legacy_survey_dr8.[FTYPE]
    example: 2.0.0/parquet/mos_legacy_survey_dr8.parquet
    location: '{v_targ}/{ftype}/mos_legacy_survey_dr8.{ftype}'
    environment: MOS_TARGET
    access:
      in_sdss_access: true
      path_name: mos_target_legacy_survey_dr8
      path_template: $MOS_TARGET/{v_targ}/{ftype}/mos_legacy_survey_dr8@mos_target_num2|.{ftype}
      path_kwargs:
      - ftype
      - v_targ
      access_string: mos_target_legacy_survey_dr8 = $MOS_TARGET/{v_targ}/{ftype}/mos_legacy_survey_dr8.{ftype}
    survey: SDSS
    dataframe:
      columns:
        release:
          name: release
          dtype: Int32
          unit: ''
          description: 'Unique integer denoting the camera and filter set used (RELEASE
            documentation: https://www.legacysurvey.org/release/)'
        brickid:
          name: brickid
          dtype: Int64
          unit: ''
          description: A unique Brick ID (in the range 1-662174)
        brickname:
          name: brickname
          dtype: String
          unit: ''
          description: Name of brick, encoding the brick sky position, eg "1126p222"
            near RA=112.6, Dec=+22.2
        objid:
          name: objid
          dtype: Int64
          unit: ''
          description: Catalog object number within this brick; a unique identifier
            hash is RELEASE,BRICKID,OBJID; OBJID spans 0 to N-1 and is contiguously
            enumerated within each blob
        type:
          name: type
          dtype: String
          unit: ''
          description: 'Morphological model: "PSF"=stellar, "REX"="round exponential
            galaxy" = round EXP galaxy with a variable radius, "EXP"=exponential,
            "DEV"=deVauc, "COMP"=composite, "DUP"==Gaia source fit by different model.
            Note that in some FITS readers, a trailing space may be appended for "PSF
            ", "EXP " and "DEV " since the column data type is a 4-character string'
        ra:
          name: ra
          dtype: Float64
          unit: deg
          description: Right ascension at equinox J2000
        dec:
          name: dec
          dtype: Float64
          unit: deg
          description: Declination at equinox J2000
        ra_ivar:
          name: ra_ivar
          dtype: Float32
          unit: 1/deg^2
          description: Inverse variance of RA (no cosine term!), excluding astrometric
            calibration errors
        dec_ivar:
          name: dec_ivar
          dtype: Float32
          unit: 1/deg^2
          description: Inverse variance of DEC, excluding astrometric calibration
            errors
        dchisq_psf:
          name: dchisq_psf
          dtype: Float32
          unit: ''
          description: 'Difference in chi2 between successively more-complex model
            fits: PSF. The difference is versus no source.'
        dchisq_rex:
          name: dchisq_rex
          dtype: Float32
          unit: ''
          description: 'Difference in chi2 between successively more-complex model
            fits: REX. The difference is versus no source.'
        dchisq_dev:
          name: dchisq_dev
          dtype: Float32
          unit: ''
          description: 'Difference in chi2 between successively more-complex model
            fits: DEV. The difference is versus no source.'
        dchisq_exp:
          name: dchisq_exp
          dtype: Float32
          unit: ''
          description: 'Difference in chi2 between successively more-complex model
            fits: EXP. The difference is versus no source.'
        dchisq_comp:
          name: dchisq_comp
          dtype: Float32
          unit: ''
          description: 'Difference in chi2 between successively more-complex model
            fits: COMP. The difference is versus no source.'
        ebv:
          name: ebv
          dtype: Float32
          unit: mag
          description: Galactic extinction E(B-V) reddening from SFD98, used to compute
            MW_TRANSMISSION
        flux_g:
          name: flux_g
          dtype: Float32
          unit: nanomaggies
          description: model flux in g
        flux_r:
          name: flux_r
          dtype: Float32
          unit: nanomaggies
          description: model flux in r
        flux_z:
          name: flux_z
          dtype: Float32
          unit: nanomaggies
          description: model flux in z
        flux_w1:
          name: flux_w1
          dtype: Float32
          unit: nanomaggies
          description: WISE model flux in W1 (AB system)
        flux_w2:
          name: flux_w2
          dtype: Float32
          unit: nanomaggies
          description: WISE model flux in W2 (AB system)
        flux_w3:
          name: flux_w3
          dtype: Float32
          unit: nanomaggies
          description: WISE model flux in W3 (AB system)
        flux_w4:
          name: flux_w4
          dtype: Float32
          unit: nanomaggies
          description: WISE model flux in W4 (AB system)
        flux_ivar_g:
          name: flux_ivar_g
          dtype: Float32
          unit: 1/nanomaggies^2
          description: Inverse variance of FLUX_G
        flux_ivar_r:
          name: flux_ivar_r
          dtype: Float32
          unit: 1/nanomaggies^2
          description: Inverse variance of FLUX_R
        flux_ivar_z:
          name: flux_ivar_z
          dtype: Float32
          unit: 1/nanomaggies^2
          description: Inverse variance of FLUX_Z
        flux_ivar_w1:
          name: flux_ivar_w1
          dtype: Float32
          unit: 1/nanomaggies^2
          description: Inverse variance of FLUX_W1 (AB system)
        flux_ivar_w2:
          name: flux_ivar_w2
          dtype: Float32
          unit: 1/nanomaggies^2
          description: Inverse variance of FLUX_W2 (AB system)
        flux_ivar_w3:
          name: flux_ivar_w3
          dtype: Float32
          unit: 1/nanomaggies^2
          description: Inverse variance of FLUX_W3 (AB system)
        flux_ivar_w4:
          name: flux_ivar_w4
          dtype: Float32
          unit: 1/nanomaggies^2
          description: Inverse variance of FLUX_W4 (AB system)
        mw_transmission_g:
          name: mw_transmission_g
          dtype: Float32
          unit: ''
          description: Galactic transmission in g filter in linear units
        mw_transmission_r:
          name: mw_transmission_r
          dtype: Float32
          unit: ''
          description: Galactic transmission in r filter in linear units
        mw_transmission_z:
          name: mw_transmission_z
          dtype: Float32
          unit: ''
          description: Galactic transmission in z filter in linear units
        mw_transmission_w1:
          name: mw_transmission_w1
          dtype: Float32
          unit: ''
          description: Galactic transmission in W1 filter in linear units
        mw_transmission_w2:
          name: mw_transmission_w2
          dtype: Float32
          unit: ''
          description: Galactic transmission in W2 filter in linear units
        mw_transmission_w3:
          name: mw_transmission_w3
          dtype: Float32
          unit: ''
          description: Galactic transmission in W3 filter in linear units
        mw_transmission_w4:
          name: mw_transmission_w4
          dtype: Float32
          unit: ''
          description: Galactic transmission in W4 filter in linear units
        nobs_g:
          name: nobs_g
          dtype: Int32
          unit: ''
          description: 'Number of images that contribute to the central pixel in g:
            filter for this object (not profile-weighted)'
        nobs_r:
          name: nobs_r
          dtype: Int32
          unit: ''
          description: 'Number of images that contribute to the central pixel in r:
            filter for this object (not profile-weighted)'
        nobs_z:
          name: nobs_z
          dtype: Int32
          unit: ''
          description: 'Number of images that contribute to the central pixel in z:
            filter for this object (not profile-weighted)'
        nobs_w1:
          name: nobs_w1
          dtype: Int32
          unit: ''
          description: 'Number of images that contribute to the central pixel in W1:
            filter for this object (not profile-weighted)'
        nobs_w2:
          name: nobs_w2
          dtype: Int32
          unit: ''
          description: 'Number of images that contribute to the central pixel in W2:
            filter for this object (not profile-weighted)'
        nobs_w3:
          name: nobs_w3
          dtype: Int32
          unit: ''
          description: 'Number of images that contribute to the central pixel in W3:
