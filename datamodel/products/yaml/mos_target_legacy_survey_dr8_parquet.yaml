        rchisq_r:
          name: rchisq_r
          dtype: Float32
          unit: ''
          description: Profile-weighted chi2 of model fit normalized by the number
            of pixels in r
        rchisq_z:
          name: rchisq_z
          dtype: Float32
          unit: ''
          description: Profile-weighted chi2 of model fit normalized by the number
            of pixels in z
        rchisq_w1:
          name: rchisq_w1
          dtype: Float32
          unit: ''
          description: Profile-weighted chi2 of model fit normalized by the number
            of pixels in W1
        rchisq_w2:
          name: rchisq_w2
          dtype: Float32
          unit: ''
          description: Profile-weighted chi2 of model fit normalized by the number
            of pixels in W2
        rchisq_w3:
          name: rchisq_w3
          dtype: Float32
          unit: ''
          description: Profile-weighted chi2 of model fit normalized by the number
            of pixels in W3
        rchisq_w4:
          name: rchisq_w4
          dtype: Float32
          unit: ''
          description: Profile-weighted chi2 of model fit normalized by the number
            of pixels in W4
        fracflux_g:
          name: fracflux_g
          dtype: Float32
          unit: ''
          description: Profile-weighted fraction of the flux from other sources divided
            by the total flux in g (typically in 0..1)
        fracflux_r:
          name: fracflux_r
          dtype: Float32
          unit: ''
          description: Profile-weighted fraction of the flux from other sources divided
            by the total flux in r (typically in 0..1)
        fracflux_z:
          name: fracflux_z
          dtype: Float32
          unit: ''
          description: Profile-weighted fraction of the flux from other sources divided
            by the total flux in z (typically in 0..1)
        fracflux_w1:
          name: fracflux_w1
          dtype: Float32
          unit: ''
          description: Profile-weighted fraction of the flux from other sources divided
            by the total flux in W1 (typically in 0..1)
        fracflux_w2:
          name: fracflux_w2
          dtype: Float32
          unit: ''
