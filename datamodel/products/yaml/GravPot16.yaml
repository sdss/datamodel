general:
  name: GravPot16
  short: Main orbital elements of DR20 stars using GravPot16.
  description: "The VAC contains the median statistics of 50 ensemble of orbits for\
    \ each star, integrated over a 3 Gyr timespan. Orbits were computed in a model\
    \ configuration with bar patterns speed of 41 km/s/kpc (<a href=\"https://ui.adsabs.harvard.edu/abs/2019MNRAS.488.4552S\"\
    >Sanders et al. 2019</a>). To the Galactic orbits, we adopt a solar position of\
    \ R_sun = 8.178 kpc (<a href=\"https://ui.adsabs.harvard.edu/abs/2019A&A...625L..10G\"\
    >Gravity Collaboration et al. 2019</a>), Z_sun = 25 pc (<a href=\"https://ui.adsabs.harvard.edu/abs/2008ApJ...673..864J\"\
    >Juri\u0107 2008</a>), and solar motion of [U_sun, V_LSR + V_sun, W_sun] = [11.10,\
    \ 248.5, 7.25] km/s, in line with <a href=\"https://ui.adsabs.harvard.edu/abs/2011AN....332..461B\"\
    >Brunthaler et al. 2011</a> and <a href=\"https://ui.adsabs.harvard.edu/abs/2020ApJ...892...39R\"\
    >Reid & Brunthaler 2020</a>. We assumed a bar angle of 20 degrees, and a bar mass\
    \ of 11 billions Solar mass, in line with Fern\xE1ndez Trincado (2017, PhD.-Thesis)\
    \ and <a href=\"https://https://ui.adsabs.harvard.edu/abs/2020MNRAS.495.4113F\"\
    >Fern\xE1ndez-Trincado et al. 2020</a>."
  datatype: FITS
  filesize: 326 MB
  releases:
  - DR20
  environments:
  - MWM_ORBITS
  surveys:
  - SDSS
  naming_convention: $MWM_ORBITS/GravPot16-[V_VAC].fits where V_VAC=1.0.0 for DR20
  generated_by: https://gravpot.utinam.cnrs.fr
  data_level: 3.3.0
  design: false
  vac: false
  recommended_science_product: true
