          comment: ''
        - key: COMMENT
          value: ''
          comment: ''
        columns:
          FUNC:
            name: FUNC
            type: char[8]
            unit: ''
            description: describes the function used to fit the wavelength solutions
              (units of log-10 Angstroms) and Y-positions to a functional form. Chebyshev
              or Legendre functions are used. The default value is taken as Legendre
              function.
          XMIN:
            name: XMIN
            type: float64
            unit: ''
            description: minimum value of the independent variable which is used along
              with the fitting coefficients, in the fitting function to get the value
              of dependent variable, which is the wavelength solution.
          XMAX:
            name: XMAX
            type: float64
            unit: ''
            description: maximum value of the independent variable used by fitting
              function.
          COEFF:
            name: COEFF
            type: float64[3000]
            unit: ''
            description: fit coefficents
      hdu3:
        name: FIBERMASK
        description: The HDU 3 data stores the fibermask. These are fiber status bits
          and are set to non-zero to indicate bad status. The status bits used for
          masking are documented in $IDLUTILS/$IDLUTILS_VER/data/sdss/sdssMaskbits.par.
        is_image: true
