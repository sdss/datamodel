      hdu2:
        name: WSET
        description: The HDU 2 data is a binary table whose fields are used to calculate
          wavelength solution (units of log10 Angstroms) for the arc calibration frames.
          The Y-positions on the CCD, which is the independent variable and corresponding
          wavelength solutions (in Angstroms) which is the dependent variable, are
          fitted to a functional form and the resulting coefficients are stored in
          the binary table. The use of these coefficients is described in the notes
          below
        is_image: false
        size: 23 KB
        header:
        - key: XTENSION
          value: BINTABLE
          comment: Binary table written by MWRFITS v1.13
        - key: BITPIX
          value: 8
          comment: Required value
        - key: NAXIS
