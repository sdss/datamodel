    example: v6_2_1/trace/60708/spTraceArc-b2-00046743.fits.gz
    location: '{run2d}/trace/{mjd}/spTraceArc-{br}{id}-{frame}.fits.gz'
    environment: BOSS_SPECTRO_REDUX
