general:
  name: spTraceArc
  short: Extacted Arc Frame and wavelength solution
  description: This file contains information about flux density, wavelength solution,
    fibermask and line width obtained from extracted arc calibration frames for the
    creation of the spTraceTab and spTraceFlat files used in the BOSS spectrograph
    data reduction process. It is identical in form to the spArc files used in the
    main pipeline, but is generated specifically for the trace building process.
  datatype: FITS
  filesize: 302 KB
  releases:
  - IPL4
  - DR20
  environments:
  - BOSS_SPECTRO_REDUX
  surveys:
  - SDSS
  naming_convention: $BOSS_SPECTRO_REDUX/[RUN2D]/trace/[MJD]/spTraceArc-[BR][ID]-[FRAME].fits
  generated_by: idlspec2d - SPBUILD_TRACEFLAT
  data_level: 1.2.2
  design: false
  vac: false
  recommended_science_product: false
changelog:
  description: Describes changes to the datamodel product and/or file structure from
    one release to another
  releases:
    DR20:
      from: IPL4
      note: No changes
