general:
  name: mos_target_sdss_id_stacked_parquet
  short: 'MOS Target Table: sdss_id_stacked'
  description: 'This table includes associations between sdss_id identifiers and the
    matched catalogids for each catalogue cross-match.


    The table contains one row per sdss_id with columns for each catalogid version.
    However, catalogids may be associated with multiple sdss_id. dr20_sdss_id_flat
    is a pivoted/flattened version of this table and contains information about the
    preferred sdss_id for a catalogid.


    Note: The sdss_id match was extended internally for a more recent crossmatch not
    yet part of the publicly released data. As such, the ra/dec_sdss_id columns may
    differ from the catalogid coordinates.'
  datatype: PARQUET
  filesize: 2 GB
  releases:
  - DR20
  environments:
  - MOS_TARGET
  surveys:
  - SDSS
  naming_convention: $MOS_TARGET/[V_TARG]/[FTYPE]/mos_sdss_id_stacked.[FTYPE] with
    FTYPE='parquet' and V_TARG='2.0.0' for DR20.
  generated_by: sdss5db targeting database.
  data_level: 2.3.3
  design: false
  vac: false
  recommended_science_product: false
changelog:
  description: Describes changes to the datamodel product and/or file structure from
    one release to another
  releases: {}
releases:
  DR20:
    template: $MOS_TARGET/[V_TARG]/[FTYPE]/mos_sdss_id_stacked.[FTYPE]
    example: 2.0.0/parquet/mos_sdss_id_stacked.parquet
    location: '{v_targ}/{ftype}/mos_sdss_id_stacked.{ftype}'
    environment: MOS_TARGET
    access:
      in_sdss_access: true
      path_name: mos_target_sdss_id_stacked
      path_template: $MOS_TARGET/{v_targ}/{ftype}/mos_sdss_id_stacked@mos_target_num2|.{ftype}
      path_kwargs:
      - ftype
      - v_targ
      access_string: mos_target_sdss_id_stacked = $MOS_TARGET/{v_targ}/{ftype}/mos_sdss_id_stacked.{ftype}
    survey: SDSS
    dataframe:
      columns:
        catalogid21:
          name: catalogid21
          dtype: Int64
          unit: ''
          description: The catalogid for the best matched object in the v0.1 cross-match
            (pk=21).
        catalogid25:
          name: catalogid25
          dtype: Int64
          unit: ''
          description: The catalogid for the best matched object in the v0.5 cross-match
            (pk=25).
        catalogid31:
          name: catalogid31
          dtype: Int64
          unit: ''
          description: The catalogid for the best matched object in the v1 cross-match
            (pk=31).
        ra_sdss_id:
          name: ra_sdss_id
          dtype: Float64
          unit: ''
          description: The right ascension of the target in ICRS J2015.5 coordinates
            (taken from the highest version catalogid).
        dec_sdss_id:
          name: dec_sdss_id
          dtype: Float64
          unit: ''
          description: The declination of the target in ICRS J2015.5 coordinates (taken
            from the highest version catalogid).
        sdss_id:
          name: sdss_id
          dtype: Int64
          unit: ''
          description: The SDSS identifier for a unique object.
      metadata: {}
notes: |-
  None
regrets: |-
  I  have no regrets!
