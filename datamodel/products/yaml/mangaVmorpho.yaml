general:
  name: mangaVmorpho
  short: This catalogue contains a direct visual morphological classification 
    based on the inspection of image mosaics generated from a combination of 
    SDSS and Dark Energy Legacy Surveys (DESI; legacysurvey.
  description: 'This catalogue contains a direct visual morphological classification
    based on the inspection of image mosaics generated from a combination of SDSS
    and Dark Energy Legacy Surveys (DESI; legacysurvey.org ) images, for all galaxies
    in the MaNGA DR17 with unique MaNGA-ID. After a digital image post-processing,
    we exploit the advantages of these images to identify inner structures, as well
    as external low surface brightness features for an homogeneous classification.
    We provide the corresponding mosaics for all MaNGA DR17 galaxies, and also a new
    estimate of the structural CAS parameters (Concentration, Asymmetry and Clumpiness)
    based on the DESI images. A detailed description of how images were processed
    and combined, as well as the steps to carry out the classification are presented
    in a couple of companion papers: Vazquez-Mata et al. (2022) and Vazquez-Mata et
    al, in prep. This catalogue is an extension of the previous DR15 version with
    changes described in Version 1.0.1'
  datatype: FITS
  filesize: 421 KB
  releases:
    - DR16
    - DR17
  environments:
    - MANGA_MORPHOLOGY
  surveys:
    - MaNGA
  naming_convention: 
    $MANGA_MORPHOLOGY/manga_visual_morpho/[VMVER]/manga_visual_morpho-[VMVER].fits
    where VMVER=1.0.1 for DR16 and VMVER=2.0.1 for DR17.
  generated_by: J. Antonio Vazquez-Mata, Hector Hernandez-Toledo and Martin 
    Herrera-Endoqui this product.
  data_level: 3.3.0
  design: false
  vac: true
  recommended_science_product: true
