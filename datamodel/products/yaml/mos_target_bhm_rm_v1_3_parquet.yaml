general:
  name: mos_target_bhm_rm_v1_3_parquet
  short: 'MOS Target Table: bhm_rm_v1_3'
  description: "arent sample for the RM project.\n\nUsed to select confirmed and candidate\
    \ quasar targets for the BHM-RM Program in SDSS-V. For more details please see\
    \ Yang and Shen, (2022, <a href=\"https://ui.adsabs.harvard.edu/abs/2022arXiv220608989Y/abstract)\"\
    >https://ui.adsabs.harvard.edu/abs/2022arXiv220608989Y/abstract)</a>.\n\nThis\
    \ table contains all photometric objects detected in the COSMOS, SDSS-RM, XMM-LSS,\
    \ CDFS, S-CVZ, and ELAIS-S1 fields., within a circular area of 10 degree^2 from\
    \ the field center.\n\nField center: Name     RA          DEC\n              XMM-LSS\
    \  02:22:50.00    -04:45:00.0\n              CDFS     03:30:35.60    -28:06:00.0\n\
    \              EDFS     04:04:57.84    -48:25:22.8\n              ELAIS-S1 00:37:48.00\
    \    -44:00:00.0\n              COSMOS   10:00:00.00    +02:12:00.0\n        \
    \      SDSS-RM  14:14:49.00    +53:05:00.0\n              S-CVZ    06:00:00.00\
    \    -66:33:38.0\n\nThe table includes information from the following survey data\
    \ releases:\nPS1: Pan-STARRS, DR1, StackObjectThin\nSDSS: Sloan Digital Sky Survey,\
    \ DR14, PhotoObjAll\nGaia: DR2, gaia_dr2.gaia_source, DR3, gaia_dr3.gaia_source\n\
    Legacy Survey DR8 and DR10.\nValues are set to -9.0 or -9 if null.\n\nThe dr20_bhm_rm_v1_3\
    \ table corresponds to Version: v1, 07/31/2023\n\n[INCOMPLETE]: Tom to check summary\
    \ and missing column descriptions."
