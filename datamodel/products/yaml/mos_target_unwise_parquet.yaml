general:
  name: mos_target_unwise_parquet
  short: 'MOS Target Table: unwise'
  description: 'The unWISE catalog, containing the positions and fluxes of approximately
    two billion objects observed by the Wide-field Infrared Survey Explorer (WISE).


    For more details, see Schlafly et al. (2019). The original catalogs are hosted
    at <a href="https://catalog.unwise.me/catalogs.html">https://catalog.unwise.me/catalogs.html</a>'
  datatype: PARQUET
  filesize: 11 GB
  releases:
  - DR20
  environments:
  - MOS_TARGET
  surveys:
  - SDSS
  naming_convention: $MOS_TARGET/[V_TARG]/parquet/mos_unwise.parquet with V_TARG=2.0.0
    for DR20.
  generated_by: sdss5db targeting database.
  data_level: 2.3.3
  design: false
  vac: false
  recommended_science_product: false
