general:
  name: mos_target_sdss_id_flat_parquet
  short: 'MOS Target Table: sdss_id_flat'
  description: 'This table includes associations between sdss_id identifiers and the
    best matched catalogid for each catalogue cross-match.


    Unlike dr20_sdss_id_stacked, this table contains multiple rows per sdss_id, one
    for each cross-match association. When multiple sdss_ids are associated with the
    same catalogid, the one with the lowest rank (rank=1) should be preferred.


    Note: The sdss_id match was extended internally for a more recent crossmatch not
    yet part of the publicly released data. As such, the ra/dec_sdss_id columns may
    differ from the catalogid coordinates.'
  datatype: PARQUET
  filesize: 8 GB
  releases:
  - DR20
  environments:
  - MOS_TARGET
  surveys:
  - SDSS
  naming_convention: $MOS_TARGET/[V_TARG]/[FTYPE]/mos_sdss_id_flat.[FTYPE] with FTYPE='parquet'
    and V_TARG='2.0.0' for DR20.
  generated_by: sdss5db targeting database.
  data_level: 2.3.3
  design: false
  vac: false
  recommended_science_product: false
changelog:
  description: Describes changes to the datamodel product and/or file structure from
    one release to another
  releases: {}
releases:
  DR20:
    template: $MOS_TARGET/[V_TARG]/[FTYPE]/mos_sdss_id_flat.[FTYPE]
    example: 2.0.0/parquet/mos_sdss_id_flat.parquet
    location: '{v_targ}/{ftype}/mos_sdss_id_flat.{ftype}'
    environment: MOS_TARGET
    access:
      in_sdss_access: true
      path_name: mos_target_sdss_id_flat
      path_template: $MOS_TARGET/{v_targ}/{ftype}/mos_sdss_id_flat@mos_target_num3|.{ftype}
      path_kwargs:
      - ftype
      - v_targ
      access_string: mos_target_sdss_id_flat = $MOS_TARGET/{v_targ}/{ftype}/mos_sdss_id_flat.{ftype}
    survey: SDSS
    dataframe:
      columns:
        sdss_id:
          name: sdss_id
          dtype: Int64
          unit: ''
          description: The SDSS identifier for a unique object.
        catalogid:
          name: catalogid
          dtype: Int64
          unit: ''
          description: The associated catalogid for this target.
        version_id:
          name: version_id
          dtype: Int16
          unit: ''
          description: The version of the cross-match associated with the catalogid.
        ra_sdss_id:
          name: ra_sdss_id
          dtype: Float64
          unit: ''
          description: The right ascension of the target in ICRS J2015.5 coordinates
            (taken from the highest version catalogid in dr20_sdss_id_stacked).
        dec_sdss_id:
          name: dec_sdss_id
          dtype: Float64
          unit: ''
          description: The declination of the target in ICRS J2015.5 coordinates (taken
            from the highest version catalogid in dr20_sdss_id_stacked).
        n_associated:
          name: n_associated
          dtype: Int16
          unit: ''
          description: The number of sdss_ids associated with this catalogid.
        ra_catalogid:
          name: ra_catalogid
          dtype: Float64
          unit: ''
          description: The right ascension of this row's catalogid from the dr20_catalog
            table.
        dec_catalogid:
          name: dec_catalogid
          dtype: Float64
          unit: ''
          description: The declination of this row's catalogid from the dr20_catalog
            table.
        pk:
          name: pk
          dtype: Int64
          unit: ''
          description: The primary key. A sequential identifier for this table.
        rank:
          name: rank
          dtype: Int32
          unit: ''
          description: The rank of the sdss_id to catalogid association. When multiple
            sdss_ids are associated with the same catalogid, the one with the lowest
            rank (rank=1) should be preferred.
      metadata: {}
notes: |-
  None
regrets: |-
  I  have no regrets!
