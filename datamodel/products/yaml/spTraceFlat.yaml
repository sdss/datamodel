        columns:
          FUNC:
            name: FUNC
            type: char[8]
            unit: ''
            description: function used to fit the Y-pixel positions on the CCD and
              corresponding X-centers are fitted to a functional form. Polynomial,
              Chebyshev, Legendre or Chebyshev_split functions are used. Default value
              is taken as Legendre function
          XMIN:
            name: XMIN
            type: float64
            unit: ''
            description: minimum value of the independent variable which is used along
              with the fitting coefficients, in the fitting function to get the value
              of dependent variable, which is the X-center of fibers.
          XMAX:
            name: XMAX
            type: float64
            unit: ''
            description: maximum value of the independent variable used by fitting
              function.
          COEFF:
            name: COEFF
            type: float64[3500]
            unit: ''
            description: fit coefficients
