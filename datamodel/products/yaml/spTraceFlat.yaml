      hdu1:
        name: TSET
        description: The HDU 1 data is a binary table whose fields are used to calculate
          the X-centers, for all fibers in the flat-field calibration frames. The
          Y-pixel positions on the CCD, which is the independent variable and the
          corresponding X-centers, which is the dependent variable are fitted to a
          functional form and the resulting coefficients are stored in the binary
          table.
