general:
  name: spTraceFlat
  short: Extracted fiber flats, and associated data for Arc to Trace mapping creation
  description: This file contains information about fiberflats, X-centers of fibers,
    fibermask, profile width and superflat obtained from extracted flat calibration
    frames. It is a modified version of the spFlat file, with additional HDUs for
    the extracted fiberflat flux, ivar, and wavelength solution. This file is used
    to build the spTraceTab file for a given MJD and Observatory.
  datatype: FITS
  filesize: 19 MB
  releases:
  - IPL4
  - DR20
  environments:
  - BOSS_SPECTRO_REDUX
  surveys:
  - SDSS
  naming_convention: $BOSS_SPECTRO_REDUX/[RUN2D]/trace/[MJD]/spTraceFlat-[BR][ID]-[FRAME].fits
  generated_by: idlspec2d - SPBUILD_TRACEFLAT
  data_level: 1.2.1
  design: false
  vac: false
  recommended_science_product: false
changelog:
  description: Describes changes to the datamodel product and/or file structure from
    one release to another
  releases:
    DR20:
      from: IPL4
      note: No changes
releases:
  IPL4:
    template: $BOSS_SPECTRO_REDUX/[RUN2D]/trace/[MJD]/spTraceFlat-[BR][ID]-[FRAME].fits.gz
    example: v6_2_1/trace/60708/spTraceFlat-b2-00046742.fits.gz
    location: '{run2d}/trace/{mjd}/spTraceFlat-{br}{id}-{frame}.fits.gz'
    environment: BOSS_SPECTRO_REDUX
    access:
      in_sdss_access: true
      path_name: spTraceFlat
      path_template: $BOSS_SPECTRO_REDUX/{run2d}/trace/{mjd}/spTraceFlat-{br}{id}-{frame}.fits
      path_kwargs:
      - frame
      - br
      - mjd
      - id
      - run2d
      access_string: spTraceFlat = $BOSS_SPECTRO_REDUX/{run2d}/trace/{mjd}/spTraceFlat-{br}{id}-{frame}.fits.gz
    survey: SDSS
    hdus:
