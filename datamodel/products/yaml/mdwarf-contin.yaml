general:
  name: mdwarf-contin
  short: M dwarf pseudo-continuum used to standardize BOSS spectra
  description: M dwarf pseudo-continuum from Medan, Way, et al. (2025), which can
    be used to standardize BOSS spectra of M dwarfs. When standardized, the issues
    in flux calibration in the optical spectra are removed such that M dwarfs of similar
    stellar parameters should not have comparable spectrum shapes and features. This
    VAC includes all meta-data from mwmAllVisit, flux and ivar from the mwmVisit files,
    and the computed pseudo-continuum for the subset of M dwarfs in DR20.
  datatype: H5
  filesize: 27 GB
  releases:
  - DR20
  environments:
  - VAC_ROOT
  surveys:
  - SDSS
  naming_convention: $VAC_ROOT/mwm/mdwarf-contin/mdwarf-contin-standardization-[V_VAC].h5
  generated_by: https://github.com/imedan/mdwarf_contin/tree/1.0.0
  data_level: 2.3.3
  design: false
  vac: false
  recommended_science_product: false
changelog:
  description: First version of datamodel
  releases: {}
