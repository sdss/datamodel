general:
  name: mos_target_bhm_csc_v3_parquet
  short: 'MOS Target Table: bhm_csc_v3'
  description: 'Chandra Source Catalog (CSC) 2.1 Optical/IR Counterparts Catalog

    2022 Dec. See <a href="https://asc.harvard.edu/csc2.1/index.html">https://asc.harvard.edu/csc2.1/index.html</a>
    for the CSC 2.1 release notes and documentation.'
  datatype: PARQUET
