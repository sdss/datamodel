general:
  name: mos_target_gaia_dr3_source
  short: 'MOS Target Table: gaia_dr3_source'
  description: The main Gaia Data Release 3 source tbale. This table has an entry
    for every Gaia observed source as published with this data release. It contains
    the basic source parameters, in their final state as processed by the Gaia Data
    Processing and Analysis Consortium from the raw data coming from the spacecraft.
    For more details, refer to <a href="https://gea.esac.esa.int/archive/documentation/GDR3/Gaia_archive/chap_datamodel/sec_dm_main_source_catalogue/ssec_dm_gaia_source.html">https://gea.esac.esa.int/archive/documentation/GDR3/Gaia_archive/chap_datamodel/sec_dm_main_source_catalogue/ssec_dm_gaia_source.html</a>.
  datatype: FITS
  filesize: 1 GB
  releases:
  - DR20
  environments:
  - MOS_TARGET
  surveys:
  - SDSS
  naming_convention: $MOS_TARGET/[V_TARG]/[FTYPE]/mos_gaia_dr3_source-[NUM].[FTYPE]
    with FTYPE='fits', V_TARG='2.0.0', and NUM=1..34 for DR20.
  generated_by: sdss5db targeting database.
  data_level: 2.3.3
  design: false
  vac: false
  recommended_science_product: false
changelog:
  description: Describes changes to the datamodel product and/or file structure from
    one release to another
  releases: {}
