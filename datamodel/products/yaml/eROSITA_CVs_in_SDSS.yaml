general:
  name: eROSITA_CVs_in_SDSS
  short: Cataclysmic variables identified from screening of SDSS-V spectra based from
    eROSITA X-ray sources
  description: Cataclysmic variable binaries confirmed by screening and visual inspection
    of SDSS-V spectra of eROSITA eRASS1 and eRASS:3 X-ray sources, with optical data
    from Gaia DR3 and X-ray data from eRASS:3
  datatype: FITS
  filesize: 177 KB
  releases:
  - DR20
  environments:
  - MWM_WHITEDWARF
  surveys:
  - SDSS
  naming_convention: $MWM_WHITEDWARF/eROSITA_CVs/eROSITA_CVs_in_SDSS-[V_VAC].fits
    where V_VAC=1.0.0 in DR20.
  generated_by: Jaco Brink and collaborators within eROSITA and SDSS-V this product.
  data_level: 3.3.0
  design: false
  vac: true
  recommended_science_product: true
changelog:
