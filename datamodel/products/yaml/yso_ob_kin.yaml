general:
  name: yso_ob_kin
  short: Catalogue of ~45,000 OB stars used to study the Milky Way disc kinematics.
  description: 'This is a catalogue of ~45,000 OB stars accompanying the paper "The
    large-scale kinematics of young stars in the Milky Way disc: first results from
    SDSS-V (<a href="https://ui.adsabs.harvard.edu/abs/2025A%26A...703A.303Z/abstract">Zari
    et al., 2025</a>). The catalogue is described in detail in Section 2.2. of <a
    href="https://ui.adsabs.harvard.edu/abs/2025A%26A...703A.303Z/abstract">Zari et
    al., 2025</a>. It contains Galactocentric cartesian coordinates and radial velocities
    and age estimates of the sample used in the paper.'
  datatype: FITS
  filesize: 8 MB
  releases:
  - DR20
  environments:
  - MWM_YSO
  surveys:
  - SDSS
  naming_convention: $MWM_YSO/ob-kin/ob_vac-[V_VAC].fits, where V_VAC=1.0.0 in DR20
  generated_by: 'Eleonora Zari'
  data_level: 3.3.0
  design: false
  vac: false
  recommended_science_product: false
changelog:
  description: Describes changes to the datamodel product and/or file structure from
    one release to another
  releases: {}
