general:
  name: sdR_S
  short: BOSS spectrograph data
  description: This file contains raw spectro data from the BHM+MWM spectro CCDs from
    LCO. Simultaneous frames in different chips all have the same frame number. Which
    frames are what type of observation is indicated by the FLAVOR keyword in each
    header. HDU 0 contains the raw counts as integers (4352x4224).
  datatype: FIT
  filesize: 11 MB
  releases:
  - IPL4
  environments:
  - BOSS_SPECTRO_DATA_S
  surveys:
  - BHM
  - SDSS
  naming_convention: sdR-[br][id]-[FRAME].fit, indicating which blue or red spectrograph
    (1 or 2), and the frame number.
  generated_by: OPS
  data_level: 0.1.2
  design: false
  vac: false
  recommended_science_product: false
changelog:
  description: Describes changes to the datamodel product and/or file structure from
    one release to another
  releases: {}
releases:
  IPL4:
    template: $BOSS_SPECTRO_DATA_S/[MJD]/sdR-[BR][ID]-[FRAME].fit.gz
    example: 60708/sdR-b2-00046778.fit.gz
    location: '{mjd}/sdR-{br}{id}-{frame}.fit.gz'
    environment: BOSS_SPECTRO_DATA_S
    access:
      in_sdss_access: true
      path_name: sdR_S
      path_template: $BOSS_SPECTRO_DATA_S/{mjd}/sdR-{br}{id}-{frame}.fit
      path_kwargs:
      - id
      - br
      - mjd
      - frame
      access_string: sdR_S = $BOSS_SPECTRO_DATA_S/{mjd}/sdR-{br}{id}-{frame}.fit.gz
    survey: SDSS
