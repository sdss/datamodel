general:
  name: lvm_dapall
  short: Summary table of LVM DR20 DAP products and exposure-averaged spectral properties.
  description: The file `dapall-{drpver}-{dapver}.fits` is a summary of the dataproducts
    produced by the LVM DAP analysis for the delivered exposures included in SDSS-V
    DR20. It comprises a binary table in which each row corresponds to an individual
    exposure identified by `tileid`, `mjd`, and `expnum`, together with the corresponding
    DAP file, and contains observational and physical properties derived from stellar-continuum
    fitting and emission-line measurements of the observed spectra. Fluxes listed
    in this file are average values within the field of view of the science IFU and
    are reported in units of 10^-16 erg/s/cm^2 measured in one fiber area, where each
    fiber area corresponds to 0.2718 arcmin^2. The table combines basic observational
    metadata with stellar population parameters and flux measurements of key emission
    lines across the optical and near-infrared range, including Balmer lines, [O II],
    [O III], [N II], [S II], and [S III].
  datatype: FITS
  filesize: 98 KB
  releases:
  - DR20
  environments:
  - LVM_SPECTRO_ANALYSIS
  surveys:
  - SDSS
  - LVM
  naming_convention: $LVM_SPECTRO_ANALYSIS/[DRPVER]/[DAPVER]/dapall-[DRPVER]-[DAPVER]\.fits$
  generated_by: lvmdap
  data_level: 2.3.3
  design: false
  vac: false
  recommended_science_product: true
changelog:
  description: Describes changes to the datamodel product and/or file structure from
    one release to another
  releases: {}
