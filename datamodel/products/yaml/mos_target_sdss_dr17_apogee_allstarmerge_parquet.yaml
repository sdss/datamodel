general:
  name: mos_target_sdss_dr17_apogee_allstarmerge_parquet
  short: 'MOS Target Table: sdss_dr17_apogee_allstarmerge'
  description: In the SDSS-IV APOGEE-2, if a star was observed in multiple fields
    or multiple survey modes (e.g., observed at APO vs. LCO), then the star would
    end up with multiple entries in the summary allStar file. This table merges all
    multiple entries for stars in the DR17 APOGEE allStar file. This file was primarily
    used for target selection for the mwm_bin_rv_long carton.
  datatype: PARQUET
  filesize: 79 MB
  releases:
  - DR20
  environments:
  - MOS_TARGET
  surveys:
  - SDSS
  naming_convention: $MOS_TARGET/[V_TARG]/parquet/mos_sdss_dr17_apogee_allstarmerge.parquet
    with V_TARG=2.0.0 for DR20.
  generated_by: sdss5db targeting database.
  data_level: 2.3.3
  design: false
  vac: false
  recommended_science_product: false
changelog:
  description: Describes changes to the datamodel product and/or file structure from
    one release to another
  releases: {}
