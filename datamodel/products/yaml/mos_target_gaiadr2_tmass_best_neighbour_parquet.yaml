    survey: SDSS
    dataframe:
      columns:
        tmass_oid:
          name: tmass_oid
          dtype: Int64
          unit: ''
          description: Additional numeric unique source identifier of 2MASS, increasing
            with declination
        number_of_neighbours:
          name: number_of_neighbours
          dtype: Int32
          unit: ''
          description: Number of sources in the 2MASS Catalogue which match the Gaia
