general:
  name: mos_target_sdss_dr16_specobj_parquet
  short: 'MOS Target Table: sdss_dr16_specobj'
  description: 'This table contains the list of all SDSS optical spectra for a given
    data release, with associated parameters from the 2D and 1D pipelines for each.


    The table contains both the BOSS and SDSS spectrograph data. The database representation
    is derived from the flat file information described here: <a href="<a href="https://data.sdss.org/datamodel/files/SPECTRO_REDUX/specObj.html">https://data.sdss.org/datamodel/files/SPECTRO_REDUX/specObj.html</a>">https://data.sdss.org/datamodel/files/SPECTRO_REDUX/specObj.html">https://data.sdss.org/datamodel/files/SPECTRO_REDUX/specObj.html</a></a>
    Note: the order of the columns in this documentation may not match the order of
    the columns in the database table.'
  datatype: PARQUET
  filesize: 1 GB
  releases:
  - DR20
  environments:
  - MOS_TARGET
  surveys:
  - SDSS
  naming_convention: $MOS_TARGET/[V_TARG]/[FTYPE]/mos_sdss_dr16_specobj.[FTYPE] with
    FTYPE='parquet' and V_TARG='2.0.0' for DR20.
  generated_by: sdss5db targeting database.
  data_level: 2.3.3
  design: false
  vac: false
  recommended_science_product: false
changelog:
  description: Describes changes to the datamodel product and/or file structure from
    one release to another
  releases: {}
releases:
  DR20:
    template: $MOS_TARGET/[V_TARG]/[FTYPE]/mos_sdss_dr16_specobj.[FTYPE]
    example: 2.0.0/parquet/mos_sdss_dr16_specobj.parquet
    location: '{v_targ}/{ftype}/mos_sdss_dr16_specobj.{ftype}'
    environment: MOS_TARGET
    access:
      in_sdss_access: true
      path_name: mos_target_sdss_dr16_specobj
      path_template: $MOS_TARGET/{v_targ}/{ftype}/mos_sdss_dr16_specobj@mos_target_num|.{ftype}
      path_kwargs:
      - num
      - ftype
      - v_targ
      access_string: mos_target_sdss_dr16_specobj = $MOS_TARGET/{v_targ}/{ftype}/mos_sdss_dr16_specobj.{ftype}
    survey: SDSS
    dataframe:
      columns:
        specobjid:
          name: specobjid
          dtype: 'Extension(''arrow.opaque'', String, ''{"type_name": "numeric", "vendor_name":
            "PostgreSQL"}'')'
          unit: ''
          description: Unique database ID based on PLATE, MJD, FIBERID, RUN2D (same
            as SkyServer version)
        bestobjid:
          name: bestobjid
          dtype: Int64
          unit: ''
          description: Unique database ID of (recommended) position-based photometric
            match based on RUN, RERUN, CAMCOl, FIELD, ID (same as SkyServer version)
        fluxobjid:
          name: fluxobjid
          dtype: Int64
          unit: ''
          description: Unique database ID of flux-based photometric match based on
            RUN, RERUN, CAMCOl, FIELD, ID (same as SkyServer version)
        targetobjid:
          name: targetobjid
          dtype: Int64
          unit: ''
          description: Unique database ID of targeting object based on RUN, RERUN,
            CAMCOl, FIELD, ID (same as SkyServer version)
        plateid:
          name: plateid
          dtype: 'Extension(''arrow.opaque'', String, ''{"type_name": "numeric", "vendor_name":
            "PostgreSQL"}'')'
          unit: ''
          description: Unique database ID of plate based on PLATE, MJD, RUN2D (same
