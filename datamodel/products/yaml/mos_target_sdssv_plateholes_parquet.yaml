general:
  name: mos_target_sdssv_plateholes_parquet
  short: 'MOS Target Table: sdssv_plateholes'
  description: 'The combination of the dr20_sdssv_plateholes and dr20_sdssv_plateholes_meta
    tables are a database representation of the SDSS-V platelist data product (<a
    href="https://svn.sdss.org/public/data/sdss/platelist/trunk/)">https://svn.sdss.org/public/data/sdss/platelist/trunk/)</a>.


    These tables were used within early iterations of FPS target_selection as a way
    to communicate information about which targets had been included in SDSS-V plates.
    This information was used to e.g. de-prioritise targets that were expected to
    have a good quality spectroscopic measurement by the end of the SDSS-V plate observations.


    The dr20_sdssv_plateholes_meta table contains meta-data for each SDSS-V plate
    (one record per plate), whereas the dr20_sdssv_plateholes table has one entry
    for each drilled hole in each SDSS-V plate. The dr20_sdssv_plateholes and dr20_sdssv_plateholes_meta
    tables should be joined via the yanny_uid field.


    Mostly derived from: <a href="https://data.sdss.org/datamodel/files/PLATELIST_DIR/designs/DESIGNID6XX/DESIGNID6/plateDesign.html">https://data.sdss.org/datamodel/files/PLATELIST_DIR/designs/DESIGNID6XX/DESIGNID6/plateDesign.html</a>'
  datatype: PARQUET
  filesize: 20 MB
  releases:
  - DR20
  environments:
  - MOS_TARGET
  surveys:
  - SDSS
  naming_convention: $MOS_TARGET/[V_TARG]/[FTYPE]/mos_sdssv_plateholes.[FTYPE] with
    FTYPE='parquet' and V_TARG='2.0.0' for DR20.
  generated_by: sdss5db targeting database.
  data_level: 2.3.3
  design: false
  vac: false
  recommended_science_product: false
changelog:
  description: Describes changes to the datamodel product and/or file structure from
    one release to another
  releases: {}
releases:
  DR20:
    template: $MOS_TARGET/[V_TARG]/[FTYPE]/mos_sdssv_plateholes.[FTYPE]
    example: 2.0.0/parquet/mos_sdssv_plateholes.parquet
    location: '{v_targ}/{ftype}/mos_sdssv_plateholes.{ftype}'
    environment: MOS_TARGET
    access:
      in_sdss_access: true
      path_name: mos_target_sdssv_plateholes
      path_template: $MOS_TARGET/{v_targ}/{ftype}/mos_sdssv_plateholes.{ftype}
      path_kwargs:
      - v_targ
      - ftype
      access_string: mos_target_sdssv_plateholes = $MOS_TARGET/{v_targ}/{ftype}/mos_sdssv_plateholes.{ftype}
    survey: SDSS
    dataframe:
      columns:
        holetype:
          name: holetype
          dtype: String
          unit: ''
          description: type of hole to be drilled; one of SDSS, BOSS, MARVELS, APOGEE,
            GUIDE, CENTER, TRAP, or ALIGNMENT; this really refers to the instrument
            to be used, so for example SEGUE targets should be either SDSS or BOSS
        targettype:
          name: targettype
          dtype: String
          unit: ''
          description: type of target; one of SCIENCE, STANDARD, or SKY (if holetype
            is BOSS, SDSS, MARVELS or APOGEE); NA if not holetype is not one of the
            instruments (GUIDE, CENTER, TRAP, ALIGNMENT)
        sourcetype:
          name: sourcetype
          dtype: String
          unit: ''
          description: indicate the nature of the source, one of STAR, QSO, GALAXY,
            or NA (if targettype is NA)
        target_ra:
          name: target_ra
          dtype: Float64
          unit: ''
          description: right ascension, in J2000 deg
        target_dec:
          name: target_dec
          dtype: Float64
          unit: ''
          description: declination, in J2000 deg
        iplateinput:
          name: iplateinput
          dtype: Int32
          unit: ''
          description: integer indicating which plateInput file from the list in the
            plateDefinition file this came from (1-indexed); -1 or 0 if the hole wasn't
            from a plateInput file.
        pointing:
          name: pointing
          dtype: Int32
          unit: ''
          description: which pointing (1-indexed) this target is associated with;
            note this means which pointing among the ones that this plate is designed
            for, so if this a single pointing plate but uses the B-side MARVELS fibers,
            this will be "1", not "2"
        offset_integer:
          name: offset_integer
          dtype: Int32
          unit: ''
          description: which offset this target is associated with; 0 means it is
            not associated with an offset, it is associated with the primary pointing
        fiberid:
          name: fiberid
          dtype: Int32
          unit: ''
          description: what fiber on the appropriate instrument (as listed in holetype)
            is assigned to this target (-9999 for none)
        block:
          name: block
          dtype: Int32
          unit: ''
          description: which fiber block that fiber is associated with (-9999 for
            none)
        iguide:
          name: iguide
          dtype: Int32
          unit: ''
          description: for guide holes, which guide fiber it is assigned to (from
            1 to 11) (-9999 for non guide holes)
        xf_default:
          name: xf_default
          dtype: Float32
          unit: ''
          description: X position of hole in focal plane, given a default set of observing
            parameters (hour angle of zero, temperature of 5 deg C), in units of mm;
            for position angle of zero (which we always use), +X is +RA
        yf_default:
          name: yf_default
          dtype: Float32
          unit: ''
          description: Y position of hole in focal plane, given a default set of observing
            parameters (hour angle of zero, temperature of 5 deg C), in units of mm;
            for position angle of zero (which we always use), +Y is +Dec
        lambda_eff:
          name: lambda_eff
          dtype: Float32
          unit: ''
          description: wavelength to optimize hole location for, in Angstroms (platedesign
            will default to 5400 if not set)
        zoffset:
          name: zoffset
          dtype: Float32
          unit: ''
          description: backstopping offset distance, in microns (platedesign will
            default to 0 if not set)
        bluefiber:
          name: bluefiber
          dtype: Int32
          unit: ''
          description: 1 if the BOSS instrument is meant to assign this target a "blue"
            fiber; 0 otherwise
        chunk:
          name: chunk
          dtype: Int32
          unit: ''
          description: BOSS chunk number (0 if not appropriate)
        ifinal:
          name: ifinal
          dtype: Int32
          unit: ''
          description: 0-indexed position in BOSS final tiling file (-1 if not appropriate)
        origfile:
          name: origfile
          dtype: String
          unit: ''
          description: for BOSS targets, name of file that target originated within
            (for BOSS targets, one of the bosstarget files, for ancillary targets,
            a file within the directory.
        fileindx:
          name: fileindx
          dtype: Int32
          unit: ''
          description: for BOSS targets, 0-indexed position within ORIGFILE (-1 if
            not appropriate)
        diameter:
          name: diameter
          dtype: Float32
          unit: ''
          description: diameter of hole to be drilled, in mm
        buffer:
          name: buffer
          dtype: Float32
          unit: ''
          description: buffer to leave around hole edge for conflicts in mm
        priority:
          name: priority
          dtype: Int32
          unit: ''
          description: priority number assigned by the plateInput file; lower numbers
            indicate higher priority
        assigned:
          name: assigned
          dtype: Int32
          unit: ''
          description: 1 if this was a target assigned to a fiber, 0 otherwise; clearly
            for all targets this will be 1 for plateDesign files, but this will not
            be the case for plateInput-output files, which also have this same format.
        conflicted:
          name: conflicted
          dtype: Int32
          unit: ''
          description: 1 if this was a target not assigned because of a collision,
            0 otherwise; clearly for all targets this will be 0 for plateDesign files,
            but this will not be the case for plateInput-output files, which also
            have this same format.
        ranout:
          name: ranout
          dtype: Int32
          unit: ''
          description: 1 if this was a target not assigned because we ran out of fibers,
            0 otherwise; clearly for all targets this will be 0 for plateDesign files,
            but this will not be the case for plateInput-output files, which also
            have this same format.
        outside:
          name: outside
          dtype: Int32
          unit: ''
          description: 1 if this was a target not assigned because it was too fare
            from the plate center, 0 otherwise; clearly for all targets this will
            be 0 for plateDesign files, but this will not be the case for plateInput-output
            files, which also have this same format.
        mangaid:
          name: mangaid
          dtype: String
          unit: ''
          description: MaNGA identifier
        ifudesign:
          name: ifudesign
          dtype: Int32
          unit: ''
          description: intended IFU identified for this object
        ifudesignsize:
          name: ifudesignsize
          dtype: Int32
          unit: ''
          description: number of fibers in intended IFU identified for this object
