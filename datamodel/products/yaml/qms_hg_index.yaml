general:
  name: qms_hg_index
  short: The index diagram as a tool to disentangle the influence of the host galaxy
    in quasar spectra
  description: "The FITS file consists of two tables. The first one includes the delivered\n\
    catalog comprising 28 parameters for 3082 quasars, with a single row per object.\n\
    Each object is easily identified using the RA and DEC coordinates. Details of\n\
    the sample selection and performed analysis are described in <a href='https://ui.adsabs.harvard.edu/abs/2025MNRAS.543.4272N'>Negrete\n\
    et al. 2025</a>.\n\nThe spectral identifier (SI) of the first table is as follows:\n\
    0.0  - No emission-line spectra; more likely a retired galaxy\n0.1  - Spectra\
    \ showing strong sky-subtraction residuals\n0.2  - Sy2 objects, all at z < 0.5\n\
    1.0  - Type-1 AGN showing both Ha and Hb BCs\n1.1  - Optical spectra with z correction\n\
    1.9  - Sy 1.9 spectra without HbBC but with HaBC\n-1.0 - UV spectra with incorrectly\
    \ assigned z.\n\nThe second table contains the measurements of the CaII-H and\
    \ Hb indices for a \nmore comprehensive sample (6439 quasars), selected by having\
    \ 0.01 < z < 0.8, \nSN_MEDIAN_ALL > 15, FIRSTCARTON containing 'bhm' in the label,\
    \ and CLASS = QSO.\n"
  datatype: FITS
  filesize: 1 MB
  releases:
  - DR20
  environments:
  - BHM_QSO_HOST
  surveys:
  - SDSS
  naming_convention: $BHM_QSO_HOST/qms_hg/qms_hg_index_diagram-[V_VAC].fits, where
    V_VAC=1.0.0 for DR20.
  generated_by: See <a href='https://ui.adsabs.harvard.edu/abs/2025MNRAS.543.4272N'>Negrete
    et al. 2025</a>.
  data_level: 3.3.0
  design: false
  vac: false
  recommended_science_product: true
changelog:
  description: Describes changes to the datamodel product and/or file structure from
    one release to another
