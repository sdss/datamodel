general:
  name: mos_target_galex_gr7_gaia_dr3_parquet
  short: 'MOS Target Table: galex_gr7_gaia_dr3'
  description: Cross-match between the Gaia DR3 catalogue and the GALEX General Release
    7 catalogue. For more details about the GALEX columns refer to <a href="https://archive.stsci.edu/prepds/gcat/gcat_dataproducts.html">https://archive.stsci.edu/prepds/gcat/gcat_dataproducts.html</a>.
  datatype: PARQUET
  filesize: 418 MB
  releases:
  - DR20
  environments:
  - MOS_TARGET
  surveys:
  - SDSS
  naming_convention: $MOS_TARGET/[V_TARG]/[FTYPE]/mos_galex_gr7_gaia_dr3.[FTYPE] with
    FTYPE='parquet' and V_TARG='2.0.0' for DR20.
  generated_by: sdss5db targeting database.
  data_level: 2.3.3
  design: false
  vac: false
  recommended_science_product: false
changelog:
  description: Describes changes to the datamodel product and/or file structure from
    one release to another
  releases: {}
releases:
  DR20:
    template: $MOS_TARGET/[V_TARG]/[FTYPE]/mos_galex_gr7_gaia_dr3.[FTYPE]
    example: 2.0.0/parquet/mos_galex_gr7_gaia_dr3.parquet
    location: '{v_targ}/{ftype}/mos_galex_gr7_gaia_dr3.{ftype}'
    environment: MOS_TARGET
    access:
      in_sdss_access: true
      path_name: mos_target_galex_gr7_gaia_dr3
      path_template: $MOS_TARGET/{v_targ}/{ftype}/mos_galex_gr7_gaia_dr3@mos_target_num|.{ftype}
      path_kwargs:
      - num
      - ftype
      - v_targ
      access_string: mos_target_galex_gr7_gaia_dr3 = $MOS_TARGET/{v_targ}/{ftype}/mos_galex_gr7_gaia_dr3.{ftype}
    survey: SDSS
    dataframe:
      columns:
        gaia_edr3_source_id:
          name: gaia_edr3_source_id
          dtype: Int64
          unit: ''
          description: Gaia DR3 source identifier. Matches the source_id column in
            the dr20_gaia_dr3_source table.
        galex_objid:
          name: galex_objid
          dtype: Int64
          unit: ''
          description: This is the 64-bit integer version of the global object ID
            uniquely identifying this source including the tile number, band, product
            number, and other parameters, in the Gaia General Release 7 catalogue.
        fuv_mag:
          name: fuv_mag
          dtype: Float64
          unit: AB mag
          description: Calibrated FUV magnitude on the AB system measured within the
            NUV-defined "AUTO" aperture. Sources with either a negative FLUX_FUV or
            without FUV observations will be flagged with values of either +99 or
            -99.
        fuv_magerr:
          name: fuv_magerr
          dtype: Float64
          unit: AB mag
          description: The error in MAG_FUV. Sources with either a negative flux or
            without FUV observations will be flagged with values of either +99 or
            -99.
        nuv_mag:
          name: nuv_mag
          dtype: Float64
          unit: AB mag
          description: Calibrated NUV magnitude on the AB system. This is currently
            always set to the SExtractor "AUTO" magnitude.
        nuv_magerr:
          name: nuv_magerr
          dtype: Float64
          unit: AB mag
          description: The error in nuv_mag.
        galex_separation:
          name: galex_separation
          dtype: Float64
          unit: arcsec
          description: Separation between the Gaia DR3 source and the GALEX GR7 source.
        pk:
          name: pk
          dtype: Int64
          unit: ''
          description: Unique identifier for each row in the table.
      metadata: {}
notes: None
regrets: I  have no regrets!
