general:
  name: qms_hg_index
  short: The index diagram as a tool to disentangle the influence of the host galaxy
    in quasar spectra
  description: The FITS file consists of two tables. The first one includes the delivered
    catalog comprising 28 parameters for 3082 quasars, with a single row per object.
    Each object is easily identified using the RA and DEC coordinates. Details of
    the sample selection and performed analysis are described in <a href='https://ui.adsabs.harvard.edu/abs/2025MNRAS.543.4272N'>Negrete
    et al. 2025</a>. The second table contains the measurements of the CaII-H and
    Hb indices for a more comprehensive sample (6439 quasars), selected by having
    0.01 < z < 0.8, SN_MEDIAN_ALL > 15, FIRSTCARTON containing 'bhm' in the label,
    and  CLASS = QSO.
  datatype: FITS
  filesize: 998 KB
  releases:
  - DR20
  environments:
  - BHM_QSO_HOST
  surveys:
  - SDSS
  naming_convention: $BHM_QSO_HOST/qms_hg/qms_hg_index_diagram-[V_VAC].fits, where
    V_VAC=1.0.0 for DR20.
  generated_by: replace me - with the name(s) of any git or svn product(s) that produces
    this product.
  data_level: 3.3.0
  design: false
  vac: true
  recommended_science_product: true
changelog:
  description: Describes changes to the datamodel product and/or file structure from
    one release to another
  releases: {}
