          GPgyro_age:
            name: GPgyro_age
            type: float64
            unit: Gyr
            description: Gyrochronology age output from GPgyro
          GPgyro_age_p:
            name: GPgyro_age_p
            type: float64
            unit: Gyr
            description: +1 sigma from GPgyro
          GPgyro_age_m:
            name: GPgyro_age_m
            type: float64
            unit: Gyr
            description: -1 sigma from GPgyro
          GPgyro_flag:
            name: GPgyro_flag
            type: char[5]
            unit: NA
            description: outside of the application limit for GPgyro (< 1.5 Gyr) if
              flag is set
