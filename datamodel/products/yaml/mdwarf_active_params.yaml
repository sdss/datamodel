general:
  name: mdwarf_active_params
  short: Spectral subtypes, morphology classes, H-alpha equivalent widths, and 3D
    Galactic space velocities for K/M dwarfs in SDSS DR20.
  description: "This VAC compares BOSS spectra of low-mass stars to a set of 536 empirical\
    \ spectral templates assembled from earlier SDSS optical spectra (Galligan & Lepine\
    \ 2026, in press), which span a broad range of effective temperatures and metallicities.\
    \ BOSS spectra are matched to their best-fit templates to assign: (1) a spectral\
    \ subtype, which range from K5.0-M8.5 with half-subtype resolution, (2) a \"morphology\
    \ class\", which range from 0.5 to 12.5 in half-integer steps, (3) H&alpha;  equivalent\
    \ widths, and (4) calculated UVW velocities relative to the Sun. \n"
  datatype: FITS
  filesize: 12 MB
  releases:
  - DR20
  environments:
  - MWM_MDWARF
  surveys:
  - SDSS
  naming_convention: $MWM_MDWARF/boss_spectral_activity/mdwarf_active_params-[V_VAC].fits
  generated_by: https://github.com/egalligan1/MDwarfClassification
  data_level: 3.3.0
  design: false
  vac: true
  recommended_science_product: true
changelog:
  description: Describes changes to the datamodel product and/or file structure from
    one release to another
  releases: {}
