general:
  name: fluxcal
  short: The fluxcal files store intermediate products derived during the flux calibration
    procedure.
  description: The fluxcal files store intermediate products derived during the flux
    calibration procedure.
  datatype: FITS
  filesize: 901 KB
  releases:
  - DR13
  - DR14
  - DR15
  - DR16
  - DR17
  environments:
  - MANGA_SPECTRO_REDUX
  surveys:
  - MaNGA
  naming_convention: fluxcal-[camera]-[exposure].fits.gz where [camera] is one of
    the four cameras on the instrument, b1, r1, or b2, r2, for the blue and red cameras
    on each SDSS spectrograph, and [exposure] is the (zero-padded) 8-digit exposure
    number.
  generated_by: 'mangadrp: mdrp_fluxcal.pro'
  data_level: 1.3.1
  design: false
  vac: false
  recommended_science_product: false
changelog:
  description: Describes changes to the datamodel product and/or file structure from
    one release to another
  releases:
    DR17:
      from: DR16
      note: No changes
    DR16:
      from: DR15
      note: No changes
    DR15:
      from: DR14
      note: No changes
    DR14:
      from: DR13
      note: No changes
