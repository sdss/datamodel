    example: 1.2.0/1.2.0.251218/0011XX/11111/60191/00004297/dap-rsp108-sn20-00004297.model.fits
    location: '{drpver}/{dapver}/{tilegrp}/{tileid}/{mjd}/{expnum}/dap-{rspid}-{snlevel}-{expnum}.{daptype}.fits'
    environment: LVM_SPECTRO_ANALYSIS
    access:
