    survey: SDSS
    hdus:
      hdu0:
        name: PRIMARY
        description: 'Primary HDU containing the complete DAP model cube for one exposure. The image has dimensions Nwave x Nspec x 9 and stores nine spectral-component planes identified by the NAME0--NAME8 header keywords. The first axis is wavelength, defined by CRPIX1, CRVAL1, and CDELT1; the second axis is the analyzed fiber index; and the third axis is the model-component index. The planes are: NAME0=org_spec, the original observed spectrum; NAME1=model_spec, the reconstructed stellar-continuum model; NAME2=mod_joint_spec, the joint stellar-plus-non-parametric-gas model; NAME3=gas_spec, the gas-only spectrum after subtracting the stellar model; NAME4=res_joint_spec, the residual after subtracting the joint model; NAME5=no_gas_spec, the observed spectrum with the non-parametric gas model removed; NAME6=gas_model_NP, the non-parametric emission-line gas model; NAME7=gas_model_PEK, the refined parametric emission-line gas model; and NAME8=mod_joint_spec_PEK, the joint model built with the refined parametric emission-line model. All planes are stored as spectral flux densities in the LVM per-fiber convention, 10^-16 erg/s/cm^2/Angstrom measured in one fiber area.'
