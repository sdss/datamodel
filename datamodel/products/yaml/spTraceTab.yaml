general:
  name: spTraceTab
  short: XY Trace Table for BOSS Spectrograph Data Reduction
  description: The spTraceTab file contains the trace table data for a given MJD and
    Observatory, including information about nightly calibration exposures. It is
    used to build the traces for the spectrograph data reduction process using an
    inital set of arc and flat exposures, and correlating theses traces with arc frames
    taken for each science field during the night
  datatype: FITS
  filesize: 7 MB
  releases:
  - IPL4
  environments:
  - BOSS_SPECTRO_REDUX
  surveys:
  - SDSS
  naming_convention: $BOSS_SPECTRO_REDUX/[RUN2D]/trace/[MJD]/spTraceTab-[BR][ID]-[FRAME].fits
  generated_by: pyvista
  data_level: 1.2.1
  design: false
  vac: false
  recommended_science_product: false
changelog:
  description: Describes changes to the datamodel product and/or file structure from
    one release to another
  releases: {}
releases:
  IPL4:
    template: $BOSS_SPECTRO_REDUX/[RUN2D]/trace/[MJD]/spTraceTab-[BR][ID]-[FRAME].fits
    example: v6_2_1/trace/60708/spTraceTab-b2-00046778.fits
    location: '{run2d}/trace/{mjd}/spTraceTab-{br}{id}-{frame}.fits'
    environment: BOSS_SPECTRO_REDUX
    access:
      in_sdss_access: true
      path_name: spTraceTab
      path_template: $BOSS_SPECTRO_REDUX/{run2d}/trace/{mjd}/spTraceTab-{br}{id}-{frame}.fits
      path_kwargs:
      - frame
      - br
      - mjd
      - id
      - run2d
      access_string: spTraceTab = $BOSS_SPECTRO_REDUX/{run2d}/trace/{mjd}/spTraceTab-{br}{id}-{frame}.fits
    survey: SDSS
    hdus:
      hdu0:
        name: PRIMARY
        description: XY Trace Table for BOSS Spectrograph Data Reduction
        is_image: true
        size: 7 MB
        header:
        - key: SIMPLE
          value: true
          comment: conforms to FITS standard
        - key: BITPIX
          value: -32
          comment: array data type
        - key: NAXIS
          value: 2
          comment: number of array dimensions
        - key: NAXIS1
          value: 4112
          comment: ''
        - key: NAXIS2
          value: 500
          comment: ''
        - key: EXTEND
          value: true
          comment: ''
notes: |-
  None
regrets: |-
  I  have no regrets!
