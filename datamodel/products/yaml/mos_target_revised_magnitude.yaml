general:
  name: mos_target_revised_magnitude
  short: 'MOS Target Table: revised_magnitude'
  description: 'This table stores magnitude information for a target. Optical magnitudes
    that are not selected from SDSS photometry have been converted to the SDSS system.


    Entries in this revised_magnitude table only exist if there was an issue with
    the values in the original magnitude table. Therefore: if a carton_to_target_pk
    exists in this table, the values in this table should be used instead.'
  datatype: FITS
  filesize: 177 MB
  releases:
  - DR20
  environments:
  - MOS_TARGET
  surveys:
  - SDSS
  naming_convention: $MOS_TARGET/[V_TARG]/[FTYPE]/mos_revised_magnitude-[NUM].[FTYPE]
    with FTYPE='fits', V_TARG='2.0.0', and NUM=1..26 for DR20.
  generated_by: sdss5db targeting database.
  data_level: 2.3.3
  design: false
  vac: false
  recommended_science_product: false
changelog:
  description: Describes changes to the datamodel product and/or file structure from
    one release to another
  releases: {}
