general:
  name: payne4GAIN_modelSpectra
  short: the payne4GAIN model spectra used to generate the lte, nlte, and corrected
    abundances in this VAC
  description: 'We trained Payne models on grids of Turbospectrum_NLTE synthetic spectra:
    one in LTE and one in NLTE, using departure coefficient grids calculated in MULTI.
    These are the model spectra that come from our Paynes, after chi-squared fitting
    the APOGEE DR19 spectra that fall within our training range (according to ASPCAP).
    In addition to the 15-label Payne, we also fit each spectrum with 9 continuum
    parameters (2nd order Chebyshev polynomials for each chip), radial velocity and
    gaussian broadening.'
  datatype: FITS
  filesize: 21 GB
  releases:
  - DR20
  environments:
  - MWM_RGB
  surveys:
  - SDSS
  naming_convention: '$MWM_RGB/apogee_rgb_nlte_abundances/payne4GAIN_modelSpectra-[V_VAC].fits

    where V_VAC=1.1.1 for DR20

    '
  generated_by: Thibodeaux et al (in prep).
  data_level: 3.2.0
  design: false
  vac: true
  recommended_science_product: true
changelog:
  description: Describes changes to the datamodel product and/or file structure from
    one release to another
