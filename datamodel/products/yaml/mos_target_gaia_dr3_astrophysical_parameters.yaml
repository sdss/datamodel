general:
  name: mos_target_gaia_dr3_astrophysical_parameters
  short: 'MOS Target Table: gaia_dr3_astrophysical_parameters'
  description: 'The Gaia DR3 astrophysical parameters table contains the astrophysical
    parameters derived for sources in Gaia DR3.


    This is the main table containing the 1D astrophysical parameters produced by
    the Apsis processing chain developed in Gaia DPAC CU8. For more details refer
    to <a href="https://gea.esac.esa.int/archive/documentation/GDR3/Gaia_archive/chap_datamodel/sec_dm_astrophysical_parameter_tables/ssec_dm_astrophysical_parameters.html">https://gea.esac.esa.int/archive/documentation/GDR3/Gaia_archive/chap_datamodel/sec_dm_astrophysical_parameter_tables/ssec_dm_astrophysical_parameters.html</a>.'
  datatype: FITS
  filesize: 1 GB
  releases:
  - DR20
  environments:
  - MOS_TARGET
  surveys:
  - SDSS
  naming_convention: $MOS_TARGET/[V_TARG]/[FTYPE]/mos_gaia_dr3_astrophysical_parameters-[NUM].[FTYPE]
    with FTYPE='fits', V_TARG='2.0.0', and NUM=1..34 for DR20.
  generated_by: sdss5db targeting database.
  data_level: 2.3.3
  design: false
  vac: false
  recommended_science_product: false
changelog:
  description: Describes changes to the datamodel product and/or file structure from
    one release to another
