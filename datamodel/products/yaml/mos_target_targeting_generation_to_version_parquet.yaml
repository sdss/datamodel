    template: $MOS_TARGET/[V_TARG]/[FTYPE]/mos_targeting_generation_to_version.[FTYPE]
    example: 2.0.0/parquet/mos_targeting_generation_to_version.parquet
    location: '{v_targ}/{ftype}/mos_targeting_generation_to_version.{ftype}'
    environment: MOS_TARGET
    access:
      in_sdss_access: true
      path_name: mos_target_targeting_generation_to_version
      path_template: $MOS_TARGET/{v_targ}/{ftype}/mos_targeting_generation_to_version.{ftype}
      path_kwargs:
      - ftype
      - v_targ
      access_string: mos_target_targeting_generation_to_version = $MOS_TARGET/{v_targ}/{ftype}/mos_targeting_generation_to_version.{ftype}
    survey: SDSS
    dataframe:
      columns:
        generation_pk:
          name: generation_pk
          dtype: Int32
          unit: ''
          description: primary key of an entry in the dr20_targeting_generation table
        version_pk:
          name: version_pk
          dtype: Int32
          unit: ''
          description: primary key of an entry in the dr20_targetdb_version table,
            which lists the robostrategy run version ('plan' and 'tag')
        pk:
          name: pk
          dtype: Int32
          unit: ''
          description: primary key for this table entry
      metadata: {}
