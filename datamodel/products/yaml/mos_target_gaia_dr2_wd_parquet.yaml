  releases:
  - DR20
  environments:
  - MOS_TARGET
  surveys:
  - SDSS
  naming_convention: $MOS_TARGET/[V_TARG]/[FTYPE]/mos_gaia_dr2_wd.[FTYPE] with FTYPE='parquet'
    and V_TARG='2.0.0' for DR20.
