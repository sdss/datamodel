general:
  name: PawlikMorph
  short: This table provides the CAS, gini, M20, shape asymmetry, curve of growth
    radii, sersic fits and associated parameters measured from SDSS DR7 imaging using
    the 8-connected structure detection algorithm to define the edges of the galaxies
    presented in Pawlik et al.
  description: 'This table provides the CAS, gini, M20, shape asymmetry, curve of
    growth radii, sersic fits and associated parameters measured from SDSS DR7 imaging
    using the 8-connected structure detection algorithm to define the edges of the
    galaxies presented in Pawlik et al. (2016) for all galaxies in MaNGA DR15. This
    is the original implementation of the Shape Asymmetry algorithm. The code is available
    here: https://github.com/SEDMORPH/PawlikMorph'
  datatype: FITS
  filesize: 717 KB
  releases:
  - DR16
  environments:
  - MANGA_MORPHOLOGY
  surveys:
  - MaNGA
  naming_convention: $MANGA_MORPHOLOGY/sedmorph/PawlikMorph_[RELEASE].fits where RELEASE=DR15
  generated_by: Vivienne Wild, Yanmei Chen, Milena Pawlik
  data_level: 3.3.0
  design: false
  vac: true
  recommended_science_product: true
changelog:
  description: Describes changes to the datamodel product and/or file structure from
    one release to another
  releases: {}
releases:
  DR16:
    template: $MANGA_MORPHOLOGY/sedmorph/PawlikMorph_[RELEASE].fits
    example: sedmorph/PawlikMorph_DR15.fits
    location: sedmorph/PawlikMorph_{release}.fits
    environment: MANGA_MORPHOLOGY
    access:
      in_sdss_access: true
      path_name: PawlikMorph
      path_template: $MANGA_MORPHOLOGY/sedmorph/PawlikMorph_{release}.fits
      path_kwargs:
      - release
      access_string: PawlikMorph = $MANGA_MORPHOLOGY/sedmorph/PawlikMorph_{release}.fits
    survey: MaNGA
    hdus:
      hdu0:
        name: PRIMARY
        description: 'HDU0: Empty Primary'
        is_image: true
        size: 0 bytes
        header:
        - key: SIMPLE
          value: true
          comment: Dummy Created by MWRFITS v1.13
        - key: BITPIX
          value: 8
          comment: Dummy primary header created by MWRFITS
        - key: NAXIS
