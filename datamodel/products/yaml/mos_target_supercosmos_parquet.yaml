general:
  name: mos_target_supercosmos_parquet
  short: 'MOS Target Table: supercosmos'
  description: 'Contains merged sources for every field in the SuperCOSMOS Science
    Archive (SSA). It consists of data from digitised sky survey plates taken with
    the UK Schmidt telescope (UKST), the ESO Schmidt, and the Palomar Schmidt.


    Each field within the SSA is covered by four plates in passbands B, R and I with
    R being covered twice at different times. This results in four-plate multi-colour,
    multi-epoch data which are merged into a single source catalogue for general science
    exploitation. This table contains the associated merged records created from the
    records in table Detection, along with a full astrometric solution (including
    proper motions) computed from the available position measures. The most useful
    subset of image morphological descriptors are also propagated into this table
    for ease of use.


    Derived from <a href="http://ssa.roe.ac.uk/www/SSA_TABLE_SourceSchema.html#Source">http://ssa.roe.ac.uk/www/SSA_TABLE_SourceSchema.html#Source</a>'
  datatype: PARQUET
  filesize: 8 GB
  releases:
  - DR20
  environments:
  - MOS_TARGET
  surveys:
  - SDSS
  naming_convention: $MOS_TARGET/[V_TARG]/[FTYPE]/mos_supercosmos.[FTYPE] with FTYPE='parquet'
    and V_TARG='2.0.0' for DR20.
  generated_by: sdss5db targeting database.
  data_level: 2.3.3
  design: false
  vac: false
  recommended_science_product: false
changelog:
  description: Describes changes to the datamodel product and/or file structure from
