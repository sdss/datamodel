general:
  name: mos_target_bhm_csc_v2_parquet
  short: 'MOS Target Table: bhm_csc_v2'
  description: 'CSC2 X-ray sources.


    This catalogue contains CSC2 X-ray sources that have been matched separately to
    PanSTARRS-1, Gaia DR2, and 2MASS catalogs, using the programs NWAY (Johannes Buchner;
    see: Salvato 2018, MN, 473, 4937) and Xmatch (Arnold Rots; see: <a href="https://cxc.cfa.harvard.edu/csc/csc_crossmatches.html)">https://cxc.cfa.harvard.edu/csc/csc_crossmatches.html)</a>.
    Both are based on the Bayesian spatial cross-matching algorithm developed by Budavari
    & Szalay (2008, ApJ 679, 301), but Xmatch has the added capability of taking source
    extent and/or PSF into account. Created March 2021 by Paul Green, Dong-Woo Kim,
    Arnold Rots and the CXC CatSci group.'
  datatype: PARQUET
  filesize: 10 MB
  releases:
  - DR20
  environments:
  - MOS_TARGET
  surveys:
  - SDSS
  naming_convention: $MOS_TARGET/[V_TARG]/[FTYPE]/mos_bhm_csc_v2.[FTYPE] with FTYPE='parquet'
    and V_TARG='2.0.0' for DR20.
  generated_by: sdss5db targeting database.
  data_level: 2.3.3
  design: false
  vac: false
  recommended_science_product: false
changelog:
  description: Describes changes to the datamodel product and/or file structure from
    one release to another
  releases: {}
releases:
  DR20:
    template: $MOS_TARGET/[V_TARG]/[FTYPE]/mos_bhm_csc_v2.[FTYPE]
    example: 2.0.0/parquet/mos_bhm_csc_v2.parquet
    location: '{v_targ}/{ftype}/mos_bhm_csc_v2.{ftype}'
    environment: MOS_TARGET
    access:
      in_sdss_access: true
      path_name: mos_target_bhm_csc_v2
      path_template: $MOS_TARGET/{v_targ}/{ftype}/mos_bhm_csc_v2.{ftype}
      path_kwargs:
      - v_targ
      - ftype
      access_string: mos_target_bhm_csc_v2 = $MOS_TARGET/{v_targ}/{ftype}/mos_bhm_csc_v2.{ftype}
    survey: SDSS
    dataframe:
      columns:
        cxoid:
          name: cxoid
          dtype: String
          unit: ''
          description: CSC2 Chandra ID
        xra:
          name: xra
          dtype: Float64
          unit: deg
          description: RA of X-ray source from CSC2
        xdec:
          name: xdec
          dtype: Float64
          unit: deg
          description: Dec of X-ray source from CSC2
        pri:
          name: pri
          dtype: Int16
          unit: ''
          description: Priority (based on X-ray S/N)
        ocat:
          name: ocat
          dtype: String
          unit: ''
          description: optical catalog code (P for PS1, G for Gaia)
        oid:
          name: oid
          dtype: Int64
          unit: ''
          description: object ID from optical catalog
        ora:
          name: ora
          dtype: Float64
          unit: deg
          description: right ascension (2000) from optical catalog
        odec:
          name: odec
          dtype: Float64
          unit: deg
          description: declination (2000) from optical catalog
        omag:
          name: omag
          dtype: Float32
          unit: mag
          description: optical magnitude from optical catalog
        omatchtype:
          name: omatchtype
          dtype: Int16
          unit: ''
          description: X-ray/optical match type (1-4 definite/likely/multiple opt,
            multiple X)
        irid:
          name: irid
          dtype: String
          unit: ''
          description: object ID from 2MASS
        ra2m:
          name: ra2m
          dtype: Float64
          unit: deg
          description: right ascension (2000) from 2MASS
        dec2m:
          name: dec2m
          dtype: Float64
          unit: deg
          description: declination (2000) from 2MASS
        hmag:
          name: hmag
          dtype: Float32
          unit: mag
          description: H mag from 2MASS
        irmatchtype:
          name: irmatchtype
          dtype: Int16
          unit: ''
          description: X-ray/IR match type (1-4 definite/likely/multiple opt, multiple
            X)
        lgal:
          name: lgal
          dtype: Float64
          unit: deg
          description: Galactic longitude (from X-ray position)
        bgal:
          name: bgal
          dtype: Float64
          unit: deg
          description: Galactic latitude (from X-ray position)
        logfx:
          name: logfx
          dtype: Float32
          unit: ''
          description: log10 of X-ray cgs flux in xband
        xband:
          name: xband
          dtype: String
          unit: ''
          description: X-ray bandpass for logfx, priority b,m,s,h,w
        xsn:
          name: xsn
          dtype: Float64
          unit: ''
          description: X-ray S/N
        xflags:
          name: xflags
          dtype: Int32
          unit: ''
          description: 'concatenated X-ray source flags: extended,confused,piledup,variable,streak,saturated'
        designation2m:
          name: designation2m
          dtype: String
          unit: ''
          description: 2MASS identifier (designation) derived from irid
        idg2:
          name: idg2
          dtype: Int64
          unit: ''
          description: Gaia DR2 source_id (derived from ocat, oid)
        idps:
          name: idps
          dtype: Int64
          unit: ''
          description: Pan-STARRS1 Object identifier (derived here from ocat+oid)
            - equivalent to ObjID in MAST database (https://outerspace.stsci.edu/display/PANSTARRS/PS1+Object+Identifiers),
            and to our panstarrs1.extid_hi_lo
        pk:
          name: pk
          dtype: Int64
          unit: ''
          description: primary key of the database table
      metadata: {}
