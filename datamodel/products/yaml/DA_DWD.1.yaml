general:
  name: DA_DWD
  short: This file includes the measured RV variability parameter of selected DA WDs in SDSS-V DR19 that is used to identify DA double WD binary candidates.
  description: In this value added catalog file, we summarise the result of the analysis to discover DA double white dwarf binary candiates in SDSS-V DR19. We report the SDSS-ID, Gaia DR3 ID, RV, RV error, observation time, and the RV variability parameter (eta). Full details of the target selection, analysis, binary candidates, and the subsequent constraints on the binary population are presented in Adamane Pallathadka et al. (2026).
  datatype: FITS
  filesize: 1 MB
  releases:
  - DR20
  environments:
  - MWM_WHITEDWARF
  surveys:
  - SDSS
  naming_convention: $MWM_WHITEDWARF/da_white_dwarf_binaries/[V_VAC]/DA_DWD_DR19-[V_VAC].fits
    where V_VAC=1.0.0 in DR20.
  generated_by: 
  data_level: 3.3.0
  design: false
  vac: true
  recommended_science_product: true
