general:
  name: sdR_N
  short: BOSS spectrograph data
  description: This file contains raw spectro data from the BOSS/eBOSS/BHM spectro
    CCDs from APO. Simultaneous frames in different chips all have the same frame
    number. Which frames are what type of observation is indicated by the FLAVOR keyword
    in each header. HDU 0 contains the raw counts as integers (4352x4224). For SDSS-I
    raw spectro data, please look at SDSS-I,-II sdR files:https://data.sdss.org/datamodel/files/RAWDATA_DIR/MJD/sdR.html.
  datatype: FITS
  filesize: 35 KB
  releases:
  - DR9
  - DR10
  - DR12
  - DR11
  - DR13
  - DR14
  - DR15
  - DR16
  - DR17
  - DR18
  - DR19
  - IPL4
  - DR20
  environments:
  - BOSS_SPECTRO_DATA
  - BOSS_SPECTRO_DATA_N
  naming_convention: sdR-[br][id]-[FRAME].fit, indicating which blue or red spectrograph
    (1 or 2), and the frame number.
  generated_by: OPS
  design: false
  surveys:
  - BHM
  - eBOSS
  - BOSS
  - SDSS
  vac: false
  recommended_science_product: false
  data_level: 0.1.1
