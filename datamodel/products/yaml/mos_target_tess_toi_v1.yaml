general:
  name: mos_target_tess_toi_v1
  short: 'MOS Target Table: tess_toi_v1'
  description: 'This catalog contains targets that received the 2 minute cadence during
    the TESS Mission, are TESS Objects of Interest (TOI) or Community TESS Objects
    of Interest (CTOI).


    The contents of this catalog were derived from the MIT TESS website (<a href="https://tess.mit.edu/public/target_lists/target_lists.html)">https://tess.mit.edu/public/target_lists/target_lists.html)</a>
    and the ExoFOP website <a href="https://exofop.ipac.caltech.edu/tess/index.php">https://exofop.ipac.caltech.edu/tess/index.php</a>.
    These targets were updated on 2022-08-05.'
  datatype: FITS
  filesize: 42 MB
  releases:
  - DR20
  environments:
  - MOS_TARGET
  surveys:
  - SDSS
  naming_convention: $MOS_TARGET/[V_TARG]/[FTYPE]/mos_tess_toi_v1.[FTYPE] with FTYPE='fits'
    and V_TARG='2.0.0' for DR20.
  generated_by: sdss5db targeting database.
  data_level: 2.3.3
  design: false
  vac: false
  recommended_science_product: false
changelog:
  description: Describes changes to the datamodel product and/or file structure from
    one release to another
  releases: {}
