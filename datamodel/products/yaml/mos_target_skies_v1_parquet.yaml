general:
  name: mos_target_skies_v1_parquet
  short: 'MOS Target Table: skies_v1'
  description: 'This table stores the positions used as blank sky regions for DR20
    targetting.


    The sky regions are selected by dividing the sky in tiles of HEALpix nside 32.
    Each tile is then subdivided in candidate regions of HEALpix nside 32768 and the
    pixels that meet the isolation requirements are considered valid skies. This process
    is repeated for a number of all-sky catalogues. See <a href="<a href="https://sdss.org/dr20/targeting/fps/sky/">">https://sdss.org/dr20/targeting/fps/sky/"></a>
    for further details of the process by which suitable sky locations are selected
    in SDSS-V/FPS. This version of the skies catalog was used for v0.1 target selection.
    The skies_v2 catalog was used for v0.5 and subsequent target selections.'
  datatype: PARQUET
  filesize: 714 MB
  releases:
  - DR20
  environments:
  - MOS_TARGET
  surveys:
  - SDSS
  naming_convention: $MOS_TARGET/[V_TARG]/[FTYPE]/mos_skies_v1.[FTYPE] with FTYPE='parquet'
    and V_TARG='2.0.0' for DR20.
  generated_by: sdss5db targeting database.
  data_level: 2.3.3
  design: false
  vac: false
  recommended_science_product: false
changelog:
  description: Describes changes to the datamodel product and/or file structure from
    one release to another
  releases: {}
releases:
  DR20:
    template: $MOS_TARGET/[V_TARG]/[FTYPE]/mos_skies_v1.[FTYPE]
    example: 2.0.0/parquet/mos_skies_v1.parquet
    location: '{v_targ}/{ftype}/mos_skies_v1.{ftype}'
    environment: MOS_TARGET
    access:
      in_sdss_access: true
      path_name: mos_target_skies_v1
      path_template: $MOS_TARGET/{v_targ}/{ftype}/mos_skies_v1@mos_target_num2|.{ftype}
      path_kwargs:
      - ftype
      - v_targ
      access_string: mos_target_skies_v1 = $MOS_TARGET/{v_targ}/{ftype}/mos_skies_v1.{ftype}
    survey: SDSS
    dataframe:
      columns:
        pix_32768:
          name: pix_32768
          dtype: Int64
          unit: ''
          description: The HEALpix pixel (nside=32768, nested indexing, Equatorial
            coords) of the sky region.
        ra:
          name: ra
          dtype: Float64
          unit: degrees
          description: The RA of the centre of the sky pixel.
        dec:
          name: dec
          dtype: Float64
          unit: degrees
          description: The declination of the centre of the sky pixel.
        down_pix:
          name: down_pix
          dtype: Int32
          unit: ''
          description: The HEALpix pixel (nside=256, nested indexing, Equatorial coords)
            of the sky region. Used internally to downsample the list of candidate
            region.
        tile_32:
          name: tile_32
          dtype: Int32
          unit: ''
          description: The HEALpix pixel (nside=32, nested indexing, Equatorial coords)
            of the sky region.
        gaia_sky:
          name: gaia_sky
          dtype: Boolean
          unit: ''
          description: Whether this is a valid sky region in the Gaia DR2 catalogue.
        sep_neighbour_gaia:
          name: sep_neighbour_gaia
          dtype: Float32
          unit: arcsec
          description: Separation to the nearest Gaia DR2 neighbour.
        mag_neighbour_gaia:
          name: mag_neighbour_gaia
          dtype: Float32
          unit: mag
          description: Magnitude of the nearest Gaia DR2 neighbour (G band, Vega).
        ls8_sky:
          name: ls8_sky
          dtype: Boolean
          unit: ''
          description: Whether this is a valid sky region in the Legacy Survey DR8
            catalogue.
        sep_neighbour_ls8:
          name: sep_neighbour_ls8
          dtype: Float32
          unit: arcsec
          description: Separation to the nearest Legacy Survey DR8 neighbour.
        mag_neighbour_ls8:
          name: mag_neighbour_ls8
          dtype: Float32
          unit: mag
          description: Magnitude of the nearest Legacy Survey DR8 neighbour (r-band,
            AB).
        tmass_sky:
          name: tmass_sky
          dtype: Boolean
          unit: ''
          description: Whether this is a valid sky region in the 2MASS point source
            catalogue.
        sep_neighbour_tmass:
          name: sep_neighbour_tmass
          dtype: Float32
          unit: arcsec
          description: Separation to the nearest 2MASS point source neighbour.
        mag_neighbour_tmass:
          name: mag_neighbour_tmass
          dtype: Float32
          unit: mag
          description: Magnitude of the nearest 2MASS point source neighbour (H band,
            Vega).
        tycho2_sky:
          name: tycho2_sky
          dtype: Boolean
          unit: ''
          description: Whether this is a valid sky region in the Tycho2 catalogue.
        sep_neighbour_tycho2:
          name: sep_neighbour_tycho2
          dtype: Float32
          unit: arcsec
          description: Separation to the nearest Tycho2 neighbour.
        mag_neighbour_tycho2:
          name: mag_neighbour_tycho2
          dtype: Float32
          unit: mag
          description: Magnitude of the nearest Tycho2 neighbour (Vt band, Vega).
        tmass_xsc_sky:
          name: tmass_xsc_sky
          dtype: Boolean
          unit: ''
          description: Whether this is a valid sky region in the 2MASS extended source
            catalogue.
        sep_neighbour_tmass_xsc:
          name: sep_neighbour_tmass_xsc
          dtype: Float32
          unit: arcsec
          description: Separation to the nearest 2MASS extended source neighbour
        mag_neighbour_tmass_xsc:
          name: mag_neighbour_tmass_xsc
          dtype: Float32
          unit: mag
          description: Magnitude of the nearest 2MASS extended source neighbour (H
            band, Vega).
      metadata: {}
