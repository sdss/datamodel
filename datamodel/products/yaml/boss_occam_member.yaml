general:
  name: boss_occam_member
  short: The BOSS OCCAM member summary table provides positional, identification,
    and membership information for candidate open cluster member stars.
  description: The BOSS OCCAM member summary table provides the proper motion membership
    probabilities from Hunt and Reffert 2023 alongside the radial velocity and [Fe/H]
    membership probabilities from BOSS/CLAM. Basic positional information is included
    with source IDs from Gaia DR3 and SDSS for each star in the table.
  datatype: FITS
  filesize: 593 KB
  releases:
  - DR20
  environments:
  - BOSS_OCCAM
  surveys:
  - SDSS
  naming_convention: $BOSS_OCCAM/BOSS_occam_member-[V_VAC].fits where V_VAC=DR20-v1
    in DR20.
  generated_by: OCCAM
  data_level: 3.3.0
  design: false
  vac: true
  recommended_science_product: true
changelog:
  description: Describes changes to the datamodel product and/or file structure from
    one release to another
  releases: {}
releases:
  DR20:
    template: $BOSS_OCCAM/BOSS_occam_member-[V_VAC].fits
    example: BOSS_occam_member-DR20-v1.fits
    location: BOSS_occam_member-{v_vac}.fits
    environment: BOSS_OCCAM
    access:
      in_sdss_access: true
      path_name: boss_occam_member
      path_template: $BOSS_OCCAM/BOSS_occam_member-{v_vac}.fits
      path_kwargs:
      - v_vac
      access_string: boss_occam_member = $BOSS_OCCAM/BOSS_occam_member-{v_vac}.fits
    survey: SDSS
    hdus:
      hdu0:
        name: PRIMARY
        description: The primary HDU, in accordance with the FITS file standard. No
          useful information is stored here.
        is_image: true
        size: 0 bytes
        header:
        - key: SIMPLE
          value: true
          comment: conforms to FITS standard
        - key: BITPIX
          value: 8
          comment: array data type
        - key: NAXIS
          value: 0
          comment: number of array dimensions
        - key: EXTEND
          value: true
          comment: ''
      hdu1:
        name: OCCAM data
        description: 'The data reported are as follows:

          '
        is_image: false
        size: 584 KB
        header:
        - key: XTENSION
          value: BINTABLE
          comment: binary table extension
        - key: BITPIX
          value: 8
          comment: array data type
        - key: NAXIS
          value: 2
          comment: number of array dimensions
        - key: NAXIS1
          value: 156
          comment: length of dimension 1
        - key: NAXIS2
          value: 3834
          comment: length of dimension 2
        - key: PCOUNT
          value: 0
          comment: number of group parameters
        - key: GCOUNT
          value: 1
          comment: number of groups
        - key: TFIELDS
          value: 22
          comment: number of table fields
        columns:
          Cluster:
            name: Cluster
            type: char
            unit: ''
            description: Open cluster name
          SDSS_ID:
            name: SDSS_ID
            type: int64
            unit: ''
            description: Internal SDSS source ID
          GaiaDR3_ID:
            name: GaiaDR3_ID
            type: int64
            unit: ''
            description: Gaia DR3 source ID
          GLON:
            name: GLON
            type: float32
            unit: deg
            description: Galactic longitude
          GLAT:
            name: GLAT
            type: float32
            unit: deg
            description: Galactic latitude
          RAdeg:
            name: RAdeg
            type: float64
            unit: deg
            description: Right ascension
          DEdeg:
            name: DEdeg
            type: float64
            unit: deg
            description: Declination
          V_RAD:
            name: V_RAD
            type: float32
            unit: km/s
            description: Average radial velocity
          E_V_RAD:
            name: E_V_RAD
            type: float32
            unit: km/s
            description: Standard error in radial velocity measurements
          PMRA:
            name: PMRA
            type: float32
            unit: mas/yr
            description: Proper motion in RA
          E_PMRA:
            name: E_PMRA
            type: float32
            unit: mas/yr
            description: Standard error of proper motion in RA
          PMDE:
            name: PMDE
            type: float32
            unit: mas/yr
            description: Proper motion in declination
          E_PMDE:
            name: E_PMDE
            type: float32
            unit: mas/yr
            description: Standard error of proper motion in declination
          FeH_CLAM:
            name: FeH_CLAM
            type: float64
            unit: dex
            description: '[Fe/H] from the CLAM pipeline'
          E_FeH_CLAM:
            name: E_FeH_CLAM
            type: float64
            unit: dex
            description: 1-sigma [Fe/H] dispersion from the CLAM pipeline
          alpha_M_CLAM:
            name: alpha_M_CLAM
            type: float64
            unit: dex
            description: '[alpha/M] from the CLAM pipeline'
          E_alpha_M_CLAM:
            name: E_alpha_M_CLAM
            type: float64
            unit: dex
            description: 1-sigma [alpha/M] dispersion from the CLAM pipeline
          EH_Prob:
            name: EH_Prob
            type: float64
            unit: ''
            description: Membership probability from Hunt & Reffert 2023
          RV_Prob:
            name: RV_Prob
            type: float64
            unit: ''
            description: OCCAM RV membership probability
          FeH_Prob_CLAM:
            name: FeH_Prob_CLAM
            type: float64
            unit: ''
            description: OCCAM CLAM [Fe/H] membership probability
          Teff:
            name: Teff
            type: float64
            unit: K
            description: Effective temperature
          logg:
            name: logg
            type: float64
            unit: dex
            description: Surface gravity log(g)
notes: |-
  None
regrets: |-
  I  have no regrets!
