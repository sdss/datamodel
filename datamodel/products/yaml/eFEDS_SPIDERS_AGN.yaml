general:
  name: eFEDS_SPIDERS_AGN
  short: SPIDERS (SDSS and eROSITA) AGN fitting results
  description: We provide measurements of the optical spectral fits of X-ray-selected
    Active Galactic Nuclei within the SPIDERS program (Spectroscopic Identification
    of ERosita Sources) in the eFEDS field. These objects were detected with eROSITA
    and followed up with SDSS (DR18). We also provide the X-ray and public photometric
    data.
  datatype: FITS
  filesize: 159 MB
  releases:
  - DR20
  environments:
  - SPIDERS_AGN
  surveys:
  - SDSS
  naming_convention: $SPIDERS_AGN/[V_VAC]/eFEDS_SPIDERS_AGN-[V_VAC].fits where V_VAC=1.0.0
    for DR20
  generated_by: SPIDERS_AGN
  data_level: 3.3.0
  design: false
  vac: true
  recommended_science_product: true
changelog:
  description: Describes changes to the datamodel product and/or file structure from
    one release to another
  releases: {}
releases:
  DR20:
    template: $SPIDERS_AGN/[V_VAC]/eFEDS_SPIDERS_AGN-[V_VAC].fits
    example: 1.0.0/eFEDS_SPIDERS_AGN-1.0.0.fits
    location: '{v_vac}/eFEDS_SPIDERS_AGN-{v_vac}.fits'
    environment: SPIDERS_AGN
    access:
      in_sdss_access: true
      path_name: eFEDS_SPIDERS_AGN
      path_template: $SPIDERS_AGN/{v_vac}/eFEDS_SPIDERS_AGN-{v_vac}.fits
      path_kwargs:
