          value: 8
          comment: Character data
        - key: NAXIS
          value: 0
          comment: No image, just extensions
        - key: EXTEND
          value: true
          comment: There are standard extensions
        - key: COMMENT
          value: Dummy header; see following table extension
          comment: ''
