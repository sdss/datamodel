      hdu5:
        name: MAIN_X_RAY_CATALOGUE_BRUNNER2022
        description: eROSITA Main Sample X-ray catalogue from Brunner et al. (2022)
        is_image: false
        size: 15 MB
        header:
        - key: XTENSION
          value: BINTABLE
          comment: binary table extension
        - key: BITPIX
          value: 8
          comment: 8-bit bytes
        - key: NAXIS
          value: 2
          comment: 2-dimensional table
        - key: NAXIS1
          value: 1262
          comment: width of table in bytes
        - key: NAXIS2
          value: 12866
          comment: number of rows in table
        - key: PCOUNT
          value: 0
          comment: size of special data area
        - key: GCOUNT
          value: 1
          comment: one data group
        - key: TFIELDS
          value: 167
          comment: number of columns
        - key: EXTNAME
          value: MAIN_X_RAY_CATALOGUE_BRUNNER2022
          comment: table name
        - key: TCOMM1
          value: SDSS Object ID, either PLATE-MJD-FIBERID or PLATE-MJD-CATALOGID
          comment: ''
        - key: TCOMM2
          value: eROSITA official source Name
          comment: ''
        - key: TCOMM3
          value: Spectroscopic redshift from visual inspection (Aydar+2025)
          comment: ''
        - key: TCOMM4
          value: Main or Hard sample from eROSITA (Brunner+2022)
          comment: ''
        - key: TUNIT5
          value: deg
          comment: units for column 5
        - key: TCOMM5
          value: SDSS right ascension (J2000)
          comment: ''
        - key: TUNIT6
          value: deg
          comment: units for column 6
        - key: TCOMM6
          value: SDSS declination (J2000)
          comment: ''
        - key: TCOMM7
          value: ID of eROSITA source in the Main Sample
          comment: ''
        - key: TCOMM8
          value: ID of eROSITA source in the Hard Sample
          comment: ''
        - key: TUNIT9
          value: deg
          comment: units for column 9
        - key: TCOMM9
          value: eROSITA uncorrected RA (ICRS)
          comment: ''
        - key: TUNIT10
          value: deg
          comment: units for column 10
        - key: TCOMM10
          value: eROSITA uncorrected Dec (ICRS)
          comment: ''
        - key: TUNIT11
          value: arcsec
          comment: units for column 11
        - key: TCOMM11
          value: Combined positional uncertainty, uncorrected
          comment: ''
        - key: TUNIT12
          value: deg
          comment: units for column 12
        - key: TCOMM12
          value: J2000 Right Ascension of the eROSITA source (corrected)
          comment: ''
        - key: TUNIT13
          value: deg
          comment: units for column 13
        - key: TCOMM13
          value: J2000 Declination of the eROSITA source (corrected)
          comment: ''
        - key: TUNIT14
          value: arcsec
          comment: units for column 14
        - key: TCOMM14
          value: eROSITA positional uncertainty (corrected)
          comment: ''
        - key: TUNIT15
          value: arcsec
          comment: units for column 15
        - key: TCOMM15
          value: Source extent
          comment: ''
        - key: TUNIT16
          value: arcsec
          comment: units for column 16
        - key: TCOMM16
          value: Extent error
          comment: ''
