general:
  name: boss_ISM_NaI_absorption
  short: Catalog of Na I D interstellar absorption equivalent widths and V-band extinctions
    measured from SDSS-V DR20 BOSS spectra.
  description: "This VAC provides measurements of the Na I D (5889.95/5895.92 \xC5\
    ) interstellar absorption doublet and V-band dust extinction (A_V, assuming R_V\
    \ = 3.1) for 1,373,392 stellar sightlines observed with the BOSS spectrograph\
    \ as part of the SDSS-V Milky Way Mapper program. Equivalent widths and extinctions\
    \ are derived from spectral fits via ISM-cleaned MaStar spectra; uncertainties\
    \ and fit quality (reduced chi^2) are reported for each source. See McQuaid et\
    \ al. (2026) for full methodology."
  datatype: FITS
  filesize: 83 MB
  releases:
  - DR20
  environments:
  - MWM_ISM
  surveys:
  - SDSS
  naming_convention: $MWM_ISM/NaI_ISM/boss_ISM_NaI_absorption-[V_VAC].fits where V_VAC=1.0.0
    in DR20
  generated_by: https://github.com/timmcq1400/nai-ism-vac
  data_level: 3.3.0
  design: false
  vac: true
  recommended_science_product: true
changelog:
  description: Describes changes to the datamodel product and/or file structure from
    one release to another
  releases: {}
