general:
  name: payne4GAIN_summary
  short: Summary table of the LTE and NLTE Payne fits of red giant spectra, as well as aspcap raw values, and NLTE corrected aspcap raw values
  description: We trained Payne models on grids of Turbospectrum_NLTE synthetic spectra: one in LTE and one in NLTE, 
  using departure coefficient grids calculated in MULTI. We chi-squared fit the APOGEE DR19 spectra that fall
  within our training range (according to ASPCAP) and present the results of our fits. We also perform a polynomial
  fit to the NLTE-LTE corrections, expecting them to vary smoothly with the stellar parameters, and apply them to
  the aspcap raw values. The aspcap raw values are also packaged with this VAC, for comparison.
  datatype: FITS
  filesize: 213 MB
  releases:
  - DR20
  environments:
  - MWM_RGB
  surveys:
  - SDSS
  naming_convention: $MWM_RGB/apogee_rgb_nlte_abundances/payne4GAIN_summary-[V_VAC].fits
    where V_VAC=1.1.1 for DR20
  generated_by: Thibodeaux et al (in prep.)
  data_level: 3.3.0
  design: false
  vac: true
  recommended_science_product: true
changelog:
  description: Describes changes to the datamodel product and/or file structure from
    one release to another
  releases: {}
