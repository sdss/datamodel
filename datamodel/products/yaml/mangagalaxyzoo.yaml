      access_string: mangagalaxyzoo = $MANGA_MORPHOLOGY/galaxyzoo/MaNGA_gz-{ver}.fits
    survey: MaNGA
    hdus:
      hdu0:
        name: PRIMARY
        description: "TheGalaxy Zoo(GZ) data for SDSS galaxies has been split over\
          \ several iterations of the website, with the MaNGA\n  target galaxies being\
          \ spread over 5 different GZ data sets. In this VAC we bring all of these\
          \ galaxies into one\n  single catalog with the debiasing code run in a consistent\
          \ manner across the all the galaxies. This\n  catalog includes previously\
          \ published data from Galaxy Zoo 2 (Willett 2013)\n  and newer data from\
          \ Galaxy Zoo 4 and 5 (previously unpublished)."
        is_image: true
        size: 0 bytes
        header:
        - key: SIMPLE
          value: true
          comment: conforms to FITS standard
        - key: BITPIX
          value: 8
          comment: array data type
        - key: NAXIS
          value: 0
          comment: number of array dimensions
        - key: EXTEND
          value: true
          comment: ''
      hdu1:
