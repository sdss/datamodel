general:
  name: mangagalaxyzoo
  short: This table contains the Galaxy Zoo classifications for all MaNGA target galaxies.
  description: This table contains the Galaxy Zoo classifications for all MaNGA target
    galaxies.
  datatype: FITS
  filesize: 43 MB
  releases:
  - DR15
  - DR17
  environments:
  - MANGA_MORPHOLOGY
  surveys:
  - MaNGA
  naming_convention: $MANGA_MORPHOLOGY/galaxyzoo/MaNGA_gz-[VER].fits where VER=v1_0_1
    in DR15 and VER=v2_0_1 in DR17.
  generated_by: sas
  data_level: 3.3.0
  design: false
  vac: true
  recommended_science_product: true
changelog:
  description: Describes changes to the datamodel product and/or file structure from
    one release to another
  releases:
    DR17:
      from: DR15
      added_hdus:
      - /Users/Karen/Desktop/GalaxyZoo DR17 VAC/MaNGA_GZ2.csv
      primary_delta_nkeys: 1
      added_primary_header_kwargs:
      - COMMENT
releases:
  DR15:
    template: $MANGA_MORPHOLOGY/galaxyzoo/MaNGA_gz-[VER].fits
    example: galaxyzoo/MaNGA_gz-v1_0_1.fits
    location: galaxyzoo/MaNGA_gz-{ver}.fits
    environment: MANGA_MORPHOLOGY
    access:
      in_sdss_access: true
      path_name: mangagalaxyzoo
      path_template: $MANGA_MORPHOLOGY/galaxyzoo/MaNGA_gz-{ver}.fits
      path_kwargs:
