general:
  name: mos_target_sdssv_boss_spall_parquet
  short: 'MOS Target Table: sdssv_boss_spall'
  description: 'The dr20_sdssv_boss_spall table is a database representation of an
    early version of the SDSS-V BOSS spAll data product.


    The dr20_sdssv_boss_spall table was used within early iterations of FPS target_selection
    as a way to communicate information about which targets had been observed in SDSS-V
    plates. This information was used to e.g. de-prioritise targets that were expected
    to have a good quality spectroscopic measurement before the start of SDSS-V FPS
    operations.


    Caution. The dr20_sdssv_boss_spall table should only be used in order to recreate
    the target_selection selection function.


    Column descriptions are mainly derived from: <a href="https://data.sdss.org/datamodel/files/BOSS_SPECTRO_REDUX/RUN2D/spAll.html">https://data.sdss.org/datamodel/files/BOSS_SPECTRO_REDUX/RUN2D/spAll.html</a>'
  datatype: PARQUET
  filesize: 31 MB
  releases:
  - DR20
  environments:
  - MOS_TARGET
  surveys:
  - SDSS
  naming_convention: $MOS_TARGET/[V_TARG]/[FTYPE]/mos_sdssv_boss_spall.[FTYPE] with
    FTYPE='parquet' and V_TARG='2.0.0' for DR20.
  generated_by: sdss5db targeting database.
  data_level: 2.3.3
  design: false
  vac: false
  recommended_science_product: false
changelog:
  description: Describes changes to the datamodel product and/or file structure from
    one release to another
  releases: {}
