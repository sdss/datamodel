general:
  name: mos_target_catalog
  short: 'MOS Target Table: catalog'
  description: The results of the cross-match used for DR20 targeting. Entries in
    this table are expected to be unique physical objects drawn from one or more parent
    catalogues. The dr20_catalog_to_ tables provide the relationships to their parent
    catalogue counterparts.
  datatype: FITS
  filesize: 95 MB
  releases:
  - DR20
  environments:
  - MOS_TARGET
  surveys:
  - SDSS
  naming_convention: $MOS_TARGET/[V_TARG]/[FTYPE]/mos_catalog-[NUM].[FTYPE] with FTYPE='fits',
    V_TARG='2.0.0', and NUM=1..137 for DR20.
  generated_by: sdss5db targeting database.
  data_level: 2.3.3
  design: false
  vac: false
  recommended_science_product: false
changelog:
  description: Describes changes to the datamodel product and/or file structure from
    one release to another
  releases: {}
releases:
  DR20:
    template: $MOS_TARGET/[V_TARG]/[FTYPE]/mos_catalog-[NUM].[FTYPE]
    example: 2.0.0/fits/mos_catalog-001.fits
    location: '{v_targ}/{ftype}/mos_catalog-{num}.{ftype}'
    environment: MOS_TARGET
    access:
      in_sdss_access: true
      path_name: mos_target_catalog
      path_template: $MOS_TARGET/{v_targ}/{ftype}/mos_catalog@mos_target_num3|.{ftype}
      path_kwargs:
      - ftype
      - v_targ
      - num
      access_string: mos_target_catalog = $MOS_TARGET/{v_targ}/{ftype}/mos_catalog-{num}.{ftype}
    survey: SDSS
    hdus:
      hdu0:
        name: PRIMARY
        description: Primary header
        is_image: true
        size: 0 bytes
        header:
        - key: SIMPLE
          value: true
          comment: conforms to FITS standard
        - key: BITPIX
          value: 8
          comment: array data type
        - key: NAXIS
          value: 0
          comment: number of array dimensions
        - key: EXTEND
          value: true
          comment: ''
      hdu1:
        name: ''
        description: 'MOS Target Table: catalog'
        is_image: false
        size: 95 MB
        header:
        - key: XTENSION
          value: BINTABLE
          comment: binary table extension
        - key: BITPIX
          value: 8
          comment: array data type
        - key: NAXIS
          value: 2
          comment: number of array dimensions
        - key: NAXIS1
          value: 50
          comment: length of dimension 1
        - key: NAXIS2
          value: 2000000
          comment: length of dimension 2
        - key: PCOUNT
          value: 0
          comment: number of group parameters
        - key: GCOUNT
          value: 1
          comment: number of groups
        - key: TFIELDS
          value: 9
          comment: number of table fields
        - key: TNULL1
          value: -9223372036854775808
          comment: ''
        - key: TNULL9
          value: -2147483648
          comment: ''
        columns:
          catalogid:
            name: catalogid
            type: int64
            unit: ''
            description: The SDSS identifier for a unique object in this cross-match
              run.
          iauname:
            name: iauname
            type: char[4]
            unit: ''
            description: The IAU-style name. Not used.
          ra:
            name: ra
            type: float64
            unit: degrees
            description: The right ascension of the target in ICRS coordinates for
              J2015.5. Taken from the lead parent catalogue
          dec:
            name: dec
            type: float64
            unit: degrees
            description: The declination of the target in ICRS coordinates for J2015.5.
              Taken from the lead parent catalogue
          pmra:
            name: pmra
            type: float32
            unit: mas/yr
            description: The proper motion of the target in right ascension. Taken
              from the lead parent catalogue. This is a true angle (i.e., the cos(dec)
              factor has been applied)
          pmdec:
            name: pmdec
            type: float32
            unit: mas/yr
            description: The proper motion of the target in declination. Taken from
              the lead parent catalogue
          parallax:
            name: parallax
            type: float32
            unit: arcsec
            description: The parallax of the target. Taken from the lead parent catalogue
          lead:
            name: lead
            type: char[6]
            unit: ''
            description: The name of the parent catalogue from which this target was
              selected and whose data was used to determine its astrometric position.
          version_id:
            name: version_id
            type: int32
            unit: ''
            description: The internal version for the cross-match.
notes: None
regrets: I  have no regrets!
