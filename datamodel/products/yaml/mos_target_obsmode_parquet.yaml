general:
  name: mos_target_obsmode_parquet
  short: 'MOS Target Table: obsmode'
  description: The table contains observing constraints for different observing modes.
    Cadences have an observing mode associated with each epoch, and the constraints
    are checked before an epoch can be scheduled.
  datatype: PARQUET
  filesize: 2 KB
  releases:
  - DR20
  environments:
  - MOS_TARGET
  surveys:
  - SDSS
  naming_convention: $MOS_TARGET/[V_TARG]/[FTYPE]/mos_obsmode.[FTYPE] with FTYPE='parquet'
    and V_TARG='2.0.0' for DR20.
  generated_by: sdss5db targeting database.
  data_level: 2.3.3
  design: false
  vac: false
  recommended_science_product: false
changelog:
  description: Describes changes to the datamodel product and/or file structure from
    one release to another
  releases: {}
releases:
  DR20:
    template: $MOS_TARGET/[V_TARG]/[FTYPE]/mos_obsmode.[FTYPE]
    example: 2.0.0/parquet/mos_obsmode.parquet
    location: '{v_targ}/{ftype}/mos_obsmode.{ftype}'
    environment: MOS_TARGET
    access:
      in_sdss_access: true
      path_name: mos_target_obsmode
      path_template: $MOS_TARGET/{v_targ}/{ftype}/mos_obsmode.{ftype}
      path_kwargs:
      - ftype
      - v_targ
      access_string: mos_target_obsmode = $MOS_TARGET/{v_targ}/{ftype}/mos_obsmode.{ftype}
    survey: SDSS
    dataframe:
      columns:
        label:
          name: label
          dtype: String
          unit: ''
          description: Descriptive name for the observing mode, e.g. 'dark_rm'
        min_moon_sep:
          name: min_moon_sep
          dtype: Float32
          unit: deg
          description: Minimum distance a target must be from the Moon
        min_deltav_ks91:
          name: min_deltav_ks91
          dtype: Float32
          unit: mag
          description: Minimum estimated background flux from the Moon, using the
            method of Krisciunas, K., & Schaefer 1991
        min_twilight_ang:
          name: min_twilight_ang
          dtype: Float32
          unit: deg
          description: Minimum twilight angle (angle of the Sun below the horizon)
            for a target to be observed
        max_airmass_apo:
          name: max_airmass_apo
          dtype: Float32
          unit: ''
          description: Max airmass at which a target can be observed at APO
        max_airmass_lco:
          name: max_airmass_lco
          dtype: Float32
          unit: ''
          description: Max airmass at which a target can be observed at LCO
      metadata: {}
notes: |-
  None
