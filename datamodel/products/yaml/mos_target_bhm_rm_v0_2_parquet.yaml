general:
  name: mos_target_bhm_rm_v0_2_parquet
  short: 'MOS Target Table: bhm_rm_v0_2'
  description: "Parent sample for the RM project.\n\nUsed to select confirmed and\
    \ candidate quasar targets for the BHM-RM Program in SDSS-V. For more details\
    \ please see Yang and Shen, (2022, <a href=\"https://ui.adsabs.harvard.edu/abs/2022arXiv220608989Y/abstract)\"\
    >https://ui.adsabs.harvard.edu/abs/2022arXiv220608989Y/abstract)</a>.\n\nThis\
    \ table contains all photometric objects detected in the COSMOS, SDSS-RM, XMM-LSS,\
    \ CDFS, S-CVZ, and ELAIS-S1 fields., within a circular area of 10 degree^2 from\
    \ the field center.\n\nField center: Name     RA          DEC\n              XMM-LSS\
    \  02:22:50.00    -04:45:00.0\n              CDFS     03:30:35.60    -28:06:00.0\n\
    \              EDFS     04:04:57.84    -48:25:22.8\n              ELAIS-S1 00:37:48.00\
    \    -44:00:00.0\n              COSMOS   10:00:00.00    +02:12:00.0\n        \
    \      SDSS-RM  14:14:49.00    +53:05:00.0\n              S-CVZ    06:00:00.00\
    \    -66:33:38.0\n\nThe table includes information from the following survey data\
    \ releases:\nDES: Dark Energy Survey, Y6, Y6A1_COADD_OBJECT_SUMMARY\nPS1: Pan-STARRS,\
    \ DR1, StackObjectThin\nNSC: NOAO Source Catalog, DR1, nsc_dr1.object\nSDSS: Sloan\
    \ Digital Sky Survey, DR14, PhotoObjAll\nGaia: DR2, gaia_dr2.gaia_source\nunWISE:\
    \ DR1\nNear-infrared: LAS: UKIDSS Large Area Surveys (DR11),\n               UHS:\
    \ UKIRT Hemisphere Survey (DR1),\n               VHS: VISTA Hemisphere Survey\
    \ (DR6),\n               Viking: VISTA Kilo-Degree Infrared Galaxy Survey (DR5),\n\
    \               VIDEO: VISTA Deep Extragalactic Observations Survey (DR5),\n \
    \              VMC: VISTA Magellanic Cloud Survey (DR4)\n\nValues are set to -9.0\
    \ or -9 if null.\n\nThe dr20_bhm_rm_v0_2 table corresponds to Version: v0.2, 06/30/2020\n\
    Changes (wrt v0) include correct error in spec_q column, and add specz from OzDES\
    \ DR2"
