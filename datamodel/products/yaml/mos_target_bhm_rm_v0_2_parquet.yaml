  naming_convention: $MOS_TARGET/[V_TARG]/[FTYPE]/mos_bhm_rm_v0_2.[FTYPE] with FTYPE='parquet'
    and V_TARG='2.0.0' for DR20.
  generated_by: sdss5db targeting database.
  data_level: 2.3.3
  design: false
  vac: false
  recommended_science_product: false
