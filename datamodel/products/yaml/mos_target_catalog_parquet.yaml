general:
  name: mos_target_catalog_parquet
  short: 'MOS Target Table: catalog'
  description: The results of the cross-match used for DR20 targeting. Entries in
    this table are expected to be unique physical objects drawn from one or more parent
    catalogues. The dr20_catalog_to_ tables provide the relationships to their parent
    catalogue counterparts.
  datatype: PARQUET
  filesize: 5 GB
  releases:
  - DR20
  environments:
  - MOS_TARGET
  surveys:
  - SDSS
  naming_convention: $MOS_TARGET/[V_TARG]/[FTYPE]/mos_catalog.[FTYPE] with FTYPE='parquet'
    and V_TARG='2.0.0' for DR20.
  generated_by: sdss5db targeting database.
  data_level: 2.3.3
  design: false
  vac: false
  recommended_science_product: false
changelog:
  description: Describes changes to the datamodel product and/or file structure from
    one release to another
  releases: {}
releases:
  DR20:
    template: $MOS_TARGET/[V_TARG]/[FTYPE]/mos_catalog.[FTYPE]
    example: 2.0.0/parquet/mos_catalog.parquet
    location: '{v_targ}/{ftype}/mos_catalog.{ftype}'
    environment: MOS_TARGET
    access:
      in_sdss_access: true
      path_name: mos_target_catalog
      path_template: $MOS_TARGET/{v_targ}/{ftype}/mos_catalog@mos_target_num3|.{ftype}
      path_kwargs:
      - ftype
      - v_targ
      access_string: mos_target_catalog = $MOS_TARGET/{v_targ}/{ftype}/mos_catalog.{ftype}
    survey: SDSS
    dataframe:
      columns:
        catalogid:
          name: catalogid
          dtype: Int64
          unit: ''
          description: The SDSS identifier for a unique object in this cross-match
            run.
        iauname:
          name: iauname
          dtype: String
          unit: ''
          description: The IAU-style name. Not used.
        ra:
          name: ra
          dtype: Float64
          unit: degrees
          description: The right ascension of the target in ICRS coordinates for J2015.5.
            Taken from the lead parent catalogue
        dec:
          name: dec
          dtype: Float64
          unit: degrees
          description: The declination of the target in ICRS coordinates for J2015.5.
            Taken from the lead parent catalogue
        pmra:
          name: pmra
          dtype: Float32
          unit: mas/yr
          description: The proper motion of the target in right ascension. Taken from
            the lead parent catalogue. This is a true angle (i.e., the cos(dec) factor
            has been applied)
        pmdec:
          name: pmdec
          dtype: Float32
          unit: mas/yr
          description: The proper motion of the target in declination. Taken from
            the lead parent catalogue
        parallax:
          name: parallax
          dtype: Float32
          unit: arcsec
          description: The parallax of the target. Taken from the lead parent catalogue
        lead:
          name: lead
          dtype: String
          unit: ''
          description: The name of the parent catalogue from which this target was
            selected and whose data was used to determine its astrometric position.
        version_id:
          name: version_id
          dtype: Int32
          unit: ''
          description: The internal version for the cross-match.
      metadata: {}
notes: |-
  None
regrets: |-
  I  have no regrets!
