general:
  name: mos_target_cadence_parquet
  short: 'MOS Target Table: cadence'
  description: Cadences define the time between series of exposures (one "epoch")
    on a field, and the observing conditions, e.g., skybrightness, for each epoch.
  datatype: PARQUET
  filesize: 67 KB
  releases:
  - DR20
  environments:
  - MOS_TARGET
  surveys:
  - SDSS
  naming_convention: $MOS_TARGET/[V_TARG]/[FTYPE]/mos_cadence.[FTYPE] with FTYPE='parquet'
    and V_TARG='2.0.0' for DR20.
  generated_by: sdss5db targeting database.
  data_level: 2.3.3
  design: false
  vac: false
  recommended_science_product: false
changelog:
  description: Describes changes to the datamodel product and/or file structure from
    one release to another
  releases: {}
releases:
  DR20:
    template: $MOS_TARGET/[V_TARG]/[FTYPE]/mos_cadence.[FTYPE]
    example: 2.0.0/parquet/mos_cadence.parquet
    location: '{v_targ}/{ftype}/mos_cadence.{ftype}'
    environment: MOS_TARGET
    access:
      in_sdss_access: true
      path_name: mos_target_cadence
      path_template: $MOS_TARGET/{v_targ}/{ftype}/mos_cadence.{ftype}
      path_kwargs:
      - ftype
      - v_targ
      access_string: mos_target_cadence = $MOS_TARGET/{v_targ}/{ftype}/mos_cadence.{ftype}
    survey: SDSS
    dataframe:
      columns:
        label:
          name: label
          dtype: String
          unit: ''
          description: Descriptive name for the cadence with a version
        nepochs:
          name: nepochs
          dtype: Int32
          unit: ''
          description: Number of epochs in the cadence
        pk:
          name: pk
          dtype: Int64
          unit: ''
          description: Primary key
        label_root:
          name: label_root
          dtype: String
          unit: ''
          description: Descriptive name, typically {bright/dark}_{nepochs}x{nexps}
        label_version:
          name: label_version
          dtype: String
          unit: ''
          description: Version; cadences are added in versioned batches
        max_skybrightness:
          name: max_skybrightness
          dtype: Float32
          unit: ''
          description: The maximum skybrightness for all epochs in this cadence
        nexp_total:
          name: nexp_total
          dtype: Int32
          unit: ''
          description: The total number of exposures planned for this cadence
      metadata: {}
notes: None
regrets: I  have no regrets!
