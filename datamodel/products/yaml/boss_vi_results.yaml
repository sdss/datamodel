releases:
  DR20:
    template: $BHM_VI/[V_VAC]/boss_vi_results-[V_VAC].fits
    example: 1.0.3/boss_vi_results-1.0.3.fits
    location: '{v_vac}/boss_vi_results-{v_vac}.fits'
    environment: BHM_VI
    access:
      in_sdss_access: true
      path_name: boss_vi_results
      path_template: $BHM_VI/{v_vac}/boss_vi_results-{v_vac}.fits
      path_kwargs:
      - v_vac
      access_string: boss_vi_results = $BHM_VI/{v_vac}/boss_vi_results-{v_vac}.fits
    survey: SDSS
    hdus:
      hdu0:
        name: PRIMARY
        description: replace me description
        is_image: true
        size: 0 bytes
        header:
        - key: SIMPLE
          value: true
          comment: conforms to FITS standard
        - key: BITPIX
          value: 8
          comment: array data type
        - key: NAXIS
          value: 0
          comment: number of array dimensions
        - key: EXTEND
          value: true
          comment: ''
      hdu1:
        name: VI_RESULTS
        description: replace me description
        is_image: false
        size: 28 MB
        header:
        - key: XTENSION
          value: BINTABLE
          comment: binary table extension
        - key: BITPIX
          value: 8
          comment: array data type
        - key: NAXIS
          value: 2
          comment: number of array dimensions
        - key: NAXIS1
          value: 58
          comment: length of dimension 1
        - key: NAXIS2
          value: 506550
          comment: length of dimension 2
        - key: PCOUNT
          value: 0
          comment: number of group parameters
        - key: GCOUNT
          value: 1
          comment: number of groups
        - key: TFIELDS
          value: 13
          comment: number of table fields
        - key: EXTNAME
          value: VI_RESULTS
          comment: Table name
        - key: VACVER
          value: 1.0.3
          comment: VAC version number
        - key: SDSSDR
          value: dr20
          comment: SDSS data release number
        - key: MAPPER
          value: BHM
          comment: SDSS Mapper team providing this VAC
        - key: DATECREAT
          value: '2026-05-11T08:43:03.696'
          comment: Date VAC was created
        - key: DATEMOD
          value: '2026-05-11T08:43:03.696'
          comment: Date VAC was last modified
        - key: LONGSTRN
          value: OGIP 1.0
          comment: The OGIP Long String Convention may be used.
        - key: TCOMM1
          value: SDSS field identifier
          comment: ''
        - key: TCOMM2
          value: SDSS MJD - last date the object was observed
          comment: ''
        - key: TCOMM3
          value: SDSS unique catalog identifier
          comment: ''
        - key: TCOMM4
          value: SDSS unique object identifer
          comment: ''
        - key: TCOMM5
          value: True if spectrum was visually inspected
          comment: ''
        - key: TCOMM6
          value: Pipeline redshift, copied from spAll
          comment: ''
        - key: TCOMM7
          value: Visual inspection redshift, when available
          comment: ''
        - key: TCOMM8
          value: The degree of confidence we have on z_vi
          comment: ''
        - key: TCOMM9
          value: Best redshift available (from VI when available, from the pipeline
            otherwise). NaN when z_conf_best < 2
          comment: ''
        - key: TCOMM10
          value: The degree of confidence we have on z_best
          comment: ''
        - key: TCOMM11
          value: The best classification for this spectrum
          comment: ''
        - key: TCOMM12
          value: True when z_pipe is correct (via ML classifier)
          comment: ''
        - key: TCOMM13
          value: True if z_best is reliable, i.e. z_conf_best=3 (when we have a secure
            VI redshift, or the ML classifier says that z_pipe is reliable)
          comment: ''
        columns:
          field:
            name: field
            type: int32
            unit: replace me - with content
            description: SDSS field identifier
          mjd:
            name: mjd
            type: int32
            unit: replace me - with content
            description: SDSS MJD - last date the object was observed
          catalogid:
            name: catalogid
            type: int64
            unit: replace me - with content
            description: SDSS unique catalog identifier
          sdss_id:
            name: sdss_id
            type: int64
            unit: replace me - with content
            description: SDSS unique object identifer
          z_pipe:
            name: z_pipe
            type: float32
            unit: replace me - with content
            description: True if spectrum was visually inspected
          has_vi:
            name: has_vi
            type: bool
            unit: replace me - with content
            description: Pipeline redshift, copied from spAll
          z_vi:
            name: z_vi
            type: float32
            unit: replace me - with content
            description: Visual inspection redshift, when available
          z_conf_vi:
            name: z_conf_vi
            type: int16
            unit: replace me - with content
            description: The degree of confidence we have on z_vi
          z_best:
            name: z_best
            type: float32
            unit: replace me - with content
            description: Best redshift available (from VI when available
          z_conf_best:
            name: z_conf_best
            type: int16
            unit: replace me - with content
            description: The degree of confidence we have on z_best
          class_best:
            name: class_best
            type: char[15]
            unit: replace me - with content
            description: The best classification for this spectrum
          z_pipe_reliable:
            name: z_pipe_reliable
            type: bool
            unit: replace me - with content
            description: True when z_pipe is correct (via ML classifier)
          z_best_reliable:
            name: z_best_reliable
            type: bool
            unit: replace me - with content
            description: True if z_best is reliable, i.e. z_conf_best=3
