general:
  name: lvm_qa
  short: replace me - with a short one sentence summary of file
  description: replace me - with a longer description of the data product
  datatype: FITS
  filesize: 50 KB
  releases:
  - DR20
  environments:
  - LVM_SPECTRO_ANALYSIS
  surveys:
  - SDSS
  naming_convention: replace me - with $LVM_SPECTRO_ANALYSIS/[DRPVER]/[DAPVER]/qa_bitmasks-[DRPVER]-[DAPVER].fits
    or qa_bitmasks-1.2.0-1.2.0.251218.fits but with regex pattern matches
  generated_by: replace me - with the name(s) of any git or svn product(s) that produces
    this product.
  data_level: 2.3.3
  design: false
  vac: false
  recommended_science_product: true
changelog:
  description: Describes changes to the datamodel product and/or file structure from
    one release to another
  releases: {}
releases:
  DR20:
    template: $LVM_SPECTRO_ANALYSIS/[DRPVER]/[DAPVER]/qa_bitmasks-[DRPVER]-[DAPVER].fits
    example: 1.2.0/1.2.0.251218/qa_bitmasks-1.2.0-1.2.0.251218.fits
    location: '{drpver}/{dapver}/qa_bitmasks-{drpver}-{dapver}.fits'
    environment: LVM_SPECTRO_ANALYSIS
    access:
      in_sdss_access: true
      path_name: lvm_qa
      path_template: $LVM_SPECTRO_ANALYSIS/{drpver}/{dapver}/qa_bitmasks-{drpver}-{dapver}.fits
      path_kwargs:
      - drpver
      - dapver
      access_string: lvm_qa = $LVM_SPECTRO_ANALYSIS/{drpver}/{dapver}/qa_bitmasks-{drpver}-{dapver}.fits
    survey: SDSS
    hdus:
      hdu0:
        name: PRIMARY
        description: replace me description
        is_image: true
        size: 0 bytes
        header:
        - key: SIMPLE
          value: true
          comment: conforms to FITS standard
        - key: BITPIX
          value: 8
          comment: array data type
        - key: NAXIS
          value: 0
          comment: number of array dimensions
        - key: EXTEND
          value: true
          comment: ''
      hdu1:
        name: QA
        description: replace me description
        is_image: false
        size: 32 KB
        header:
        - key: XTENSION
          value: BINTABLE
          comment: binary table extension
        - key: BITPIX
          value: 8
          comment: array data type
        - key: NAXIS
          value: 2
          comment: number of array dimensions
        - key: NAXIS1
          value: 195
          comment: length of dimension 1
        - key: NAXIS2
          value: 169
          comment: length of dimension 2
        - key: PCOUNT
          value: 0
          comment: number of group parameters
        - key: GCOUNT
          value: 1
          comment: number of groups
        - key: TFIELDS
          value: 20
          comment: number of table fields
        - key: TARG_TYP
          value: 'Target types: MW=0, MCs=1, Extragalactic=2'
          comment: ''
        - key: QA_ENC
          value: 2-bit GOOD=00 WARNING=01 MAJOR_ISSUE=10 UNDEFINED=11
          comment: ''
        - key: QA_BITS
          value: '2-bit fields packed LSB-first in this order (see DESC extension):
            bright stars, sky brightness, absflux, relflux br, relflux rz, wavecal
            b, wavecal r, wavecal z, flatfield, sky contsub, sky linesub, dap npfit,
            dap pmfit, visual drp, visual dap'
          comment: ''
        - key: EXTNAME
          value: QA
          comment: extension name
        columns:
          expnum:
            name: expnum
