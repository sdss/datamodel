      hdu8:
        name: PM_KEL
        description: Binary table containing the emission-line properties derived
          from the second parametric fitting analysis performed on the gas-pure spectrum
          after refinement of the stellar model.
        is_image: false
        size: 2 MB
        header:
        - key: XTENSION
          value: BINTABLE
          comment: binary table extension
        - key: BITPIX
          value: 8
          comment: array data type
        - key: NAXIS
          value: 2
          comment: number of array dimensions
        - key: NAXIS1
          value: 84
          comment: length of dimension 1
        - key: NAXIS2
          value: 36834
          comment: length of dimension 2
        - key: PCOUNT
          value: 0
          comment: number of group parameters
        - key: GCOUNT
          value: 1
          comment: number of groups
        - key: TFIELDS
          value: 10
          comment: number of table fields
        - key: EXTNAME
          value: PM_KEL
          comment: extension name
        columns:
          id:
            name: id
            type: char[9]
            unit: ''
            description: Unique identifier of the analyzed fiber built as EXPNUM.FIBERID.
          id_fib:
            name: id_fib
            type: int64
            unit: ''
            description: Sequential identifier of the analyzed fiber within the RSS
              or pointing.
          model:
            name: model
            type: char[11]
            unit: ''
            description: Label identifying the emission-line model fitted in the parametric
              analysis.
          wl:
            name: wl
            type: float64
            unit: Angstrom
            description: Rest-frame central wavelength of the fitted emission line.
          flux:
            name: flux
            type: float64
            unit: 10^-16 erg/s/cm^2
            description: Emission-line flux from the parametric analysis, measured
              in one fiber area (0.2718 arcmin^2).
          e_flux:
            name: e_flux
            type: float64
            unit: 10^-16 erg/s/cm^2
            description: Uncertainty in the emission-line flux from the parametric
              analysis, measured in one fiber area (0.2718 arcmin^2).
          disp:
            name: disp
            type: float64
            unit: Angstrom
            description: Emission-line velocity dispersion from the parametric analysis,
              uncorrected for instrumental resolution.
          e_disp:
            name: e_disp
            type: float64
            unit: Angstrom
            description: Uncertainty in the emission-line velocity dispersion from
              the parametric analysis.
          vel:
            name: vel
            type: float64
            unit: km/s
            description: Emission-line line-of-sight velocity from the parametric
              analysis.
          e_vel:
            name: e_vel
            type: float64
            unit: km/s
            description: Uncertainty in the emission-line line-of-sight velocity from
              the parametric analysis.
