          original, first parametric, second parametric, and non-parametric emission-line
          analyses.
        is_image: false
        size: 1 MB
        header:
        - key: XTENSION
          value: BINTABLE
          comment: binary table extension
        - key: BITPIX
          value: 8
          comment: array data type
        - key: NAXIS
          value: 2
          comment: number of array dimensions
        - key: NAXIS1
          value: 7076
          comment: length of dimension 1
        - key: NAXIS2
          value: 245
          comment: length of dimension 2
        - key: PCOUNT
          value: 0
          comment: number of group parameters
        - key: GCOUNT
          value: 1
          comment: number of groups
        - key: TFIELDS
          value: 8
          comment: number of table fields
        - key: EXTNAME
          value: ELINES_CHI2_AVG
          comment: extension name
        - key: TDIM3
          value: (1754)
          comment: ''
        columns:
          name:
            name: name
            type: char[16]
            unit: ''
            description: Name of the analyzed emission line.
          wave:
            name: wave
            type: float64
            unit: Angstrom
            description: Rest-frame wavelength of the analyzed emission line.
          inst_disp:
            name: inst_disp
            type: float32[1754]
            unit: Angstrom
            description: Array of instrumental-dispersion corrections applied to the
              analyzed emission line for all fibers.
          X_sq:
            name: X_sq
            type: float64
            unit: ''
            description: Reduced chi-square statistic associated with the instrumental-resolution
              correction for the analyzed emission line.
          fr:
            name: fr
            type: float32
            unit: ''
            description: Average instrumental-resolution correction factor applied
              to the analyzed emission line.
          X_sq_avg_org:
            name: X_sq_avg_org
            type: float64
            unit: ''
            description: Average reduced chi-square of the original-spectrum fit for
              the analyzed emission line.
          X_sq_avg_pek:
            name: X_sq_avg_pek
            type: float64
            unit: ''
            description: Average reduced chi-square of the second parametric fit for
              the analyzed emission line.
          X_sq_avg_np:
            name: X_sq_avg_np
            type: float64
            unit: ''
            description: Average reduced chi-square of the non-parametric fit for
              the analyzed emission line.
