general:
  name: lvm_dap
  short: replace me - with a short one sentence summary of file
  description: replace me - with a longer description of the data product
  datatype: FITS
  filesize: 56 MB
  releases:
  - DR20
  environments:
  - LVM_SPECTRO_ANALYSIS
  surveys:
  - SDSS
  naming_convention: replace me - with $LVM_SPECTRO_ANALYSIS/[DRPVER]/[DAPVER]/[TILEGRP]/[TILEID]/[MJD]/[EXPNUM]/dap-[RSPID]-[SNLEVEL]-[EXPNUM].[DAPTYPE].fits
    or dap-rsp108-sn20-00005512.dap.fits but with regex pattern matches
  generated_by: replace me - with the name(s) of any git or svn product(s) that produces
    this product.
  data_level: 2.3.3
  design: false
  vac: false
  recommended_science_product: false
changelog:
  description: Describes changes to the datamodel product and/or file structure from
    one release to another
  releases: {}
