general:
  name: mos_target_gaia_dr3_synthetic_photometry_gspc_parquet
  short: 'MOS Target Table: gaia_dr3_synthetic_photometry_gspc'
  description: 'The Gaia DR3 synthetic photometry GSPC table contains the synthetic
    photometry generated from the Gaia BP/RP mean spectra.


    The Gaia Synthetic Photometry Catalogue (GSPC) is a catalogue of synthetic photometry
    generated from the Gaia BP/RP mean spectra in Data Release 3 and standardised
    using wide and reliable sets of external standard stars. For more details, refer
    to <a href="https://gea.esac.esa.int/archive/documentation/GDR3/Gaia_archive/chap_datamodel/sec_dm_performance_verification/ssec_dm_synthetic_photometry_gspc.html">https://gea.esac.esa.int/archive/documentation/GDR3/Gaia_archive/chap_datamodel/sec_dm_performance_verification/ssec_dm_synthetic_photometry_gspc.html</a>.'
  datatype: PARQUET
  filesize: 4 GB
  releases:
  - DR20
  environments:
  - MOS_TARGET
  surveys:
  - SDSS
  naming_convention: $MOS_TARGET/[V_TARG]/[FTYPE]/mos_gaia_dr3_synthetic_photometry_gspc.[FTYPE]
    with FTYPE='parquet' and V_TARG='2.0.0' for DR20.
  generated_by: sdss5db targeting database.
  data_level: 2.3.3
  design: false
  vac: false
  recommended_science_product: false
