general:
  name: mos_target_sdssv_plateholes_meta_parquet
  short: 'MOS Target Table: sdssv_plateholes_meta'
  description: 'The combination of the dr20_sdssv_plateholes and dr20_sdssv_plateholes_meta

    tables are a database representation of the SDSS-V platelist data

    product (<a href="https://svn.sdss.org/public/data/sdss/platelist/trunk/)">https://svn.sdss.org/public/data/sdss/platelist/trunk/)</a>.


    These tables were used within early iterations of FPS target_selection as a way
    to communicate information about which targets had been included in SDSS-V plates.
    This information was used to e.g. de-prioritise targets that were expected to
    have a good quality spectroscopic measurement by the end of the SDSS-V plate observations.


    The dr20_sdssv_plateholes_meta table contains meta-data for each SDSS-V plate
    (one record per plate), whereas the dr20_sdssv_plateholes table has one entry
    for each drilled hole in each SDSS-V plate. The dr20_sdssv_plateholes and dr20_sdssv_plateholes_meta
    tables should be joined via the yanny_uid field.


    Mostly derived from: <a href="https://data.sdss.org/datamodel/files/PLATELIST_DIR/plates/PLATEID6XX/PLATEID6/plateHoles.html">https://data.sdss.org/datamodel/files/PLATELIST_DIR/plates/PLATEID6XX/PLATEID6/plateHoles.html</a>'
  datatype: PARQUET
  filesize: 152 KB
  releases:
  - DR20
  environments:
  - MOS_TARGET
  surveys:
  - SDSS
  naming_convention: $MOS_TARGET/[V_TARG]/[FTYPE]/mos_sdssv_plateholes_meta.[FTYPE]
    with FTYPE='parquet' and V_TARG='2.0.0' for DR20.
  generated_by: sdss5db targeting database.
  data_level: 2.3.3
  design: false
  vac: false
  recommended_science_product: false
changelog:
  description: Describes changes to the datamodel product and/or file structure from
    one release to another
  releases: {}
