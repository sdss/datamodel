general:
  name: mos_target_sdssv_boss_conflist_parquet
  short: 'MOS Target Table: sdssv_boss_conflist'
  description: 'The dr20_sdssv_boss_conflist table is a database representation of
    an

    early version of the SDSS-V BOSS fieldlist data product.


    The dr20_sdssv_boss_conflist table was used within early iterations of FPS target_selection
    as a way to communicate information about which SDSS-V plates had been observed
    by the time of target selection. This information was used to e.g. de-prioritise
    targets that were expected to have a good quality spectroscopic measurement before
    the start of SDSS-V FPS operations.


    Caution. The dr20_sdssv_boss_conflist table should only be used in order to recreate
    the target_selection selection function.


    Column descriptions are mainly derived from: <a href="https://data.sdss.org/datamodel/files/BOSS_SPECTRO_REDUX/RUN2D/platelist.html">https://data.sdss.org/datamodel/files/BOSS_SPECTRO_REDUX/RUN2D/platelist.html</a>'
  datatype: PARQUET
  filesize: 113 KB
  releases:
  - DR20
  environments:
  - MOS_TARGET
  surveys:
  - SDSS
  naming_convention: $MOS_TARGET/[V_TARG]/parquet/mos_sdssv_boss_conflist.parquet
    with V_TARG=2.0.0 for DR20.
  generated_by: sdss5db targeting database.
  data_level: 2.3.3
  design: false
  vac: false
  recommended_science_product: false
changelog:
  description: Describes changes to the datamodel product and/or file structure from
