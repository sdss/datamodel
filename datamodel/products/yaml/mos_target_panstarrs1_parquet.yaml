general:
  name: mos_target_panstarrs1_parquet
  short: 'MOS Target Table: panstarrs1'
  description: 'A copy of the PanSTARRS1-dr2 catalogue provided by E. Magnier.


    Based on the internal IPP database representation maintained by IfA, U. Hawaii.
    Column names may differ from publically available catalogues hosted at MAST (mapping
    provided in column descriptions). The SDSS-V copy of this database is derived
    from a combination of the PS1-dr2 StackObjectThin and ObjectThin tables (<a href="https://outerspace.stsci.edu/display/PANSTARRS/PS1+Database+object+and+detection+tables)">https://outerspace.stsci.edu/display/PANSTARRS/PS1+Database+object+and+detection+tables)</a>.
    The catalogue contains PSF, Kron, and Aper measurements based on stacked and forced
    warp photometry, and expressed as fluxes, including measurements are made of low-significance
    detections. The average exposure (chip) measurements are expressed in magnitudes
    since photometry is not measured at this stage for sources with S/N < 5, so there
    should not be any negative fluxes. Magnitudes are on the AB system, fluxes are
    in Janskys. Conversion to AB mags is via: mag = 8.9 - 2.5*log10(flux).'
  datatype: PARQUET
  filesize: 18 GB
  releases:
  - DR20
  environments:
  - MOS_TARGET
  surveys:
  - SDSS
  naming_convention: $MOS_TARGET/[V_TARG]/[FTYPE]/mos_panstarrs1.[FTYPE] with FTYPE='parquet'
    and V_TARG='2.0.0' for DR20.
  generated_by: sdss5db targeting database.
  data_level: 2.3.3
  design: false
  vac: false
  recommended_science_product: false
changelog:
  description: Describes changes to the datamodel product and/or file structure from
    one release to another
  releases: {}
releases:
  DR20:
    template: $MOS_TARGET/[V_TARG]/[FTYPE]/mos_panstarrs1.[FTYPE]
    example: 2.0.0/parquet/mos_panstarrs1.parquet
    location: '{v_targ}/{ftype}/mos_panstarrs1.{ftype}'
    environment: MOS_TARGET
    access:
      in_sdss_access: true
      path_name: mos_target_panstarrs1
      path_template: $MOS_TARGET/{v_targ}/{ftype}/mos_panstarrs1@mos_target_num2|.{ftype}
      path_kwargs:
      - v_targ
      - ftype
      access_string: mos_target_panstarrs1 = $MOS_TARGET/{v_targ}/{ftype}/mos_panstarrs1.{ftype}
    survey: SDSS
    dataframe:
      columns:
        ra:
          name: ra
          dtype: Float64
          unit: deg
          description: mean RA, (J2000, tied to Gaia DR1)
        dec:
          name: dec
          dtype: Float64
          unit: deg
          description: mean Dec, (J2000, tied to Gaia DR1)
        dra:
          name: dra
          dtype: Float32
          unit: arcsec
          description: error on RA
        ddec:
          name: ddec
          dtype: Float32
          unit: arcsec
          description: error on DEC
        tmean:
          name: tmean
          dtype: Float32
          unit: days
          description: Mean epoch (MJD)
        trange:
          name: trange
          dtype: Float32
          unit: days
          description: Time range -- may include 2MASS values
        chisqpos:
          name: chisqpos
          dtype: Float32
          unit: ''
          description: chi-square of a fixed position astrometry solution (equiv to
            ObjectThin.posMeanChisq)
        stargal:
          name: stargal
          dtype: Float32
          unit: ''
          description: Measure of extendedness. Computed as the median across all
            chip measurements of extNsigma, where extNsigma = (PSF mag - Kron mag)
            expressed as a number of sigmas, so it somewhat adjusts for the spread
            at low signal-to-noise.
        nmeas:
          name: nmeas
          dtype: Int32
          unit: ''
          description: total number of measurements in databases (including non-PS1
            data)
        nwarp_ok:
          name: nwarp_ok
          dtype: Int32
          unit: ''
          description: number of warps with psf_qf > 0 (any unmasked pixels)
        flags:
