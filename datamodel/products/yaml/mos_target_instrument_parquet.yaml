general:
  name: mos_target_instrument_parquet
  short: 'MOS Target Table: instrument'
  description: This table stores the instruments used by SDSS-V.
  datatype: PARQUET
  filesize: 1 KB
  releases:
  - DR20
  environments:
  - MOS_TARGET
  surveys:
  - SDSS
  naming_convention: $MOS_TARGET/[V_TARG]/[FTYPE]/mos_instrument.[FTYPE] with FTYPE='parquet'
    and V_TARG='2.0.0' for DR20.
  generated_by: sdss5db targeting database.
  data_level: 2.3.3
  design: false
  vac: false
  recommended_science_product: false
changelog:
  description: Describes changes to the datamodel product and/or file structure from
    one release to another
  releases: {}
releases:
  DR20:
    template: $MOS_TARGET/[V_TARG]/[FTYPE]/mos_instrument.[FTYPE]
    example: 2.0.0/parquet/mos_instrument.parquet
    location: '{v_targ}/{ftype}/mos_instrument.{ftype}'
    environment: MOS_TARGET
    access:
      in_sdss_access: true
      path_name: mos_target_instrument
      path_template: $MOS_TARGET/{v_targ}/{ftype}/mos_instrument.{ftype}
      path_kwargs:
      - ftype
      - v_targ
      access_string: mos_target_instrument = $MOS_TARGET/{v_targ}/{ftype}/mos_instrument.{ftype}
    survey: SDSS
    dataframe:
      columns:
        pk:
          name: pk
          dtype: Int32
          unit: ''
          description: The primary key. A sequential identifier.
        label:
          name: label
          dtype: String
          unit: ''
          description: The name of the instrument.
        default_lambda_eff:
          name: default_lambda_eff
          dtype: Float32
          unit: angstrom
          description: The default wavelength for which fibre positioning will be
            optimised
      metadata: {}
