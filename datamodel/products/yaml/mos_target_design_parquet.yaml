general:
  name: mos_target_design_parquet
  short: 'MOS Target Table: design'
  description: This table stores the meta-data for the design, including its Design
    Mode and versioning information.
  datatype: PARQUET
  filesize: 10 MB
  releases:
  - DR20
  environments:
  - MOS_TARGET
  surveys:
  - SDSS
  naming_convention: $MOS_TARGET/[V_TARG]/[FTYPE]/mos_design.[FTYPE] with FTYPE='parquet'
    and V_TARG='2.0.0' for DR20.
  generated_by: sdss5db targeting database.
  data_level: 2.3.3
  design: false
  vac: false
  recommended_science_product: false
changelog:
  description: Describes changes to the datamodel product and/or file structure from
    one release to another
  releases: {}
releases:
  DR20:
    template: $MOS_TARGET/[V_TARG]/[FTYPE]/mos_design.[FTYPE]
    example: 2.0.0/parquet/mos_design.parquet
    location: '{v_targ}/{ftype}/mos_design.{ftype}'
    environment: MOS_TARGET
    access:
      in_sdss_access: true
      path_name: mos_target_design
      path_template: $MOS_TARGET/{v_targ}/{ftype}/mos_design.{ftype}
      path_kwargs:
      - ftype
      - v_targ
      access_string: mos_target_design = $MOS_TARGET/{v_targ}/{ftype}/mos_design.{ftype}
    survey: SDSS
    dataframe:
      columns:
        design_id:
          name: design_id
          dtype: Int32
          unit: ''
          description: The primary key. A sequential identifier.
        design_mode_label:
          name: design_mode_label
          dtype: String
          unit: ''
          description: The primary key of the design_mode in the dr20_design_mode
            table.
        mugatu_version:
          name: mugatu_version
          dtype: String
          unit: ''
          description: Software version of mugatu used to validate and ingest design.
        run_on:
          name: run_on
          dtype: Date
          unit: ''
          description: Date that design was added to database.
        assignment_hash:
          name: assignment_hash
          dtype: 'Extension(''arrow.opaque'', Binary, ''{"type_name": "uuid", "vendor_name":
            "PostgreSQL"}'')'
          unit: ''
          description: Hash of the assignments in the design.
        design_version_pk:
          name: design_version_pk
          dtype: Int32
          unit: ''
          description: The primary key of the version in the dr20_version table.
      metadata: {}
notes: |-
  None
regrets: |-
  I  have no regrets!
