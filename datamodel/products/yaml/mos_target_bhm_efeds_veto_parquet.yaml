general:
  name: mos_target_bhm_efeds_veto_parquet
  short: 'MOS Target Table: bhm_efeds_veto'
  description: 'The BHM-SPIDERS eFEDS veto catalogue.


    A minimalist catalogue of 6300 science targets in the SPIDERS eFEDS field that
    received SDSS-IV spectroscopy during the March2020 SPIDERS observing run (and
    hence are not in SDSS-SpecObj-DR16). Many of these spectra have very low SNR and
    so we will want to observe them again, but we will take account of this in the
    Carton code. This is a subset (in both rows and columns) of the spAll-v5_13_1.fits
    idlspec2d pipeline product. The original data model for that file is here: <a
    href="https://data.sdss.org/datamodel/files/BOSS_SPECTRO_REDUX/RUN2D/spAll.html">https://data.sdss.org/datamodel/files/BOSS_SPECTRO_REDUX/RUN2D/spAll.html</a>'
  datatype: PARQUET
  filesize: 445 KB
  releases:
  - DR20
  environments:
  - MOS_TARGET
  surveys:
  - SDSS
  naming_convention: $MOS_TARGET/[V_TARG]/[FTYPE]/mos_bhm_efeds_veto.[FTYPE] with
    FTYPE='parquet' and V_TARG='2.0.0' for DR20.
  generated_by: sdss5db targeting database.
  data_level: 2.3.3
  design: false
  vac: false
  recommended_science_product: false
changelog:
  description: Describes changes to the datamodel product and/or file structure from
    one release to another
