general:
  name: manga_firefly-GLOBALPROP
  short: "manga-firefly-globalprop-v3_1_1-miles.fits is one of the MaNGA FIREFLY
    catalogues for the 17th data release of the Sloan Digital Sky Survey."
  description: 'manga-firefly-globalprop-v3_1_1-miles.fits is one of the MaNGA FIREFLY
    catalogues for the 17th data release of the Sloan Digital Sky Survey. It is a
    light-weight version of the MaNGA FIREFLY VAC reduced to only the global stellar
    population parameters. For spatially resolved parameters, please refer to the
    main VAC. This file contains analysis for 10735 datacubes including 10010 unique
    galaxies from the MaNGA survey, providing global stellar population parameters
    such as gradients and values at the center and at 1 Re. For DR17, the version
    of FIREFLY used was FIREFLY_VER=v1_0_1, and this was run on reduced and analysed
    data from MANGADRP_VER=v3_1_1 and MANGADAP_VER=v3_1_0. This VAC is provided in
    two versions: The first version employs the stellar population models of ​Maraston
    & Stromback (2011) based on the ​ ​MILES stellar library (Sánchez-Blázquez et
    al. 2006). The second version uses the ​​ ​MaStar models described in ​ ​Maraston
    et al. (2020) . Both model libraries assume a Kroupa IMF (Kroupa 2001). We assume
    a flat cosmology with H 0 = 67.8 km/s/Mpc and Ω m = 0.308 (Planck Collaboration
    et al. 2016). Compared to the FIREFLY VAC in DR15, the radius in HDU4 is now given
    in elliptical coordinates and the azmiuth is added, too. The catalogue is available
    in FITS format at the following link. Please do not forget to cite Neumann et
    al. (2022) and Goddard et al. (2017) if you use this catalogue in your work. https://data.sdss.org/sas/dr17/manga/spectro/firefly/v3_1_1/manga-firefly-globalprop-v3_1_1-miles.fits
    https://data.sdss.org/sas/dr17/manga/spectro/firefly/v3_1_1/manga-firefly-globalprop-v3_1_1-mastar.fits
    Naming Convention filename = manga-firefly-globalprop-MANGADRP_VER-MODELS.fits
    where MANGADRP_VER=v3_1_1 for DR17 and MODELS either miles or mastar . Approximate
    Size 2.8 MB File Type FITS Read by Products firefly Written by Products firefly
    Sections HDU0 : The Primary Header HDU1 : BASIC GALAXY INFORMATION HDU2 : GLOBAL
    PARAMETERS HDU3 : GRADIENT PARAMETERS'
  datatype: FITS
  filesize: 742 KB
  releases:
    - DR14
    - DR15
    - DR16
    - DR17
  environments:
    - MANGA_FIREFLY
  surveys:
    - MaNGA
  naming_convention: 
    $MANGA_FIREFLY/[FIREFLY_VER]/manga_firefly-[DRPVER]-GLOBALPROP.fits where 
    FIREFLY_VER=v1_1_2 in DR15 and DRPVER=v2_4_3.
  generated_by: https://github.com/FireflySpectra/firefly_release this product.
  data_level: 3.3.0
  design: false
  vac: true
  recommended_science_product: true
