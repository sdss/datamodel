general:
  name: cogimg
  short: Coadded guider images appropriate for a given exposure so that we have a
    time-integrated PSF.
  description: Coadded guider images appropriate for a given exposure so that we have
    a time-integrated PSF.
  datatype: FITS
  filesize: 2 MB
  releases:
  - DR13
  - DR14
  - DR15
  - DR16
  - DR17
  environments:
  - MANGA_SPECTRO_REDUX
  surveys:
  - MaNGA
  naming_convention: cogimg-[mjd]-[exposure].fits.gz where [mjd] is the MJD of observation,
    and [exposure] is the (zero-padded) 8-digit exposure number.
  generated_by: 'mangadrp: coaddgimg.pro'
  data_level: 1.3.1
  design: false
  vac: false
  recommended_science_product: false
changelog:
  description: Describes changes to the datamodel product and/or file structure from
    one release to another
  releases:
    DR17:
      from: DR16
      note: No changes
    DR16:
      from: DR15
      note: No changes
    DR15:
      from: DR14
      note: No changes
    DR14:
      from: DR13
      note: No changes
releases:
  DR13:
    template: $MANGA_SPECTRO_REDUX/[DRPVER]/[PLATE]/[MJD]/cogimg-[MJD]-[EXPOSURE].fits
    example: v1_5_4/7341/56693/cogimg-56693-00174697.fits
    location: '{drpver}/{plate}/{mjd}/cogimg-{mjd}-{exposure}.fits'
    environment: MANGA_SPECTRO_REDUX
    access:
      in_sdss_access: true
      path_name: cogimg
      path_template: $MANGA_SPECTRO_REDUX/{drpver}/{plate}/{mjd}/cogimg-{mjd}-{exposure:0>8}.fits
      path_kwargs:
      - drpver
      - mjd
      - exposure
      - plate
      access_string: cogimg = $MANGA_SPECTRO_REDUX/{drpver}/{plate}/{mjd}/cogimg-{mjd}-{exposure}.fits
    survey: MaNGA
    hdus:
      hdu0:
        name: PRIMARY
        description: HDU0 contains the stacked flux image.
        is_image: true
        size: 1 MB
        header:
        - key: SIMPLE
          value: true
          comment: 'Written by IDL:  Fri Mar 11 14:11:32 2016'
        - key: BITPIX
          value: -32
          comment: Number of bits per data pixel
        - key: NAXIS
          value: 2
          comment: Number of data axes
        - key: NAXIS1
          value: 524
          comment: ''
        - key: NAXIS2
          value: 512
          comment: ''
        - key: EXTEND
          value: true
          comment: Extensions may be present
        - key: TIMESYS
          value: 0
          comment: ''
        - key: TAI-BEG
          value: 4898293526.0
          comment: ''
        - key: DATE-OBS
          value: '2014-02-05T05:05:26'
          comment: ''
        - key: GUIDER1
          value: proc-gimg-0403.fits.gz
          comment: The first guider image
        - key: GUIDERN
          value: proc-gimg-0437.fits.gz
          comment: The last guider image
        - key: TOTEXPTI
          value: 510.0
          comment: Total guider exposure time
        - key: OBSTIME
          value: 900.13
          comment: Total science exposure time
        - key: DARKFILE
          value: /data/gcam/56693/gimg-0001.fits.gz
          comment: guider dark exposure
        - key: FLATFILE
          value: /data/gcam/56693/gimg-0377.fits.gz
          comment: guider flat exposure
        - key: CARTID
          value: 2
          comment: The currently loaded cartridge
        - key: PLATEID
          value: 7341
          comment: The currently loaded plate
        - key: EXPOSURE
          value: 174697
          comment: ''
        - key: MJD
          value: 56693
          comment: APO fMJD day at start of exposure
        - key: DCNRA
          value: 0.0
          comment: applied user supplied offset in RA, arcsec
        - key: DCNDEC
          value: 0.0
          comment: applied user supplied offset in Dec, arcsec
        - key: COMMENT
          value: FITS (Flexible Image Transport System) format is defined in 'Astronomy
          comment: ''
        - key: COMMENT
          value: and Astrophysics', volume 376, page 359; bibcode 2001A&A...376..359H
          comment: ''
      hdu1:
        name: ''
        description: Stacked image error.
        is_image: true
        size: 1 MB
        header:
        - key: XTENSION
          value: IMAGE
          comment: Image Extension created by MWRFITS v1.11
        - key: BITPIX
          value: -32
          comment: ''
        - key: NAXIS
          value: 2
          comment: ''
        - key: NAXIS1
          value: 524
          comment: ''
        - key: NAXIS2
          value: 512
          comment: ''
        - key: PCOUNT
          value: 0
          comment: ''
        - key: GCOUNT
          value: 1
          comment: ''
      hdu2:
        name: ''
        description: Stacked image mask.
        is_image: true
        size: 262 KB
        header:
        - key: XTENSION
          value: IMAGE
          comment: Image Extension created by MWRFITS v1.11
        - key: BITPIX
          value: 8
          comment: ''
        - key: NAXIS
          value: 2
          comment: ''
        - key: NAXIS1
          value: 524
          comment: ''
        - key: NAXIS2
          value: 512
          comment: ''
        - key: PCOUNT
          value: 0
          comment: ''
        - key: GCOUNT
          value: 1
          comment: ''
      hdu3:
        name: ''
        description: 'HDU3: Binary Table'
        is_image: false
        size: 1 KB
        header:
        - key: XTENSION
          value: BINTABLE
          comment: Binary table written by MWRFITS v1.11
        - key: BITPIX
          value: 8
          comment: Required value
        - key: NAXIS
          value: 2
          comment: Required value
        - key: NAXIS1
          value: 77
          comment: Number of bytes per row
        - key: NAXIS2
          value: 17
          comment: Number of rows
        - key: PCOUNT
          value: 0
          comment: Normally 0 (no varying arrays)
        - key: GCOUNT
          value: 1
          comment: Required value
        - key: TFIELDS
          value: 17
          comment: Number of columns in table
        - key: COMMENT
          value: ''
          comment: ''
        - key: COMMENT
          value: ' *** End of mandatory fields ***'
          comment: ''
        - key: COMMENT
          value: ''
          comment: ''
        - key: COMMENT
          value: ''
          comment: ''
        - key: COMMENT
          value: ' *** Column names ***'
          comment: ''
        - key: COMMENT
          value: ''
          comment: ''
        - key: COMMENT
          value: ''
          comment: ''
        - key: COMMENT
          value: ' *** Column formats ***'
          comment: ''
        - key: COMMENT
          value: ''
          comment: ''
        columns:
          EXISTS:
            name: EXISTS
            type: bool
            unit: ''
            description: True if the guide fiber exists, 'F' otherwise.
          ENABLED:
            name: ENABLED
            type: bool
            unit: ''
            description: '''T'' if the guide fiber''s measurement is used in guiding.'
          GPROBEBITS:
            name: GPROBEBITS
            type: int16
            unit: ''
            description: Bitmask indicating the classification of the guide fibers.
              Bit 2 means acquisition fibers. Bit 3 and 4 mean pre-focus and post-focus
              fibers which are used for focusing. The other fibers with GPROBEBITS=0
              are in-focus fibers.
          XFOCAL:
            name: XFOCAL
            type: float32
            unit: mm
            description: X Position of the guide probe on the focal plane of the telescope.
          YFOCAL:
            name: YFOCAL
            type: float32
            unit: mm
            description: Y Position of the guide probe on the focal plane of the telescope.
          RADIUS:
            name: RADIUS
            type: float32
            unit: pixels
            description: Radius of the guide probe image on the detector. Each pixel
              is 0.428 arcsec.
          XFERRULEOFFSET:
            name: XFERRULEOFFSET
            type: float32
            unit: ''
            description: Probably the X offset of the guide hole on the plate relative
              to the design position.
          YFERRULEOFFSET:
            name: YFERRULEOFFSET
            type: float32
            unit: ''
            description: Probably the Y offset of the guide hole on the plate relative
              to the design position.
          ROTATION:
            name: ROTATION
            type: float32
            unit: degree
            description: ''
          ROTSTAR2SKY:
            name: ROTSTAR2SKY
            type: float32
            unit: degree
            description: The angular rotation required to convert the star's position
              angle in the guide probe image to its PA angle in the sky.
          FOCUSOFFSET:
            name: FOCUSOFFSET
            type: float32
            unit: ''
            description: Focus offset of the guide probe.
          FIBER_TYPE:
            name: FIBER_TYPE
            type: char[7]
            unit: ''
            description: 'Type of guide probe: ACQUIRE or GUIDE.'
          UGRIZ:
            name: UGRIZ
            type: float32[5]
            unit: ''
            description: ugriz magnitude of the star targeted.
          REF_MAG:
            name: REF_MAG
            type: float32
            unit: ''
            description: ''
          FIBERID:
            name: FIBERID
            type: int16
            unit: ''
            description: Guide Probe ID (1-16, among them 3 and 11 are acquisition
              fibers.)
          XCENTER:
            name: XCENTER
            type: float32
            unit: ''
            description: X coordinate of the guide probe's image in the guider camera
          YCENTER:
            name: YCENTER
            type: float32
            unit: ''
            description: Y coordinate of the guide probe's image in the guider camera
