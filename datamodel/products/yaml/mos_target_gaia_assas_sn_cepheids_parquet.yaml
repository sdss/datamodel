general:
  name: mos_target_gaia_assas_sn_cepheids_parquet
  short: 'MOS Target Table: gaia_assas_sn_cepheids'
  description: 'Well-defined and characterized all-sky sample of classical Cepheids
    in the Milky Way presented in Inno+2021.


    The sample is obtained by combining two time-domain all-sky surveys: Gaia DR2
    (Gaia Col. 2018; see I/345) and All-Sky Automated Survey for Supernovae (ASAS-SN;
    Shappee+ 2014AAS...22323603S). Inno+21 use parallax and variability information
    from Gaia  to select ~30000 bright (G<17) Cepheid candidates with M_K_{<}-1. They
    analyze their ASAS-SN V-band light curves, determining periods  and classifying
    the light curves using their Fourier parameters. This results in ~1900 likely
    Galactic Cepheids, Inno+21 estimate to be >~90% complete and pure within their
    adopted selection criteria.'
  datatype: PARQUET
  filesize: 935 KB
  releases:
  - DR20
  environments:
  - MOS_TARGET
  surveys:
  - SDSS
  naming_convention: $MOS_TARGET/[V_TARG]/[FTYPE]/mos_gaia_assas_sn_cepheids.[FTYPE]
    with FTYPE='parquet' and V_TARG='2.0.0' for DR20.
  generated_by: sdss5db targeting database.
  data_level: 2.3.3
  design: false
  vac: false
  recommended_science_product: false
changelog:
