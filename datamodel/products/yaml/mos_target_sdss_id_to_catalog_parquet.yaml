general:
  name: mos_target_sdss_id_to_catalog_parquet
  short: 'MOS Target Table: sdss_id_to_catalog'
  description: 'This table contains the best matched associations between SDSS identifiers
    (sdss_id, catalogid) and the unique identifiers in the parent catalogues used
    for SDSS cross-matches.


    The format of the parent catalogue columns is <table_name>__<column_name>, where
    <column_name> is the primary key/unique identifier column to which to join in
    the dr20_<table_name> table.'
  datatype: PARQUET
  filesize: 11 GB
  releases:
  - DR20
  environments:
  - MOS_TARGET
  surveys:
  - SDSS
  naming_convention: $MOS_TARGET/[V_TARG]/[FTYPE]/mos_sdss_id_to_catalog.[FTYPE] with
    FTYPE='parquet' and V_TARG='2.0.0' for DR20.
  generated_by: sdss5db targeting database.
  data_level: 2.3.3
  design: false
  vac: false
  recommended_science_product: false
changelog:
  description: Describes changes to the datamodel product and/or file structure from
    one release to another
  releases: {}
