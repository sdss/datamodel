            aperture
        cnt32:
          name: cnt32
          dtype: Int32
          unit: ''
          description: Number of Gaia DR2 sources within a 32 arcsec radius circular
            aperture
        phot_z:
          name: phot_z
          dtype: Float64
          unit: ''
