releases:
  DR20:
    template: $MOS_TARGET/[V_TARG]/[FTYPE]/mos_gaia_unwise_agn.[FTYPE]
    example: 2.0.0/parquet/mos_gaia_unwise_agn.parquet
    location: '{v_targ}/{ftype}/mos_gaia_unwise_agn.{ftype}'
    environment: MOS_TARGET
    access:
      in_sdss_access: true
      path_name: mos_target_gaia_unwise_agn
      path_template: $MOS_TARGET/{v_targ}/{ftype}/mos_gaia_unwise_agn@mos_target_num|.{ftype}
      path_kwargs:
      - num
      - v_targ
      - ftype
      access_string: mos_target_gaia_unwise_agn = $MOS_TARGET/{v_targ}/{ftype}/mos_gaia_unwise_agn.{ftype}
    survey: SDSS
    dataframe:
