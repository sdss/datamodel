general:
  name: mos_target_gaia_unwise_agn_parquet
  short: 'MOS Target Table: gaia_unwise_agn'
  description: 'AGN identified using information from WISE and Gaia DR2 from the catalog
    of Shu et al. 2019.


    See complete information on the columns in <a href="https://academic.oup.com/mnras/article/489/4/4741/5561523">https://academic.oup.com/mnras/article/489/4/4741/5561523</a>'
