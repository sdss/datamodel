general:
  name: mandala
  short: "This file contains the list ofMaNGADwarf galaxy (MaNDala) Sample, \n  along\
    \ with various photometric and spectroscopic results derived usingDESI imagesin\
    \ three bands (grz) and MaNGA data respectively."
  description: "This file contains the list ofMaNGADwarf galaxy (MaNDala) Sample,\
    \ \n  along with various photometric and spectroscopic results derived usingDESI\
    \ imagesin three bands (grz) and MaNGA data respectively. The details of our analysis\
    \ can be found in:Cano-D\xEDaz, et al. 2022."
  datatype: FITS
  filesize: 469 KB
  releases:
  - DR17
  environments:
  - MANGA_MANDALA
  surveys:
  - MaNGA
  naming_convention: MANGA_MANDALA/[MANDALA_VER]/mandala_[MANDALA_VER]}.fits where
    MANDALA_VER=v1_1 for DR17
  generated_by: "Mariana Cano D\xEDaz in collaboration with the MaNDala team."
  data_level: 3.3.0
  design: false
  vac: true
  recommended_science_product: true
changelog:
  description: Describes changes to the datamodel product and/or file structure from
    one release to another
  releases: {}
releases:
  DR17:
    template: $MANGA_MANDALA/[MANDALA_VER]/mandala_[MANDALA_VER].fits
    example: v1_1/mandala_v1_1.fits
    location: '{mandala_ver}/mandala_{mandala_ver}.fits'
    environment: MANGA_MANDALA
    access:
      in_sdss_access: false
      path_name: null
      path_template: null
      path_kwargs: null
      access_string: mandala = $MANGA_MANDALA/{mandala_ver}/mandala_{mandala_ver}.fits
    survey: MaNGA
    hdus:
      hdu0:
        name: PRIMARY
        description: "This extension solely contains a header with information regarding\
          \ the binary table and\n  the Data Releases (DR) of the observational data\
          \ sets used to derive our results."
        is_image: true
        size: 0 bytes
        header:
        - key: SIMPLE
          value: true
          comment: conforms to FITS standard
        - key: BITPIX
          value: 8
          comment: array data type
        - key: NAXIS
          value: 0
          comment: number of array dimensions
        - key: EXTEND
          value: true
          comment: ''
        - key: NTABLE
          value: 1
          comment: Total number of tables within this file
        - key: TYPTABLE
          value: BINARY
          comment: Table(s) type
        - key: RWTABLE1
          value: 136
          comment: Number of Rows in HDU 1 Table
        - key: CLTABLE1
          value: 84
          comment: Number of Columns in HDU 1 Table
        - key: DESIDR
          value: DR9
          comment: DESI DR used for phot results
        - key: SDSSDR
          value: DR17
          comment: SDSS DR used for spectro results
        - key: MANGAMPL
          value: MPL-11
          comment: Internal MANGA DR used for spectro results
        - key: PIPE3DV
          value: V3_1_1
          comment: PIPE3D release version used for spectro results
        - key: COMMENT
          value: 'This file contains SDSS IV VAC MaNDala. Version: 1.0'
          comment: ''
        - key: COMMENT
          value: 'File created: 2023-04-24 15:53:35.253783 @ IA-UNAM'
          comment: ''
      hdu1:
        name: ''
        description: "This extension contains the binary table with our results derived\
          \ with photometric\n  (DESI) and spectroscopic (MaNGA) data. For all of\
          \ them we have assumed the following cosmology: \n  H0 = 70, Omega_M= 0.3,\
          \ Omega_Lambda = 0.7, unless otherwise is explicitly stated.\n  For the\
          \ photometric results (up to column 54): \n  magnitudes are in AB system.\
          \ The absolute magnitudes are calculated with the Distance Modulus:\n  M\
          \ = m - 5 * log10(DL), where DL is the Luminosity Distance, which is estimated\
          \ using theNSAredshifts.\n  For the Sersic fits we convolved the PSF with\
          \ a Moffat function, and used the following\n  values of the FWHM in each\
          \ band: g: 1.22, r: 1.12 and z: 1.10, all in arcsec.\n  The spectroscopic\
          \ results (columns 55-84) were derived from the followingPipe3Ddata products:\
          \ D4000, age, metallicity, \n  emission line fluxes and equivalent width\
          \ maps, as well as stellar decompositions. \n  Note that the quantities\
          \ reported in this VAC may differ from those presented \nin the Pipe3D VAC\
          \ due to differences in aperture definitions."
        is_image: false
        size: 452 KB
        header:
        - key: XTENSION
          value: BINTABLE
          comment: binary table extension
        - key: BITPIX
          value: 8
          comment: array data type
        - key: NAXIS
          value: 2
          comment: number of array dimensions
        - key: NAXIS1
          value: 3407
          comment: length of dimension 1
        - key: NAXIS2
          value: 136
          comment: length of dimension 2
        - key: PCOUNT
          value: 0
