general:
  name: manga_firefly
  short: This is the MaNGA FIREFLY catalogue for the 17th data release of the 
    Sloan Digital Sky Survey.
  description: "This is the MaNGA FIREFLY catalogue for the 17th data release of the Sloan Digital Sky Survey. The VAC contains analysis for 10735 datacubes including 10010 unique galaxies from the MaNGA survey, providing both global and spatially resolved stellar population parameters. For DR17, the version of FIREFLY used was FIREFLY_VER=v1_0_1, and this was run on reduced and analysed data from MANGADRP_VER=v3_1_1 and MANGADAP_VER=v3_1_0. This VAC is provided in two versions: The first version employs the stellar population models of <a target='_blank' href='http://adsabs.harvard.edu/abs/2011MNRAS.418.2785M'>​Maraston & Stromback (2011)</a> based on the ​<a target='_blank' href='https://www.iac.es/proyecto/miles/pages/stellar-libraries/miles-library.php'>​MILES stellar library</a> (Sánchez-Blázquez et al. 2006). The second version uses the <a target='_blank' href='http://www.icg.port.ac.uk/mastar/'>​MaStar models</a>​ described in ​<a target='_blank' href='https://ui.adsabs.harvard.edu/abs/2020MNRAS.496.2962M%2F'>​Maraston et al. (2020)</a>. Both model libraries assume a Kroupa IMF (Kroupa 2001). We assume a flat cosmology with H<sub>0</sub> = 67.8 km/s/Mpc and &Omega;<sub>m</sub> = 0.308 (Planck Collaboration et al. 2016). Compared to the FIREFLY VAC in DR15, the radius in HDU4 is now given in elliptical coordinates and the azmiuth is added, too. Masses in HDU11 and HDU12 are given per spaxel and as total mass per Voronoi cell. We do not provide absoption index measurements anymore. The catalogue is available in FITS format at the following link. Please do not forget to cite <a target='_blank' href='https://ui.adsabs.harvard.edu/abs/2022MNRAS.513.5988N/abstract'>Neumann et al. (2022)</a> and <a target='_blank' href='http://adsabs.harvard.edu/abs/2017MNRAS.466.4731G'>Goddard et al. (2017)</a> if you use this catalogue in your work."
  datatype: FITS
  filesize: 6 GB
  releases:
    - DR17
  environments:
    - MANGA_FIREFLY
  surveys:
    - MaNGA
  naming_convention: 
    $MANGA_FIREFLY/[DRPVER]/manga-firefly-[DRPVER]-[MODELS].fits where 
    DRPVER=v3_1_1 for DR17 and MODELS in (mastar, miles).
  generated_by: https://github.com/FireflySpectra/firefly_release this product.
  data_level: 3.3.0
  design: false
  vac: true
  recommended_science_product: true
